<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多文件上传 · 自适应路径</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #eef2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: white; border-radius: 28px; max-width: 750px; width: 100%; box-shadow: 0 8px 20px rgba(0,0,0,0.08); overflow: hidden; }
        .card-inner { padding: 28px 32px 36px; }
        h2 { font-size: 26px; font-weight: 600; color: #1e3a5f; text-align: center; margin-bottom: 6px; }
        .sub { text-align: center; font-size: 13px; color: #6c7a8e; border-bottom: 1px solid #eef2f7; padding-bottom: 14px; margin-bottom: 20px; }
        .options { display: flex; justify-content: center; gap: 32px; background: #f8fafc; padding: 10px 20px; border-radius: 60px; margin-bottom: 24px; }
        .option { display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer; }
        .upload-area { border: 2px dashed #9bb7d4; border-radius: 24px; padding: 36px 20px; text-align: center; cursor: pointer; transition: 0.2s; margin-bottom: 24px; background: #fff; }
        .upload-area.drag-over { background: #eef5fc; border-color: #2c7da0; transform: scale(0.99); }
        .upload-icon { font-size: 48px; margin-bottom: 10px; }
        .upload-tip { font-weight: 500; color: #2c5a7a; }
        .file-list-container { border: 1px solid #e2e9f0; border-radius: 20px; margin-bottom: 20px; display: none; max-height: 260px; overflow-y: auto; }
        .file-list-container.has-files { display: block; }
        .file-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid #f0f2f5; }
        .file-info { flex: 1; display: flex; gap: 12px; align-items: center; overflow: hidden; }
        .file-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
        .file-size { font-size: 11px; color: #7f8fa4; }
        .file-status { font-size: 12px; padding: 4px 10px; border-radius: 30px; background: #f0f2f5; margin-right: 8px; }
        .file-status.uploading { background: #e8f0fe; color: #2c7da0; }
        .file-status.success { background: #e0f5ea; color: #1f7b4d; }
        .file-status.error { background: #ffe6e5; color: #c23d3d; }
        .delete-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: #9aaebf; padding: 4px 8px; border-radius: 30px; }
        .delete-btn:hover { background: #fee2e2; color: #dc4c4c; }
        .progress-bar { height: 6px; background: #e2e8f0; border-radius: 10px; margin: 12px 0 6px; overflow: hidden; display: none; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #2c7da0, #61a5c2); transition: width 0.2s; }
        .progress-text { font-size: 12px; color: #2c7da0; text-align: right; margin-bottom: 16px; display: none; }
        .upload-btn { width: 100%; background: linear-gradient(105deg, #2c7da0, #3a6b8f); color: white; border: none; padding: 14px; border-radius: 40px; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .upload-btn:disabled { background: #b9cfdf; cursor: not-allowed; }
        .result-area { margin-top: 20px; background: #f8fafc; border-radius: 18px; padding: 14px 18px; border-left: 4px solid #2c7da0; display: none; max-height: 240px; overflow-y: auto; font-size: 13px; }
        .result-area.show { display: block; }
        .result-area a { color: #2c7da0; word-break: break-all; }
    </style>
</head>
<body>
<div class="card">
    <div class="card-inner">
        <h2>📎 多文件上传（逐个上传）</h2>
        <div class="sub">单文件接口: <code>/v1/upload</code> 或 <code>/catalog/v1/upload</code> | 字段名 <code>file</code></div>

        <div class="options">
            <label class="option"><input type="checkbox" id="renameCheckbox" checked> 自动重命名</label>
            <label class="option"><input type="checkbox" id="separateCheckbox" checked> 按日分类存储</label>
        </div>

        <div class="upload-area" id="dropZone">
            <div class="upload-icon">📂✨</div>
            <div class="upload-tip">点击选择文件 或 拖拽文件到此处</div>
            <div class="upload-hint">支持多文件，逐个上传，每个文件独立显示地址</div>
            <input type="file" id="fileInput" multiple style="display: none;">
        </div>

        <div class="file-list-container" id="fileListContainer">
            <div id="fileList"></div>
        </div>

        <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText"></div>

        <button class="upload-btn" id="uploadBtn" disabled>🚀 开始上传（逐个）</button>
        <div class="result-area" id="resultArea"></div>
    </div>
</div>

<script>
    (function() {
        // 自动检测是否需要添加 /catalog 前缀
        function getBasePath() {
            // 如果当前页面路径包含 /catalog/（例如 http://xxx/catalog/upload.html），则加上 /catalog
            if (window.location.pathname.includes('/catalog/')) {
                return '/catalog';
            }
            return '';
        }

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileListContainer = document.getElementById('fileListContainer');
        const fileListDiv = document.getElementById('fileList');
        const renameCheckbox = document.getElementById('renameCheckbox');
        const separateCheckbox = document.getElementById('separateCheckbox');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const progressTextSpan = document.getElementById('progressText');
        const resultArea = document.getElementById('resultArea');

        let selectedFiles = [];
        let isUploading = false;

        // 辅助
        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }

        function renderFileList() {
            fileListDiv.innerHTML = '';
            if (selectedFiles.length === 0) {
                fileListContainer.classList.remove('has-files');
                uploadBtn.disabled = true;
                return;
            }
            fileListContainer.classList.add('has-files');
            uploadBtn.disabled = false;

            selectedFiles.forEach((file, idx) => {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.innerHTML = `
                    <div class="file-info">
                        <span class="file-name" title="${escapeHtml(file.name)}">${escapeHtml(file.name)}</span>
                        <span class="file-size">${formatSize(file.size)}</span>
                    </div>
                    <span class="file-status" id="status-${idx}">⏳ 待上传</span>
                    <button class="delete-btn" data-idx="${idx}">🗑️</button>
                `;
                div.querySelector('.delete-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (isUploading) { alert('上传中，请稍后'); return; }
                    selectedFiles.splice(idx, 1);
                    renderFileList();
                    clearResult();
                    hideProgress();
                });
                fileListDiv.appendChild(div);
            });
        }

        function updateFileStatus(index, status, errorMsg = '') {
            const span = document.getElementById(`status-${index}`);
            if (!span) return;
            span.className = 'file-status';
            if (status === 'uploading') {
                span.classList.add('uploading');
                span.textContent = '⏫ 上传中';
            } else if (status === 'success') {
                span.classList.add('success');
                span.textContent = '✅ 成功';
            } else if (status === 'error') {
                span.classList.add('error');
                span.textContent = `❌ ${errorMsg}`;
            } else {
                span.textContent = '⏳ 待上传';
            }
        }

        function hideProgress() {
            progressBar.style.display = 'none';
            progressTextSpan.style.display = 'none';
        }
        function showProgress() {
            progressBar.style.display = 'block';
            progressTextSpan.style.display = 'block';
        }
        function setProgress(percent, text) {
            progressFill.style.width = percent + '%';
            progressTextSpan.innerText = text;
        }

        function clearResult() {
            resultArea.innerHTML = '';
            resultArea.classList.remove('show');
        }

        function showResult(successList, failList) {
            let html = '';
            if (successList.length) {
                html += `<div style="margin-bottom:12px;"><strong>✅ 成功上传 ${successList.length} 个文件：</strong></div>`;
                successList.forEach(item => {
                    html += `<div style="margin-bottom:12px; padding-left:10px;">
                                📄 <strong>${escapeHtml(item.name)}</strong><br>
                                🔗 地址：<a href="${escapeHtml(item.url)}" target="_blank">${escapeHtml(item.url)}</a>
                            </div>`;
                });
            }
            if (failList.length) {
                if (successList.length) html += '<hr>';
                html += `<div style="margin-bottom:6px;"><strong>❌ 失败 ${failList.length} 个：</strong></div>`;
                failList.forEach(item => {
                    html += `<div style="color:#c23d3d; margin-bottom:6px; padding-left:10px;">
                                ❌ ${escapeHtml(item.name)} — ${escapeHtml(item.error)}
                            </div>`;
                });
            }
            resultArea.innerHTML = html;
            resultArea.classList.add('show');
        }

        function buildQueryParams() {
            const rename = renameCheckbox.checked;
            const separate = separateCheckbox.checked;
            return `?rename=${rename}&separateByDate=${separate}`;
        }

        // 获取完整的上传 URL（自动适配 /catalog 前缀）
        function getUploadUrl() {
            const base = getBasePath();
            return `${base}/v1/upload${buildQueryParams()}`;
        }

        // 逐个上传（串行）
        async function uploadSequentially() {
            const total = selectedFiles.length;
            const successList = [];
            const failList = [];

            for (let i = 0; i < total; i++) {
                const file = selectedFiles[i];
                updateFileStatus(i, 'uploading');
                const percent = Math.floor((i / total) * 100);
                setProgress(percent, `正在上传 ${i+1}/${total} : ${file.name}`);

                const formData = new FormData();
                formData.append('file', file);
                const url = getUploadUrl();

                try {
                    const response = await fetch(url, { method: 'POST', body: formData });
                    const text = await response.text();
                    let json;
                    try { json = JSON.parse(text); } catch(e) { throw new Error('响应解析失败'); }
                    if (response.ok && json.code === 200 && json.url) {
                        updateFileStatus(i, 'success');
                        successList.push({ name: file.name, url: json.url });
                    } else {
                        throw new Error(json.message || `HTTP ${response.status}`);
                    }
                } catch (err) {
                    updateFileStatus(i, 'error', err.message);
                    failList.push({ name: file.name, error: err.message });
                }
            }
            setProgress(100, `上传完成 · 成功 ${successList.length} / 失败 ${failList.length}`);
            showResult(successList, failList);
        }

        async function startUpload() {
            if (selectedFiles.length === 0) {
                alert('请先选择文件');
                return;
            }
            if (isUploading) return;
            isUploading = true;
            uploadBtn.disabled = true;
            clearResult();
            showProgress();
            setProgress(0, `准备上传 ${selectedFiles.length} 个文件...`);
            for (let i = 0; i < selectedFiles.length; i++) updateFileStatus(i, 'waiting');

            await uploadSequentially();

            isUploading = false;
            uploadBtn.disabled = (selectedFiles.length === 0);
            if (selectedFiles.length === 0) setTimeout(() => hideProgress(), 2000);
        }

        function addFiles(files) {
            if (isUploading) { alert('上传中，请等待'); return; }
            const valid = Array.from(files).filter(f => f instanceof File && f.size > 0);
            if (valid.length === 0) return;
            selectedFiles = valid;
            renderFileList();
            hideProgress();
            clearResult();
        }

        async function getFilesFromDrag(dataTransfer) {
            const items = dataTransfer.items;
            if (!items) return Array.from(dataTransfer.files);
            const result = [];
            for (let i = 0; i < items.length; i++) {
                const item = items[i];
                if (item.kind === 'file') {
                    const entry = item.webkitGetAsEntry?.();
                    if (entry && entry.isDirectory) continue;
                    const file = item.getAsFile();
                    if (file) result.push(file);
                }
            }
            return result.length ? result : Array.from(dataTransfer.files);
        }

        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', async (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            if (isUploading) { alert('上传中，请稍后'); return; }
            let files;
            try { files = await getFilesFromDrag(e.dataTransfer); } catch (err) { files = Array.from(e.dataTransfer.files); }
            if (files.length) addFiles(files);
        });

        dropZone.addEventListener('click', () => {
            if (isUploading) { alert('上传中，请稍后'); return; }
            fileInput.click();
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files.length) addFiles(e.target.files);
            fileInput.value = '';
        });

        uploadBtn.addEventListener('click', () => {
            if (isUploading) { alert('正在上传中'); return; }
            if (selectedFiles.length === 0) { alert('请先添加文件'); return; }
            startUpload();
        });

        hideProgress();
        renderFileList();
    })();
</script>
</body>
</html>
