<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>分类管理器 - 深色渐变 | 惰性加载树形</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        [v-cloak] { display: none !important; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0f172a 50%, #1a1f35 100%);
            font-family: 'Inter', system-ui, sans-serif;
            padding: 32px;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .app-layout {
            display: flex;
            gap: 28px;
            max-width: 1400px;
            margin: 0 auto;
            flex-wrap: wrap;
        }
        .tree-panel {
            flex: 0 0 460px;
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
            height: fit-content;
            max-height: calc(100vh - 64px);
            display: flex;
            flex-direction: column;
        }
        .tree-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background: rgba(0, 0, 0, 0.2);
        }
        .tree-header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .tree-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: #f1f5f9;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .tree-title i { color: #818cf8; }
        .add-root-btn {
            background: rgba(129, 140, 248, 0.15);
            border: 1px solid rgba(129, 140, 248, 0.4);
            color: #a5b4fc;
            padding: 6px 14px;
            border-radius: 32px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .add-root-btn:hover {
            background: rgba(129, 140, 248, 0.3);
            border-color: #818cf8;
            color: #e0e7ff;
        }
        .search-box {
            position: relative;
            width: 100%;
        }
        .search-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 0.9rem;
        }
        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 40px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #334155;
            border-radius: 40px;
            color: #f1f5f9;
            font-size: 0.85rem;
            transition: 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .search-box input:focus {
            border-color: #818cf8;
            outline: none;
            box-shadow: 0 0 0 3px rgba(129,140,248,0.2);
        }
        .tree-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 12px 12px 20px 16px;
        }
        .tree-node, .tree-node ul, .node-item {
            list-style: none !important;
            margin: 0;
            padding-left: 0;
        }
        .tree-node ul { padding-left: 28px; }
        .node-item { margin: 2px 0; }
        .node-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.9rem;
            color: #cbd5e1;
        }
        .node-content:hover { background: rgba(129,140,248,0.12); color: #f1f5f9; }
        .active-cat {
            background: linear-gradient(135deg, #1e1b4b, #2e1065);
            color: #e0e7ff !important;
            border-left: 3px solid #818cf8;
            font-weight: 500;
        }
        .node-name {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }
        .toggle-box {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 22px;
            height: 22px;
            border: 1px solid #475569;
            border-radius: 6px;
            background: #1e293b;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            color: #94a3b8;
            transition: 0.1s;
            user-select: none;
            flex-shrink: 0;
            box-shadow: 0 1px 1px rgba(0,0,0,0.2);
        }
        .toggle-box:hover {
            background: #334155;
            border-color: #818cf8;
            color: #818cf8;
        }
        .node-icon-img {
            width: 20px;
            height: 20px;
            border-radius: 6px;
            object-fit: cover;
            background: #1e293b;
            flex-shrink: 0;
        }
        .node-actions { display: none; gap: 6px; margin-left: 8px; }
        .node-content:hover .node-actions { display: flex; }
        .node-actions i {
            font-size: 0.7rem;
            padding: 5px;
            border-radius: 8px;
            background: #0f172a;
            color: #94a3b8;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .node-actions i:hover { background: #1e293b; color: #818cf8; }
        .search-highlight {
            background-color: #fef9c3;
            color: #0f172a;
            border-radius: 4px;
            padding: 0 2px;
            font-weight: 600;
        }
        .right-panel { flex: 1; min-width: 560px; }
        .card {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .card-header {
            padding: 20px 28px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .card-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #f1f5f9;
        }
        .card-body { padding: 28px 32px; }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px 32px;
        }
        .full-width { grid-column: 1 / -1; }
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .field-group label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #94a3b8;
            letter-spacing: 0.3px;
        }
        .required-star {
            color: #f87171;
            margin-left: 4px;
            font-size: 0.8rem;
        }
        input, select, textarea {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 11px 16px;
            font-size: 0.9rem;
            transition: 0.2s;
            color: #f1f5f9;
            font-family: 'Inter', monospace;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(129,140,248,0.15);
            outline: none;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 24px;
            justify-content: flex-end;
        }
        button {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #cbd5e1;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        button.primary {
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            border: none;
            color: white;
            box-shadow: 0 4px 8px rgba(79,70,229,0.3);
        }
        button.primary:hover {
            background: linear-gradient(135deg, #4338ca, #4f46e5);
            transform: translateY(-1px);
        }
        button.danger { background: #7f1d1d; border-color: #b91c1c; color: #fecaca; }
        button.danger:hover { background: #991b1b; }
        button.warning { background: #b45309; border-color: #d97706; color: #fffbeb; }
        button.warning:hover { background: #92400e; }
        button.info { background: #065666; border-color: #0891b2; color: #cffafe; }
        button.info:hover { background: #0e7490; }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        hr { margin: 28px 0 20px; border: none; border-top: 1px solid rgba(255,255,255,0.08); }
        .extended-section { background: rgba(0, 0, 0, 0.2); border-radius: 24px; padding: 16px 0 8px; }
        .section-mini-title {
            font-weight: 600;
            margin: 12px 0 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            border-left: 3px solid #818cf8;
            padding-left: 16px;
            color: #e2e8f0;
        }
        .attr-selector {
            background: rgba(30, 41, 59, 0.6);
            border-radius: 20px;
            padding: 12px 18px;
            margin-bottom: 24px;
            border: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 14px;
        }
        .attr-selector-left {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .badge-count {
            background: #1e293b;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #a5b4fc;
            font-weight: 500;
        }
        .attr-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .icon-url-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .icon-url-wrapper input { flex: 1; min-width: 200px; }
        .icon-actions button {
            padding: 8px 16px;
            background: #1e293b;
            border: 1px solid #334155;
            font-size: 0.75rem;
        }
        .modal-mask {
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .modal-container {
            background: #1e293b;
            border-radius: 32px;
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.5);
            overflow: hidden;
            width: auto;
            max-width: 80vw;
            border: 1px solid #334155;
        }
        .modal-header {
            padding: 16px 24px;
            background: #0f172a;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 { color: #f1f5f9; font-size: 1rem; font-weight: 600; }
        .modal-close {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: #94a3b8;
            line-height: 1;
        }
        .modal-close:hover { color: #f87171; }
        .modal-body {
            padding: 24px;
            text-align: center;
            min-width: 300px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .modal-body img {
            max-width: 100%;
            max-height: 60vh;
            border-radius: 20px;
            display: block;
        }
        .preview-error {
            color: #f87171;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .preview-error i { font-size: 3rem; }
        @media (max-width: 1000px) { .tree-panel { flex: 0 0 360px; } }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .tree-node .loading-placeholder {
            padding: 4px 0 4px 32px;
            color: #94a3b8;
            font-size: 0.8rem;
            font-style: italic;
        }
    </style>
</head>
<body>
<div id="vueApp" v-cloak>
    <div class="app-layout">
        <!-- 左侧树形面板 -->
        <div class="tree-panel">
            <div class="tree-header">
                <div class="tree-header-top">
                    <div class="tree-title"><i class="fas fa-folder-tree"></i> 类别</div>
                    <button class="add-root-btn" @click="addRootCategoryPrompt"><i class="fas fa-plus"></i> 根类</button>
                </div>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" v-model="searchKeyword" placeholder="搜索分类..." @input="onSearchInput">
                </div>
            </div>
            <div class="tree-scroll">
                <div v-if="treeLoading" class="loading-placeholder" style="text-align:center; padding:20px;">加载分类树...</div>
                <ul v-else class="tree-node">
                    <tree-item
                            v-for="node in filteredCategoryTree"
                            :key="node.id"
                            :node="node"
                            :active-id="activeCategory.id"
                            :expanded-set="expandedSet"
                            :search-keyword="searchKeyword"
                            @toggle="toggleExpand"
                            @select="selectCategory"
                            @add-child="showAddChildPrompt"
                            @delete-cat="deleteCategoryNode"
                            @lazy-load="lazyLoadChildren"
                    ></tree-item>
                </ul>
                <div v-if="!treeLoading && filteredCategoryTree.length === 0" style="text-align:center; margin-top:20px; color:#64748b;">未找到或暂无分类</div>
            </div>
        </div>

        <!-- 右侧属性区域 -->
        <div class="right-panel">
            <div class="card">
                <div class="card-header"><h2><i class="fas fa-info-circle"></i> 基本属性</h2></div>
                <div class="card-body">
                    <div class="form-grid">
                        <div class="field-group">
                            <label><i class="fas fa-level-up-alt"></i> 上级分类 <span class="required-star">*</span></label>
                            <select v-model="editableCategory.parent_id">
                                <option value="-1">无（顶级分类）</option>
                                <option v-for="cat in flatCategoryList" :value="cat.id" :disabled="cat.id === editableCategory.id">{{ cat.name.name }}</option>
                            </select>
                        </div>
                        <div class="field-group">
                            <label>分类名称 <span class="required-star">*</span></label>
                            <input v-model="editableCategory.name.name" placeholder="例：品质男鞋">
                        </div>
                        <div class="field-group">
                            <label>简称</label>
                            <input v-model="editableCategory.name.shortName" placeholder="简称">
                        </div>
                        <div class="field-group full-width">
                            <label>图标URL</label>
                            <div class="icon-url-wrapper">
                                <input v-model="editableCategory.icon_url" placeholder="https://... 或上传图片">
                                <div class="icon-actions">
                                    <button type="button" @click="triggerFileUpload"><i class="fas fa-cloud-upload-alt"></i> 上传</button>
                                    <button type="button" @click="openModalPreview" :disabled="!editableCategory.icon_url"><i class="fas fa-eye"></i> 预览</button>
                                </div>
                            </div>
                            <input type="file" ref="fileInput" style="display:none" accept="image/*" @change="handleFileUpload">
                        </div>
                        <div class="field-group full-width">
                            <label>描述</label>
                            <textarea rows="2" v-model="editableCategory.description"></textarea>
                        </div>
                    </div>
                    <div class="btn-group">
                        <button @click="restoreOriginal" :disabled="!isModified" class="info"><i class="fas fa-undo-alt"></i> 恢复</button>
                        <button @click="updateCurrentCategory" :disabled="!isModified" class="warning"><i class="fas fa-save"></i> 修改</button>
                        <button @click="deleteCurrentCategory" class="danger"><i class="fas fa-trash"></i> 删除</button>
                    </div>
                    <hr />
                    <div class="extended-section">
                        <div class="section-mini-title"><i class="fas fa-cog"></i> 扩展属性</div>
                        <div class="attr-selector">
                            <div class="attr-selector-left">
                                <label>属性名：</label>
                                <select v-model="selectedExtIdForSelect" @change="onSelectExtFromDropdown">
                                    <option value="">-- 选择属性 --</option>
                                    <option v-for="attr in activeExtList" :value="attr.recordId">{{ attr.displayName }} ({{ attr.fieldName }})</option>
                                </select>
                                <span class="badge-count" v-if="activeExtList.length">共 {{ activeExtList.length }} 个字段</span>
                            </div>
                            <div class="attr-actions">
                                <button @click="saveExtAttribute" :disabled="!isSaveEnabled" class="warning"><i class="fas fa-save"></i> 保存</button>
                                <button @click="deleteExtAttribute" :disabled="!selectedExtId" class="danger"><i class="fas fa-trash"></i> 删除</button>
                                <button @click="clearExtForm" class="info"><i class="fas fa-eraser"></i> 清空</button>
                            </div>
                        </div>
                        <div class="form-grid">
                            <div class="field-group">
                                <label>显示名称 <span class="required-star">*</span></label>
                                <input v-model="extForm.displayName" placeholder="例：颜色">
                            </div>
                            <div class="field-group">
                                <label>别名 <span class="required-star">*</span></label>
                                <input v-model="extForm.fieldName" placeholder="例：YanSe">
                            </div>
                            <div class="field-group">
                                <label>默认值</label>
                                <input v-model="extForm.defaultValue" placeholder="红色、橙色、绿色">
                            </div>
                            <div class="field-group">
                                <label>是否必填</label>
                                <select v-model="extForm.isRequired">
                                    <option>必填</option>
                                    <option>可选</option>
                                </select>
                            </div>
                            <div class="field-group">
                                <label>排序号</label>
                                <input type="number" v-model="extForm.sortOrder">
                            </div>
                        </div>
                        <div class="btn-group" style="justify-content: flex-start; margin-top: 16px;">
                            <button @click="syncToSubClass" :disabled="!hasSubCategories" class="warning"><i class="fas fa-share-alt"></i> 同步应用到子类</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 预览模态框 -->
    <div v-if="modalVisible" class="modal-mask" @click.self="modalVisible = false">
        <div class="modal-container">
            <div class="modal-header">
                <h3><i class="fas fa-image"></i> 图标预览</h3>
                <button class="modal-close" @click="modalVisible = false">&times;</button>
            </div>
            <div class="modal-body">
                <img v-if="!previewError" :src="modalImageUrl" @error="onModalImageError" style="max-width:100%; max-height:60vh; border-radius:20px;">
                <div v-else class="preview-error">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>图片加载失败，请检查URL地址是否有效</span>
                    <span style="font-size:0.7rem; color:#94a3b8;">{{ modalImageUrl }}</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
<script>
    const { createApp, ref, computed, onMounted, watch } = Vue;

    // API 基础 URL
    const API_BASE = 'https://slave.tooo.top/catalog/v1';

    // 通用 fetch 封装
    async function apiFetch(url) {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
    }

    // 获取根分类
    async function fetchRootCategories() {
        const data = await apiFetch(`${API_BASE}/categories/root`);
        return data.categories || [];
    }

    // 获取子分类
    async function fetchChildrenCategories(parentId) {
        const data = await apiFetch(`${API_BASE}/categories/${parentId}/children`);
        return data.categories || [];
    }

    // 获取单个分类详情
    async function fetchCategoryDetail(categoryId) {
        return await apiFetch(`${API_BASE}/categories/${categoryId}`);
    }

    // 将API返回的分类数据转换为前端树节点格式
    function convertApiCategoryToNode(apiCat) {
        return {
            id: apiCat.id,
            name: apiCat.name,
            icon_url: apiCat.icon_url,
            parent_id: apiCat.parent_id,
            description: apiCat.description,
            left: apiCat.left,
            right: apiCat.right,
            family_id: apiCat.family_id,
            depth: 0, // 深度在惰性加载时动态设置
            children: [],          // 子节点数组
            loaded: false,         // 是否已加载过子节点
            hasChildren: !!(apiCat.right && apiCat.right > apiCat.left + 1)  // 根据左右值判断是否有子节点
        };
    }

    const TreeItem = {
        name: 'TreeItem',
        props: ['node', 'activeId', 'expandedSet', 'searchKeyword'],
        emits: ['toggle', 'select', 'add-child', 'delete-cat', 'lazy-load'],
        template: `
          <li class="node-item">
            <div class="node-content" :class="{ 'active-cat': node.id === activeId }" @click="$emit('select', node.id)">
              <div class="node-name">
                <!-- 有子节点才显示 +/- 框 -->
                <span v-if="hasChildren" class="toggle-box" @click.stop="handleToggle">
                    {{ isExpanded ? '−' : '+' }}
                </span>
                <span v-else class="toggle-box" style="visibility: hidden;"></span>
                <img v-if="node.icon_url" :src="node.icon_url" class="node-icon-img" @error="e => e.target.style.display='none'">
                <span v-html="highlightName"></span>
              </div>
              <div class="node-actions">
                <i class="fas fa-plus-circle" title="添加子分类" @click.stop="$emit('add-child', node.id, node.name.name)"></i>
                <i class="fas fa-trash" title="删除分类" @click.stop="$emit('delete-cat', node.id)"></i>
              </div>
            </div>
            <ul class="children" v-if="hasChildren && isExpanded">
              <!-- 懒加载占位 -->
              <div v-if="loadingChildren" class="loading-placeholder">加载中...</div>
              <template v-else>
                <tree-item v-for="child in node.children" :key="child.id" :node="child" :active-id="activeId"
                           :expanded-set="expandedSet" :search-keyword="searchKeyword"
                           @toggle="$emit('toggle', $event)" @select="$emit('select', $event)"
                           @add-child="$emit('add-child', $event[0], $event[1])"
                           @delete-cat="$emit('delete-cat', $event)"
                           @lazy-load="$emit('lazy-load', $event)"></tree-item>
              </template>
            </ul>
          </li>
        `,
        data() {
            return {
                loadingChildren: false
            };
        },
        computed: {
            hasChildren() {
                // 优先使用后端返回的 hasChildren 标志，如果已经加载过则用 children 长度判断
                return this.node.hasChildren === true || (this.node.children && this.node.children.length > 0);
            },
            isExpanded() { return this.expandedSet.has(this.node.id); },
            highlightName() {
                const name = this.node.name.name;
                const kw = this.searchKeyword;
                if (!kw) return name;
                const idx = name.toLowerCase().indexOf(kw.toLowerCase());
                if (idx === -1) return name;
                return name.slice(0, idx) + '<span class="search-highlight">' + name.slice(idx, idx+kw.length) + '</span>' + name.slice(idx+kw.length);
            }
        },
        methods: {
            async handleToggle() {
                // 先展开/收缩 UI
                this.$emit('toggle', this.node.id);
                // 如果节点有子节点且未加载过，则触发懒加载
                if (this.node.hasChildren && !this.node.loaded && !this.isExpanded) {
                    this.loadingChildren = true;
                    try {
                        await this.$emit('lazy-load', this.node.id);
                    } finally {
                        this.loadingChildren = false;
                    }
                }
            }
        }
    };

    createApp({
        components: { TreeItem },
        setup() {
            // ---------- 状态定义 ----------
            const categories = ref([]);           // 扁平分类列表（用于上级下拉等）
            const categoryTree = ref([]);          // 树形结构根节点列表
            const activeCategory = ref(null);
            const originalCategoryBackup = ref(null);
            const editableCategory = ref({ name: { name: '', shortName: '' }, icon_url: null, description: '', parent_id: -1 });
            const allExtAttrs = ref([]);            // 扩展属性（此处保留静态演示数据，实际可从 API 加载）
            const searchKeyword = ref('');
            const treeLoading = ref(true);
            const expandedSet = ref(new Set());

            // ---------- 辅助函数 ----------
            function setDepthForTree(nodes, currentDepth) {
                for (const node of nodes) {
                    node.depth = currentDepth;
                    if (node.children && node.children.length) {
                        setDepthForTree(node.children, currentDepth + 1);
                    }
                }
            }

            // 递归设置 hasChildren 标志（基于左右值）
            function updateHasChildrenFlag(nodes) {
                for (const node of nodes) {
                    // 根据左右值差值判断是否有子节点
                    node.hasChildren = (node.right && node.right > node.left + 1);
                    if (node.children && node.children.length) {
                        updateHasChildrenFlag(node.children);
                    }
                }
            }

            // 构建树形结构（从根列表）
            function buildTreeFromRoots(roots) {
                // 由于后端数据已经是完整的树形，children 需要单独加载，所以根节点 children 置空
                return roots.map(root => {
                    const node = convertApiCategoryToNode(root);
                    node.children = [];
                    node.loaded = false;
                    return node;
                });
            }

            // 扁平化树（用于上级分类下拉）
            function flattenTree(nodes, arr = []) {
                for (const node of nodes) {
                    arr.push(node);
                    if (node.children && node.children.length) {
                        flattenTree(node.children, arr);
                    }
                }
                return arr;
            }

            // 根据 ID 查找节点
            function findNodeById(nodes, id) {
                for (const node of nodes) {
                    if (node.id == id) return node;
                    if (node.children) {
                        const found = findNodeById(node.children, id);
                        if (found) return found;
                    }
                }
                return null;
            }

            // 刷新扁平分类列表和树深度
            function refreshCategoriesAndDepth() {
                const flattened = flattenTree(categoryTree.value);
                categories.value = flattened;
                setDepthForTree(categoryTree.value, 0);
                updateHasChildrenFlag(categoryTree.value);
            }

            // 懒加载子节点
            async function lazyLoadChildren(parentId) {
                const parentNode = findNodeById(categoryTree.value, parentId);
                if (!parentNode || parentNode.loaded) return;
                try {
                    const childrenData = await fetchChildrenCategories(parentId);
                    const childrenNodes = childrenData.map(child => {
                        const node = convertApiCategoryToNode(child);
                        node.parent_id = parentId;
                        node.depth = parentNode.depth + 1;
                        node.children = [];
                        node.loaded = false;
                        return node;
                    });
                    parentNode.children = childrenNodes;
                    parentNode.loaded = true;
                    // 更新父节点的 hasChildren 标志
                    parentNode.hasChildren = childrenNodes.length > 0;
                    refreshCategoriesAndDepth();
                } catch (err) {
                    console.error(`加载子分类 ${parentId} 失败:`, err);
                    alert(`加载子分类失败: ${err.message}`);
                }
            }

            // 初始化加载根分类
            async function loadRootCategories() {
                treeLoading.value = true;
                try {
                    const roots = await fetchRootCategories();
                    console.log(roots)
                    categoryTree.value = buildTreeFromRoots(roots);
                    // 展开所有根节点以便显示
                    const rootIds = categoryTree.value.map(r => r.id);
                    rootIds.forEach(id => expandedSet.value.add(id));
                    refreshCategoriesAndDepth();
                    // 默认选中第一个根分类
                    if (categoryTree.value.length > 0) {
                        selectCategory(categoryTree.value[0].id);
                    }
                } catch (err) {
                    console.error('加载根分类失败:', err);
                    alert(`加载分类树失败: ${err.message}`);
                } finally {
                    treeLoading.value = false;
                }
            }

            // 重新加载整个树（刷新）
            async function reloadTree() {
                await loadRootCategories();
                // 保持当前选中
                if (activeCategory.value && activeCategory.value.id) {
                    const found = findNodeById(categoryTree.value, activeCategory.value.id);
                    if (found) selectCategory(activeCategory.value.id);
                }
            }

            // 选中分类
            async function selectCategory(id) {
                try {
                    // 优先从本地数据找，如果找不到再从 API 拉取详情
                    let found = findNodeById(categoryTree.value, id);
                    if (!found) {
                        // 当从上级下拉选择了一个未加载的节点时，尝试拉取详情
                        const detail = await fetchCategoryDetail(id);
                        found = convertApiCategoryToNode(detail);
                        // 将临时节点加入 categories 以便展示
                        categories.value.push(found);
                    }
                    if (found) {
                        activeCategory.value = JSON.parse(JSON.stringify(found));
                        editableCategory.value = JSON.parse(JSON.stringify(found));
                        originalCategoryBackup.value = JSON.parse(JSON.stringify(found));
                    }
                } catch (err) {
                    console.error('加载分类详情失败:', err);
                }
            }

            // 更新当前分类（调用 API 更新）
            async function updateCurrentCategory() {
                if (!editableCategory.value.name.name || !editableCategory.value.name.name.trim()) {
                    alert("分类名称不能为空");
                    return;
                }
                if (!isModified.value) {
                    alert("无修改");
                    return;
                }
                // 构建请求体
                const payload = {
                    id: activeCategory.value.id,
                    name: editableCategory.value.name,
                    icon_url: editableCategory.value.icon_url,
                    description: editableCategory.value.description,
                    parent_id: editableCategory.value.parent_id
                };
                // 这里模拟 PUT 请求，实际可改为真实接口
                try {
                    // 假设更新接口为 PUT /categories/{id}
                    const response = await fetch(`${API_BASE}/categories/${activeCategory.value.id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error('更新失败');
                    // 更新本地树中的数据
                    const target = findNodeById(categoryTree.value, activeCategory.value.id);
                    if (target) {
                        target.name = editableCategory.value.name;
                        target.icon_url = editableCategory.value.icon_url;
                        target.description = editableCategory.value.description;
                        target.parent_id = editableCategory.value.parent_id;
                    }
                    // 刷新扁平列表和深度
                    refreshCategoriesAndDepth();
                    // 重新选中以刷新界面
                    await selectCategory(activeCategory.value.id);
                    alert("更新成功");
                } catch (err) {
                    console.error(err);
                    alert(`更新失败: ${err.message}`);
                }
            }

            // 删除分类
            async function deleteCategoryNode(id) {
                const cat = findNodeById(categoryTree.value, id);
                if (!cat) return;
                if (cat.parent_id === -1 && categoryTree.value.length <= 1) {
                    alert("至少保留一个顶级分类，不可删除");
                    return;
                }
                if (!confirm(`永久删除分类“${cat.name.name}”及其所有子类？`)) return;
                try {
                    const response = await fetch(`${API_BASE}/categories/${id}`, { method: 'DELETE' });
                    if (!response.ok) throw new Error('删除失败');
                    // 删除成功，重新加载整个树
                    await reloadTree();
                } catch (err) {
                    console.error(err);
                    alert(`删除失败: ${err.message}`);
                }
            }
            function deleteCurrentCategory() { if (activeCategory.value && activeCategory.value.id) deleteCategoryNode(activeCategory.value.id); }

            // 添加子分类
            async function showAddChildPrompt(parentId, parentName) {
                const newName = prompt(`在“${parentName}”下新增子分类`, "新分类");
                if (!newName) return;
                const newCat = {
                    name: { name: newName, shortName: newName.slice(0, 2) },
                    icon_url: null,
                    parent_id: parentId,
                    description: `新建分类 ${newName}`
                };
                try {
                    const response = await fetch(`${API_BASE}/categories`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(newCat)
                    });
                    if (!response.ok) throw new Error('创建失败');
                    const created = await response.json();
                    await reloadTree();
                    if (created.id) selectCategory(created.id);
                } catch (err) {
                    console.error(err);
                    alert(`添加失败: ${err.message}`);
                }
            }

            // 添加根分类
            async function addRootCategoryPrompt() {
                const name = prompt("新建根分类");
                if (!name) return;
                const newRoot = {
                    name: { name, shortName: name.slice(0, 2) },
                    icon_url: null,
                    parent_id: -1,
                    description: `顶级分类 ${name}`
                };
                try {
                    const response = await fetch(`${API_BASE}/categories`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(newRoot)
                    });
                    if (!response.ok) throw new Error('创建失败');
                    await reloadTree();
                } catch (err) {
                    console.error(err);
                    alert(`添加失败: ${err.message}`);
                }
            }

            // 编辑名称（快捷编辑）
            async function editCategoryPrompt(catId) {
                const cat = findNodeById(categoryTree.value, catId);
                if (!cat) return;
                const newName = prompt("编辑分类名称", cat.name.name);
                if (newName && newName.trim()) {
                    const payload = {
                        id: cat.id,
                        name: { name: newName.trim(), shortName: cat.name.shortName },
                        icon_url: cat.icon_url,
                        description: cat.description,
                        parent_id: cat.parent_id
                    };
                    try {
                        const response = await fetch(`${API_BASE}/categories/${cat.id}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        if (!response.ok) throw new Error('更新失败');
                        await reloadTree();
                        if (activeCategory.value && activeCategory.value.id === cat.id) {
                            selectCategory(cat.id);
                        }
                    } catch (err) {
                        console.error(err);
                        alert(`编辑失败: ${err.message}`);
                    }
                }
            }

            // 图标上传与预览
            const fileInput = ref(null);
            const triggerFileUpload = () => fileInput.value.click();
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (file && file.type.startsWith('image/')) {
                    editableCategory.value.icon_url = URL.createObjectURL(file);
                    e.target.value = '';
                } else alert("请选择图片");
            };
            const modalVisible = ref(false);
            const modalImageUrl = ref('');
            const previewError = ref(false);
            const openModalPreview = () => {
                const url = editableCategory.value.icon_url;
                if (url && url.trim() !== '') {
                    modalImageUrl.value = url;
                    previewError.value = false;
                    modalVisible.value = true;
                } else {
                    alert("无图标URL或URL为空");
                }
            };
            const onModalImageError = () => { previewError.value = true; };

            // 扩展属性模块（静态演示，保留原有逻辑）
            const extForm = ref({ displayName: '', fieldName: '', defaultValue: '', isRequired: '可选', sortOrder: 0 });
            const extBackup = ref({ displayName: '', fieldName: '', defaultValue: '', isRequired: '可选', sortOrder: 0 });
            const selectedExtId = ref(null);
            const selectedExtIdForSelect = ref('');
            const activeExtList = ref([]);   // 扩展属性暂不接入 API
            const isSaveEnabled = computed(() => {
                const hasContent = extForm.value.displayName || extForm.value.fieldName;
                if (!hasContent) return false;
                if (selectedExtId.value) {
                    return extForm.value.displayName !== extBackup.value.displayName ||
                        extForm.value.fieldName !== extBackup.value.fieldName ||
                        extForm.value.defaultValue !== extBackup.value.defaultValue ||
                        extForm.value.isRequired !== extBackup.value.isRequired ||
                        extForm.value.sortOrder !== extBackup.value.sortOrder;
                } else {
                    return true;
                }
            });
            function clearExtForm() {
                extForm.value = { displayName: '', fieldName: '', defaultValue: '', isRequired: '可选', sortOrder: 0 };
                extBackup.value = { displayName: '', fieldName: '', defaultValue: '', isRequired: '可选', sortOrder: 0 };
                selectedExtId.value = null;
                selectedExtIdForSelect.value = '';
            }
            function onSelectExtFromDropdown() {
                const rid = selectedExtIdForSelect.value;
                if (rid) {
                    const attr = allExtAttrs.value.find(a => a.recordId === rid);
                    if (attr && attr.classId === activeCategory.value.id) {
                        const newForm = {
                            displayName: attr.displayName,
                            fieldName: attr.fieldName,
                            defaultValue: attr.defaultValue || '',
                            isRequired: attr.isRequired,
                            sortOrder: attr.sortOrder
                        };
                        extForm.value = { ...newForm };
                        extBackup.value = { ...newForm };
                        selectedExtId.value = attr.recordId;
                    } else {
                        selectedExtIdForSelect.value = '';
                    }
                } else {
                    clearExtForm();
                }
            }
            function saveExtAttribute() {
                if (!extForm.value.displayName || !extForm.value.displayName.trim()) { alert("显示名称不能为空"); return; }
                if (!extForm.value.fieldName || !extForm.value.fieldName.trim()) { alert("别名不能为空"); return; }
                const currentAlias = extForm.value.fieldName.trim();
                let duplicate = false;
                if (selectedExtId.value) {
                    duplicate = activeExtList.value.some(a => a.fieldName === currentAlias && a.recordId !== selectedExtId.value);
                } else {
                    duplicate = activeExtList.value.some(a => a.fieldName === currentAlias);
                }
                if (duplicate) { alert("别名已存在，请使用其他别名"); return; }
                if (selectedExtId.value) {
                    const idx = allExtAttrs.value.findIndex(a => a.recordId === selectedExtId.value);
                    if (idx !== -1) {
                        allExtAttrs.value[idx] = {
                            ...allExtAttrs.value[idx],
                            displayName: extForm.value.displayName,
                            fieldName: extForm.value.fieldName,
                            defaultValue: extForm.value.defaultValue,
                            isRequired: extForm.value.isRequired,
                            sortOrder: extForm.value.sortOrder
                        };
                        extBackup.value = { ...extForm.value };
                        alert("属性更新成功");
                    }
                } else {
                    const newAttr = {
                        recordId: generateUUID(),
                        classId: activeCategory.value.id,
                        displayName: extForm.value.displayName,
                        fieldName: extForm.value.fieldName,
                        defaultValue: extForm.value.defaultValue,
                        isRequired: extForm.value.isRequired,
                        sortOrder: extForm.value.sortOrder || (activeExtList.value.length + 1),
                        autoId: newAutoId()
                    };
                    allExtAttrs.value.push(newAttr);
                    clearExtForm();
                    alert(`属性 "${newAttr.displayName}" 添加成功`);
                }
            }
            function deleteExtAttribute() {
                if (!selectedExtId.value) { alert("请选择要删除的属性"); return; }
                if (confirm("永久删除此扩展属性？")) {
                    allExtAttrs.value = allExtAttrs.value.filter(a => a.recordId !== selectedExtId.value);
                    clearExtForm();
                }
            }
            function syncToSubClass() { alert("演示: 扩展属性同步子类完成"); }

            // 生成唯一ID（用于扩展属性）
            function generateUUID() { return `${Date.now()}-${Math.random().toString(36).substr(2, 8)}`; }
            let lastAutoId = 500;
            function newAutoId() { return ++lastAutoId; }

            // 计算属性
            const flatCategoryList = computed(() => categories.value.filter(c => c.id !== (activeCategory.value?.id)));
            const isModified = computed(() => {
                const c = editableCategory.value, o = originalCategoryBackup.value;
                if (!c || !o) return false;
                return c.name?.name !== o.name?.name || c.name?.shortName !== o.name?.shortName ||
                    c.icon_url !== o.icon_url || c.description !== o.description || c.parent_id !== o.parent_id;
            });
            const hasSubCategories = computed(() => {
                return categories.value.some(c => c.parent_id === activeCategory.value?.id);
            });
            const filteredCategoryTree = computed(() => {
                // 简单客户端搜索（仅匹配名称，不处理惰性加载节点的未加载子节点）
                if (!searchKeyword.value) return categoryTree.value;
                const lower = searchKeyword.value.toLowerCase();
                const filter = (nodes) => {
                    return nodes.filter(node => {
                        const match = node.name.name.toLowerCase().includes(lower);
                        if (match) return true;
                        if (node.children && node.children.length) {
                            node.children = filter(node.children);
                            return node.children.length > 0;
                        }
                        return false;
                    });
                };
                return filter(JSON.parse(JSON.stringify(categoryTree.value)));
            });

            // 恢复原始值
            function restoreOriginal() {
                if (isModified.value) editableCategory.value = JSON.parse(JSON.stringify(originalCategoryBackup.value));
            }

            // 展开/收缩
            function toggleExpand(id) {
                const set = new Set(expandedSet.value);
                if (set.has(id)) set.delete(id); else set.add(id);
                expandedSet.value = set;
            }

            // 搜索时自动展开匹配节点
            function onSearchInput() {
                if (!searchKeyword.value) {
                    // 清空搜索时恢复默认展开（所有根节点）
                    const rootIds = categoryTree.value.map(r => r.id);
                    rootIds.forEach(id => expandedSet.value.add(id));
                } else {
                    // 简单展开所有匹配节点的父级
                    const expanded = new Set(expandedSet.value);
                    const traverse = (nodes, ancestors) => {
                        for (const node of nodes) {
                            const curAnc = [...ancestors, node.id];
                            if (node.name.name.toLowerCase().includes(searchKeyword.value.toLowerCase())) {
                                curAnc.forEach(id => expanded.add(id));
                            }
                            if (node.children && node.children.length) traverse(node.children, curAnc);
                        }
                    };
                    traverse(categoryTree.value, []);
                    expandedSet.value = expanded;
                }
            }

            onMounted(async () => {
                await loadRootCategories();
            });

            return {
                // 树相关
                categoryTree, filteredCategoryTree, expandedSet, toggleExpand, treeLoading,
                searchKeyword, onSearchInput, selectCategory, lazyLoadChildren,
                showAddChildPrompt, addRootCategoryPrompt, editCategoryPrompt,
                deleteCategoryNode, deleteCurrentCategory,
                // 表单相关
                activeCategory, editableCategory, flatCategoryList, isModified, restoreOriginal,
                updateCurrentCategory, hasSubCategories,
                // 扩展属性
                activeExtList, extForm, selectedExtId, selectedExtIdForSelect, isSaveEnabled,
                clearExtForm, onSelectExtFromDropdown, saveExtAttribute, deleteExtAttribute,
                syncToSubClass,
                // 图标上传预览
                fileInput, triggerFileUpload, handleFileUpload,
                modalVisible, modalImageUrl, previewError, openModalPreview, onModalImageError
            };
        }
    }).mount('#vueApp');
</script>
</body>
</html>
