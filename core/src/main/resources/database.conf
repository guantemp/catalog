#hikari = {
#dataSourceClassName = org.postgresql.ds.PGSimpleDataSource
#-------------连接池大小相关参数--------------------------------
#最大连接池数量,默认为10。可通过JMX动态修改
#core_count 实际的核心数
#effective_spindle_count 是指机械硬盘有效的中心主轴（spindle）数量,如果数据,可以完全 cache 到内存则取 0，否则随着 cache 命中率降低，则这个数值会变高。
#connections = ((core_count * 2) + effective_spindle_count)
#connections = ((4 * 2) + 1)  4个物理核心，1个硬盘（或者raid硬盘，通常是1）
#maximumPoolSize = 5
#最小空闲连接数量，建议不要设置此值
#默认与maximumPoolSize一致。可通过JMX动态修改
#minimumIdle=0
# }
datasources = {
  write = {
    strategy = "database-sharding"# 可选策略：database-sharding, table-sharding, none
    shardingAlgorithm = com.hoprxi.infrastructure.sharding.MyTablePreciseShardingAlgorithm
    shards = [
      {
        id = "shard0"
        db = ${postgresql}
        hikari = {
          dataSourceClassName = "org.postgresql.ds.PGSimpleDataSource"
          maximumPoolSize = 10
          connectionTimeout = 30000
          idleTimeout = 600000
          maxLifetime = 1800000
        }
      },
      {
        id = "shard1"
        db = ${postgresql}
        hikari = {
          dataSourceClassName = "org.postgresql.ds.PGSimpleDataSource"
          maximumPoolSize = 5
        }
      },{
        id = "shard2"
        db = ${common-es}
      }
      # 可继续添加 shard2, shard3..
    ]
  }
  read = {
    database = ${common-es}
  }
}

