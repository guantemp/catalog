<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Catalog 后台管理 · 一体化工作台</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap"
          rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1"
          rel="stylesheet"/>
    <style>
        /* ===== 全局样式 ===== */
        [v-cloak] {
            display: none !important;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at 20% 30%, #0f172a, #070b14);
            font-family: 'Inter', system-ui, sans-serif;
            color: #e2e8f0;
            overflow: hidden;
            height: 100vh;
        }

        .global-layout {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        /* ===== 顶部导航已完全删除 ===== */

        /* ===== 主体 ===== */
        .main-body {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding-top: 0;
        }

        /* ===== 侧边栏 ———— 宽度 200px ===== */
        .saas-sidebar {
            width: 200px;
            flex-shrink: 0;
            background: rgba(8, 12, 24, 0.92);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(129, 140, 248, 0.12);
            color: rgba(255, 255, 255, 0.75);
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 2px 0 16px rgba(0, 0, 0, 0.3);
            transition: width 0.25s ease;
            overflow: hidden;
            position: relative;
        }

        .saas-sidebar.collapsed {
            width: 56px;
        }

        .saas-sidebar.collapsed .nav-item span:last-child {
            display: none;
        }

        .saas-sidebar.collapsed .nav-item {
            justify-content: center;
            padding: 10px 4px;
        }

        .saas-sidebar.collapsed .nav-item .material-symbols-outlined {
            font-size: 22px;
        }

        .saas-sidebar.collapsed .collapse-btn span {
            display: none;
        }

        .saas-sidebar.collapsed .collapse-btn i {
            transform: rotate(180deg);
        }

        .saas-sidebar.collapsed .collapse-btn {
            justify-content: center;
            padding: 14px 0;
        }

        .saas-sidebar.collapsed .sidebar-search-wrap {
            display: none;
        }

        .saas-sidebar.collapsed .sidebar-brand .brand-text {
            display: none;
        }

        .saas-sidebar.collapsed .sidebar-brand {
            justify-content: center;
            padding: 12px 0 8px 0;
        }

        .saas-sidebar.collapsed .sidebar-brand .material-symbols-outlined {
            font-size: 28px;
            margin: 0;
        }

        /* ===== 侧边栏顶部：logo + 店名 ===== */
        .sidebar-brand {
            padding: 14px 16px 8px 16px;
            font-size: 15px;
            font-weight: 600;
            color: #f1f5f9;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            user-select: none;
            border-bottom: 1px solid rgba(129, 140, 248, 0.08);
            transition: all 0.25s ease;
        }

        .sidebar-brand .material-symbols-outlined {
            font-size: 28px;
            color: #818cf8;
            flex-shrink: 0;
        }

        .sidebar-brand .brand-text {
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 16px;
            letter-spacing: 0.5px;
            font-weight: 700;
            transition: opacity 0.2s;
        }

        /* ===== 侧边栏搜索框 ===== */
        .sidebar-search-wrap {
            padding: 8px 14px 12px 14px;
            border-bottom: 1px solid rgba(129, 140, 248, 0.06);
        }

        .sidebar-search-wrap .search-box-inner {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #334155;
            border-radius: 40px;
            padding: 0 12px 0 34px;
            height: 36px;
            transition: 0.25s;
        }

        .sidebar-search-wrap .search-box-inner:focus-within {
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.15);
            background: rgba(15, 23, 42, 0.95);
        }

        .sidebar-search-wrap .search-box-inner .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 14px;
            pointer-events: none;
        }

        .sidebar-search-wrap .search-box-inner input {
            background: transparent;
            border: none;
            outline: none;
            color: #f1f5f9;
            font-size: 0.85rem;
            width: 100%;
            padding: 0;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .sidebar-search-wrap .search-box-inner input::placeholder {
            color: #94a3b8;
            font-size: 0.8rem;
        }

        .sidebar-search-wrap .searching-indicator-side {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #818cf8;
            font-size: 14px;
        }

        /* ===== 导航菜单 ===== */
        .nav-menu {
            flex: 1;
            padding: 8px 0 12px 0;
            overflow-y: auto;
        }

        .nav-menu::-webkit-scrollbar {
            width: 3px;
        }

        .nav-menu::-webkit-scrollbar-track {
            background: transparent;
        }

        .nav-menu::-webkit-scrollbar-thumb {
            background: #2d3a4a;
            border-radius: 4px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            color: rgba(255, 255, 255, 0.55);
            border-left: 3px solid transparent;
            white-space: nowrap;
            margin: 1px 0;
            border-radius: 0 6px 6px 0;
        }

        .nav-item:hover {
            background: rgba(129, 140, 248, 0.08);
            color: #ffffff;
            border-left-color: #818cf8;
        }

        .nav-item.active {
            background: linear-gradient(90deg, rgba(129, 140, 248, 0.12), transparent);
            color: #ffffff;
            border-left-color: #818cf8;
            font-weight: 600;
        }

        .nav-item .material-symbols-outlined {
            font-size: 22px;
            flex-shrink: 0;
        }

        .nav-item span:last-child {
            font-size: 14px;
        }

        .nav-divider {
            height: 1px;
            background: rgba(129, 140, 248, 0.06);
            margin: 4px 12px;
        }

        .collapse-btn {
            margin-top: auto;
            padding: 12px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid rgba(129, 140, 248, 0.08);
            color: rgba(255, 255, 255, 0.35);
            transition: background 0.2s;
            font-size: 13px;
            user-select: none;
        }

        .collapse-btn:hover {
            background: rgba(129, 140, 248, 0.08);
            color: #fff;
        }

        .collapse-btn i {
            font-size: 14px;
            transition: transform 0.25s ease;
        }

        /* ===== 主内容区（允许下拉溢出） ===== */
        .main-content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: visible !important;
            background: transparent;
        }

        /* ===== Tab 栏 ===== */
        .tab-bar {
            flex-shrink: 0;
            height: 44px;
            background: rgba(8, 12, 24, 0.85);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(129, 140, 248, 0.08);
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 0;
            user-select: none;
            overflow: visible !important;
            position: relative;
            z-index: 100;
        }

        .tab-list {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 2px;
            overflow-x: auto;
            height: 100%;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            overflow-y: visible;
        }

        .tab-list::-webkit-scrollbar {
            height: 3px;
        }

        .tab-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .tab-list::-webkit-scrollbar-thumb {
            background: #3A4A5A;
            border-radius: 4px;
        }

        .tab-item {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px 4px 14px;
            border-radius: 16px 16px 0 0;
            background: transparent;
            color: #94a3b8;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            position: relative;
            height: 34px;
            border: none;
            font-family: 'Inter', sans-serif;
            flex-shrink: 0;
        }

        .tab-item:hover {
            background: rgba(129, 140, 248, 0.06);
            color: #e2e8f0;
        }

        .tab-item.active {
            background: rgba(129, 140, 248, 0.10);
            color: #f1f5f9;
            border-bottom: 2px solid #818cf8;
        }

        .tab-item .tab-close {
            font-size: 14px;
            color: #94a3b8;
            cursor: pointer;
            padding: 0 4px;
            border-radius: 50%;
            transition: 0.2s;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .tab-item .tab-close:hover {
            background: rgba(239, 68, 68, 0.25);
            color: #f87171;
            border-color: #f87171;
            transform: scale(1.1);
        }

        .tab-item .tab-icon {
            font-size: 16px;
            color: #818cf8;
        }

        .tab-item.dashboard-tab .tab-close {
            display: none;
        }

        .tab-item.dashboard-tab {
            padding-right: 14px;
        }

        /* ===== 右侧操作区 ===== */
        .tab-actions {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 12px;
            padding-left: 16px;
            border-left: 1px solid rgba(129, 140, 248, 0.10);
            height: 100%;
            margin-left: 4px;
            position: relative;
            z-index: 200;
        }

        .tab-actions .notification-icon {
            position: relative;
            cursor: pointer;
            color: #94a3b8;
            font-size: 20px;
            transition: 0.2s;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tab-actions .notification-icon:hover {
            color: #f1f5f9;
        }

        .tab-actions .notification-icon .badge {
            position: absolute;
            top: -2px;
            right: -4px;
            background: #ef4444;
            color: #fff;
            font-size: 10px;
            font-weight: 600;
            border-radius: 50%;
            min-width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.4);
        }

        .tab-actions .user-dropdown {
            position: relative;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 2px 8px 2px 2px;
            border-radius: 40px;
            transition: background 0.15s;
            user-select: none;
            height: 34px;
        }

        .tab-actions .user-dropdown:hover {
            background: rgba(129, 140, 248, 0.08);
        }

        .tab-actions .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4f46e5, #818cf8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 13px;
            color: #fff;
            flex-shrink: 0;
        }

        .tab-actions .username {
            font-size: 13px;
            font-weight: 500;
            color: #e2e8f0;
        }

        .tab-actions .chevron {
            font-size: 12px;
            color: #64748b;
            transition: transform 0.25s;
        }

        .tab-actions .chevron.open {
            transform: rotate(180deg);
        }

        .tab-actions .dropdown-menu {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: #1A2434;
            border: 1px solid #2A3A4A;
            border-radius: 16px;
            min-width: 180px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            z-index: 9999;
            padding: 6px 0;
            transform-origin: top right;
            animation: dropdownFadeIn 0.2s ease;
            display: none;
        }

        .tab-actions .dropdown-menu.open {
            display: block;
        }

        @keyframes dropdownFadeIn {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(-6px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .tab-actions .dropdown-menu .dropdown-item {
            padding: 10px 18px;
            color: #C8DCF0;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: background 0.15s;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-family: inherit;
        }

        .tab-actions .dropdown-menu .dropdown-item:hover {
            background: rgba(45, 156, 219, 0.12);
            color: #fff;
        }

        .tab-actions .dropdown-menu .dropdown-item i {
            width: 18px;
            font-size: 14px;
            color: #7F8AA8;
            transition: color 0.15s;
        }

        .tab-actions .dropdown-menu .dropdown-item:hover i {
            color: #7AC9FF;
        }

        .tab-actions .dropdown-menu .dropdown-divider {
            height: 1px;
            background: #2A3A4A;
            margin: 4px 12px;
        }

        .tab-actions .dropdown-menu .dropdown-item.danger {
            color: #FFB4A2;
        }

        .tab-actions .dropdown-menu .dropdown-item.danger i {
            color: #DC4C4C;
        }

        .tab-actions .dropdown-menu .dropdown-item.danger:hover {
            background: rgba(220, 76, 76, 0.12);
            color: #FFB4A2;
        }

        .tab-actions .dropdown-menu .dropdown-item.danger:hover i {
            color: #FF6B6B;
        }

        .tab-actions .help-icon {
            cursor: pointer;
            color: #94a3b8;
            font-size: 20px;
            transition: 0.2s;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tab-actions .help-icon:hover {
            color: #f1f5f9;
        }

        /* ===== iframe 容器 ===== */
        .iframe-wrapper {
            flex: 1;
            padding: 0;
            overflow: hidden;
        }

        .iframe-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 0;
            background: #0f172a;
            display: block;
        }

        /* =========================================================
                   【已有】帮助模态框样式（保持不变）
                   ========================================================= */
        .help-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(6px);
            z-index: 99999;
            display: none;
            align-items: center;
            justify-content: center;
            animation: modalFadeIn 0.25s ease;
            padding: 20px;
        }

        .help-modal-overlay.active {
            display: flex;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .help-modal-box {
            background: #1A2434;
            border: 1px solid rgba(129, 140, 248, 0.25);
            border-radius: 20px;
            width: 100%;
            max-width: 860px;
            height: 90vh;
            max-height: 700px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                transform: scale(0.95) translateY(20px);
                opacity: 0;
            }
            to {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        .help-modal-header {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(129, 140, 248, 0.10);
            background: rgba(8, 12, 24, 0.5);
        }

        .help-modal-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: #f1f5f9;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .help-modal-header h3 i {
            color: #818cf8;
            font-size: 18px;
        }

        .help-modal-close {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 24px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: 0.2s;
            line-height: 1;
        }

        .help-modal-close:hover {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
        }

        .help-modal-body {
            flex: 1;
            overflow: hidden;
            padding: 0;
            background: #0f172a;
        }

        .help-modal-body iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .saas-sidebar {
                width: 56px;
            }

            .saas-sidebar.collapsed {
                width: 56px;
            }

            .saas-sidebar .nav-item span:last-child {
                display: none !important;
            }

            .saas-sidebar .nav-item {
                justify-content: center;
                padding: 10px 4px;
            }

            .saas-sidebar .collapse-btn span {
                display: none !important;
            }

            .saas-sidebar .collapse-btn {
                justify-content: center;
                padding: 12px 0;
            }

            .saas-sidebar .collapse-btn i {
                transform: rotate(180deg);
            }

            .saas-sidebar .sidebar-brand .brand-text {
                display: none !important;
            }

            .saas-sidebar .sidebar-brand {
                justify-content: center;
                padding: 12px 0 8px 0;
            }

            .saas-sidebar .sidebar-search-wrap {
                display: none !important;
            }

            .tab-bar {
                padding: 0 8px;
                height: 38px;
            }

            .tab-item {
                font-size: 12px;
                padding: 3px 8px 3px 10px;
                height: 30px;
            }

            .tab-item .tab-close {
                width: 18px;
                height: 18px;
                font-size: 12px;
            }

            .tab-actions {
                gap: 8px;
                padding-left: 10px;
            }

            .tab-actions .notification-icon {
                font-size: 17px;
            }

            .tab-actions .help-icon {
                font-size: 17px;
            }

            .tab-actions .username {
                display: none;
            }

            .tab-actions .user-avatar {
                width: 24px;
                height: 24px;
                font-size: 11px;
            }

            .tab-actions .user-dropdown {
                padding: 2px 4px 2px 2px;
            }

            .iframe-wrapper {
                padding: 0;
            }

            .help-modal-box {
                max-width: 100%;
                height: 95vh;
                max-height: 95vh;
                border-radius: 12px;
            }
        }

        @media (max-width: 480px) {
            .tab-actions .notification-icon .badge {
                font-size: 9px;
                min-width: 16px;
                height: 16px;
            }
        }
    </style>
</head>
<body>
<div class="global-layout">
    <!-- ===== 顶部导航已完全删除 ===== -->

    <div class="main-body">
        <!-- 侧边栏 -->
        <aside class="saas-sidebar" id="sidebar">
            <div class="sidebar-brand">
                <span class="material-symbols-outlined" title="重庆夏至店">storefront</span>
                <span class="brand-text">重庆夏至店</span>
            </div>
            <div class="sidebar-search-wrap">
                <div class="search-box-inner">
                    <i class="fas fa-search search-icon"></i>
                    <input id="globalSearchInput" placeholder="搜索菜单..." type="text"/>
                    <span class="searching-indicator-side" id="globalSearchIndicator" style="display:none;"><i
                            class="fas fa-spinner fa-pulse"></i></span>
                </div>
            </div>
            <div class="nav-menu">
                <div class="nav-item active" data-view="dashboard" style="margin-top: 6px;" title="桌面">
                    <span class="material-symbols-outlined">dashboard</span>
                    <span>桌面</span>
                </div>
                <div class="nav-item" data-view="brand" title="品牌管理">
                    <span class="material-symbols-outlined">branding_watermark</span>
                    <span>品牌管理</span>
                </div>
                <div class="nav-item" data-view="category" title="分类管理">
                    <span class="material-symbols-outlined">folder</span>
                    <span>分类管理</span>
                </div>
                <div class="nav-item" data-view="item" title="商品管理">
                    <span class="material-symbols-outlined">inventory_2</span>
                    <span>商品管理</span>
                </div>
                <div class="nav-item" data-view="upload" title="文件上传">
                    <span class="material-symbols-outlined">cloud_upload</span>
                    <span>文件上传</span>
                </div>
                <div class="nav-divider"></div>
                <div class="nav-item" onclick="alert('零售管理模块开发中')" title="零售管理">
                    <span class="material-symbols-outlined">shopping_cart</span>
                    <span>零售管理</span>
                </div>
                <div class="nav-item" onclick="alert('采购管理模块开发中')" title="采购管理">
                    <span class="material-symbols-outlined">local_shipping</span>
                    <span>采购管理</span>
                </div>
                <div class="nav-item" onclick="alert('库存管理模块开发中')" title="库存管理">
                    <span class="material-symbols-outlined">warehouse</span>
                    <span>库存管理</span>
                </div>
                <div class="nav-item" onclick="alert('连锁配送模块开发中')" title="连锁配送">
                    <span class="material-symbols-outlined">route</span>
                    <span>连锁配送</span>
                </div>
                <div class="nav-item" onclick="alert('批发管理模块开发中')" title="批发管理">
                    <span class="material-symbols-outlined">sell</span>
                    <span>批发管理</span>
                </div>
                <div class="nav-item" onclick="alert('会员管理模块开发中')" title="会员管理">
                    <span class="material-symbols-outlined">people</span>
                    <span>会员管理</span>
                </div>
                <div class="nav-item" onclick="alert('结算管理模块开发中')" title="结算管理">
                    <span class="material-symbols-outlined">payments</span>
                    <span>结算管理</span>
                </div>
                <div class="nav-item" onclick="alert('决策分析模块开发中')" title="决策分析">
                    <span class="material-symbols-outlined">analytics</span>
                    <span>决策分析</span>
                </div>
                <div class="nav-item" onclick="alert('系统管理模块开发中')" title="系统管理">
                    <span class="material-symbols-outlined">settings</span>
                    <span>系统管理</span>
                </div>
            </div>
            <div class="collapse-btn" id="collapseBtn">
                <i class="fas fa-chevron-left"></i>
                <span>折叠</span>
            </div>
        </aside>

        <!-- 主内容 -->
        <div class="main-content-area">
            <div class="tab-bar" id="tabBar">
                <div class="tab-list" id="tabList"></div>
                <div class="tab-actions" id="tabActions">
                    <div class="notification-icon" id="notificationIcon">
                        <i class="fas fa-bell"></i>
                        <span class="badge" id="notificationBadge">3</span>
                    </div>
                    <div class="user-dropdown" id="userDropdown">
                        <div class="user-avatar">张</div>
                        <span class="username">张经理</span>
                        <i class="fas fa-chevron-down chevron" id="dropdownChevron"></i>
                        <div class="dropdown-menu" id="dropdownMenu">
                            <button class="dropdown-item" id="settingsBtn"><i class="fas fa-user-cog"></i> 用户设置
                            </button>
                            <div class="dropdown-divider"></div>
                            <button class="dropdown-item danger" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> 退出登录
                            </button>
                        </div>
                    </div>
                    <!-- 帮助按钮 -->
                    <div class="help-icon" id="helpIcon"><i class="fas fa-question-circle"></i></div>
                </div>
            </div>
            <div class="iframe-wrapper">
                <iframe id="contentFrame" src="about:blank"></iframe>
            </div>
        </div>
    </div>
</div>

<!-- =========================================================
     【已有】帮助模态框（保持不变）
     ========================================================= -->
<div class="help-modal-overlay" id="helpModalOverlay">
    <div class="help-modal-box">
        <div class="help-modal-header">
            <h3><i class="fas fa-question-circle"></i> 帮助中心</h3>
            <button class="help-modal-close" id="helpModalCloseBtn" title="关闭帮助">✕</button>
        </div>
        <div class="help-modal-body">
            <iframe id="helpIframe" src="about:blank"></iframe>
        </div>
    </div>
</div>

<script>
    // ============================================================
    // ===== 侧边栏折叠 =====
    // ============================================================
    const sidebar = document.getElementById('sidebar');
    const collapseBtn = document.getElementById('collapseBtn');

    (function () {
        let userManuallyToggled = false;
        const THRESHOLD_W = 1440, THRESHOLD_H = 900;
        let resizeTimer = null;

        function adjustSidebarByResolution() {
            if (userManuallyToggled) return;
            const w = window.innerWidth, h = window.innerHeight;
            if (w < THRESHOLD_W || h < THRESHOLD_H) {
                sidebar.classList.add('collapsed');
            } else {
                sidebar.classList.remove('collapsed');
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', adjustSidebarByResolution);
        } else {
            adjustSidebarByResolution();
        }
        window.addEventListener('resize', function () {
            if (resizeTimer) clearTimeout(resizeTimer);
            resizeTimer = setTimeout(adjustSidebarByResolution, 150);
        });
        const newBtn = collapseBtn.cloneNode(true);
        collapseBtn.parentNode.replaceChild(newBtn, collapseBtn);
        const freshBtn = document.getElementById('collapseBtn');
        const freshSidebar = document.getElementById('sidebar');
        freshBtn.addEventListener('click', function (e) {
            userManuallyToggled = true;
            freshSidebar.classList.toggle('collapsed');
        });
        window.__sidebar = freshSidebar;
        window.__collapseBtn = freshBtn;
    })();

    // ============================================================
    // ===== 用户下拉菜单 =====
    // ============================================================
    const userDropdown = document.getElementById('userDropdown');
    const dropdownMenu = document.getElementById('dropdownMenu');
    const chevron = document.getElementById('dropdownChevron');
    let closeTimer = null;
    const closeDelay = 200;

    function openDropdown() {
        if (closeTimer) {
            clearTimeout(closeTimer);
            closeTimer = null;
        }
        dropdownMenu.classList.add('open');
        chevron.classList.add('open');
    }

    function closeDropdown() {
        dropdownMenu.classList.remove('open');
        chevron.classList.remove('open');
    }

    function scheduleClose() {
        if (closeTimer) clearTimeout(closeTimer);
        closeTimer = setTimeout(closeDropdown, closeDelay);
    }

    function cancelClose() {
        if (closeTimer) {
            clearTimeout(closeTimer);
            closeTimer = null;
        }
        dropdownMenu.classList.add('open');
        chevron.classList.add('open');
    }

    userDropdown.addEventListener('mouseenter', openDropdown);
    userDropdown.addEventListener('mouseleave', scheduleClose);
    dropdownMenu.addEventListener('mouseenter', cancelClose);
    dropdownMenu.addEventListener('mouseleave', scheduleClose);

    userDropdown.addEventListener('click', function (e) {
        if (e.target.closest('.dropdown-item')) return;
        if (dropdownMenu.classList.contains('open')) {
            closeDropdown();
        } else {
            openDropdown();
        }
    });

    document.addEventListener('click', function (e) {
        if (!userDropdown.contains(e.target) && !dropdownMenu.contains(e.target)) {
            closeDropdown();
        }
    });

    document.getElementById('settingsBtn').addEventListener('click', function (e) {
        e.stopPropagation();
        alert('⚙️ 跳转到用户设置页面');
        closeDropdown();
    });
    document.getElementById('logoutBtn').addEventListener('click', function (e) {
        e.stopPropagation();
        if (confirm('确认退出登录吗？')) {
            alert('您已退出登录');
            closeDropdown();
        }
    });

    // ===== 通知 =====
    document.getElementById('notificationIcon').addEventListener('click', function () {
        alert('您有 3 条未读通知');
    });

    // ============================================================
    // ===== 帮助按钮 — 弹出模态框加载 help.html（保持不变） =====
    // ============================================================
    const helpIcon = document.getElementById('helpIcon');
    const helpModalOverlay = document.getElementById('helpModalOverlay');
    const helpIframe = document.getElementById('helpIframe');
    const helpModalCloseBtn = document.getElementById('helpModalCloseBtn');

    function openHelpModal() {
        helpModalOverlay.classList.add('active');
        helpIframe.src = 'help.html';
        document.body.style.overflow = 'hidden';
    }

    function closeHelpModal() {
        helpModalOverlay.classList.remove('active');
        helpIframe.src = 'about:blank';
        document.body.style.overflow = '';
    }

    helpIcon.addEventListener('click', openHelpModal);
    helpModalCloseBtn.addEventListener('click', closeHelpModal);
    helpModalOverlay.addEventListener('click', function (e) {
        if (e.target === helpModalOverlay) closeHelpModal();
    });
    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && helpModalOverlay.classList.contains('active')) closeHelpModal();
    });

    // ============================================================
    // ===== 【新增】监听来自 iframe 的消息，新增 Tab 加载 import.html =====
    // ============================================================
    // 在 pageMap 中添加 import 页面配置
    // 注意：这个配置需要在 Tab 管理之前定义，所以我们直接扩展 pageMap
    // 由于 pageMap 在后面定义，我们在此处先声明一个扩展，后面合并
    // 但更简单的是直接修改下面的 pageMap 定义，我们在原有基础上增加 'import' 项。

    // ============================================================
    // ===== 搜索框 =====
    // ============================================================
    const searchInput = document.getElementById('globalSearchInput');
    const searchIndicator = document.getElementById('globalSearchIndicator');
    searchInput.addEventListener('keyup', function (e) {
        if (e.key === 'Enter') {
            const keyword = this.value.trim();
            if (keyword) {
                searchIndicator.style.display = 'inline';
                setTimeout(() => {
                    searchIndicator.style.display = 'none';
                    alert('搜索：' + keyword);
                }, 600);
            }
        }
    });

    // ============================================================
    // ===== Tab 管理（已修改：增加 import 页面配置，并添加监听消息） =====
    // ============================================================
    const pageMap = {
        'dashboard': {title: '桌面', url: 'dashboard.html', icon: 'dashboard', closable: false},
        'brand': {title: '品牌管理', url: 'brand.html', icon: 'branding_watermark', closable: true},
        'category': {title: '分类管理', url: 'category.html', icon: 'folder', closable: true},
        'item': {title: '商品管理', url: 'item.htm', icon: 'inventory_2', closable: true},
        'upload': {title: '文件上传', url: 'upload.html', icon: 'cloud_upload', closable: true},
        // ===== 新增 import 页面，与 item 同级 =====
        'import': {title: '导入商品', url: 'import.html', icon: 'cloud_upload', closable: true}
    };

    let tabs = [];
    let activeView = 'dashboard';
    const tabList = document.getElementById('tabList');
    const contentFrame = document.getElementById('contentFrame');

    function initTabs() {
        tabs = [];
        addTab('dashboard', true);
        renderTabs();
    }

    function addTab(view, activate = false) {
        const existing = tabs.find(t => t.view === view);
        if (existing) {
            if (activate) {
                activeView = view;
                renderTabs();
                switchIframe(view);
            }
            return;
        }
        const page = pageMap[view];
        if (!page) return;
        tabs.push({
            view: view,
            title: page.title,
            url: page.url,
            icon: page.icon,
            closable: page.closable !== undefined ? page.closable : true
        });
        if (activate) activeView = view;
        else if (!activeView) activeView = view;
        renderTabs();
        if (activate) switchIframe(view);
        updateMenuActive(view);
    }

    function closeTab(view) {
        const idx = tabs.findIndex(t => t.view === view);
        if (idx === -1) return;
        const tab = tabs[idx];
        if (!tab.closable) return;
        tabs.splice(idx, 1);
        if (activeView === view) {
            if (tabs.length > 0) {
                const nextIdx = idx < tabs.length ? idx : idx - 1;
                const nextTab = tabs[nextIdx] || tabs[0];
                activeView = nextTab.view;
                switchIframe(activeView);
            } else {
                activeView = 'dashboard';
                addTab('dashboard', true);
            }
        }
        renderTabs();
        updateMenuActive(activeView);
    }

    function switchToTab(view) {
        const tab = tabs.find(t => t.view === view);
        if (!tab) {
            addTab(view, true);
            return;
        }
        if (activeView !== view) {
            activeView = view;
            renderTabs();
            switchIframe(view);
            updateMenuActive(view);
        }
    }

    function switchIframe(view) {
        const page = pageMap[view];
        contentFrame.src = page ? page.url : 'about:blank';
    }

    function renderTabs() {
        tabList.innerHTML = '';
        tabs.forEach(tab => {
            const btn = document.createElement('button');
            btn.className = 'tab-item';
            if (tab.view === activeView) btn.classList.add('active');
            if (!tab.closable) btn.classList.add('dashboard-tab');

            const iconSpan = document.createElement('span');
            iconSpan.className = 'material-symbols-outlined tab-icon';
            iconSpan.textContent = tab.icon;
            btn.appendChild(iconSpan);

            const titleSpan = document.createElement('span');
            titleSpan.textContent = tab.title;
            btn.appendChild(titleSpan);

            if (tab.closable) {
                const closeSpan = document.createElement('span');
                closeSpan.className = 'tab-close';
                closeSpan.innerHTML = '&times;';
                closeSpan.title = '关闭标签';
                closeSpan.addEventListener('click', function (e) {
                    e.stopPropagation();
                    closeTab(tab.view);
                });
                btn.appendChild(closeSpan);
            }

            btn.addEventListener('click', function () {
                switchToTab(tab.view);
            });
            tabList.appendChild(btn);
        });
        const activeEl = tabList.querySelector('.tab-item.active');
        if (activeEl) activeEl.scrollIntoView({block: 'nearest', inline: 'center'});
    }

    function updateMenuActive(view) {
        document.querySelectorAll('.nav-item[data-view]').forEach(item => {
            item.classList.remove('active');
            if (item.dataset.view === view) item.classList.add('active');
        });
    }

    // 暴露 switchView 给全局
    window.switchView = function (view) {
        if (view === 'unit') {
            alert('单位管理仅提供 API 接口，无独立管理界面。');
            return;
        }
        switchToTab(view);
    };

    document.querySelectorAll('.nav-item[data-view]').forEach(item => {
        item.addEventListener('click', function (e) {
            const view = this.dataset.view;
            if (view) window.switchView(view);
        });
    });

    // ============================================================
    // ===== 【新增】监听 postMessage，打开 import Tab =====
    // ============================================================
    window.addEventListener('message', function (event) {
        const data = event.data;
        if (data && data.type === 'openImport') {
            // 切换到 import Tab，如果不存在则新建
            switchToTab('import');
        }
    });

    // ============================================================
    // ===== 初始化 =====
    // ============================================================
    initTabs();
    switchIframe('dashboard');
    updateMenuActive('dashboard');

    console.log('✅ 一体化工作台已启动（支持从子页面打开 import Tab）');
</script>
</body>
</html>
