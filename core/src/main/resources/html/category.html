<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SaaS零售 · 分类管理器 | 深色协调版</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1" rel="stylesheet">
    <style>
        [v-cloak] { display: none !important; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(ellipse at 20% 30%, #0f172a, #070b14);
            font-family: 'Inter', system-ui, sans-serif;
            color: #e2e8f0;
            overflow: hidden;
            height: 100vh;
        }

        .global-layout {
            display: flex;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        /* ========== 侧边栏样式 ========== */
        .saas-sidebar {
            width: 260px;
            background: rgba(8, 12, 24, 0.92);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(129, 140, 248, 0.2);
            color: rgba(255, 255, 255, 0.75);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 10;
            box-shadow: 2px 0 20px rgba(0, 0, 0, 0.4);
            transition: width 0.3s ease;
            overflow: hidden;
            position: relative;
        }

        .saas-sidebar.collapsed {
            width: 64px;
        }
        .saas-sidebar.collapsed .logo-area span:last-child,
        .saas-sidebar.collapsed .nav-item span:last-child {
            display: none;
        }
        .saas-sidebar.collapsed .logo-area {
            justify-content: center;
            padding: 0 8px;
        }
        .saas-sidebar.collapsed .nav-item {
            justify-content: center;
            padding: 12px 8px;
            border-left: 3px solid transparent;
        }
        .saas-sidebar.collapsed .nav-item .material-symbols-outlined {
            font-size: 24px;
        }
        .saas-sidebar.collapsed .nav-item span:last-child {
            display: none;
        }
        .saas-sidebar.collapsed .collapse-btn span {
            display: none;
        }
        .saas-sidebar.collapsed .collapse-btn i {
            transform: rotate(180deg);
        }

        .collapse-btn {
            margin-top: auto;
            padding: 16px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid rgba(129, 140, 248, 0.2);
            color: rgba(255, 255, 255, 0.5);
            transition: background 0.2s;
            font-size: 0.85rem;
            user-select: none;
        }
        .collapse-btn:hover {
            background: rgba(129, 140, 248, 0.15);
            color: #fff;
        }
        .collapse-btn i {
            font-size: 1.1rem;
            transition: transform 0.3s ease;
        }
        .saas-sidebar.collapsed .collapse-btn {
            justify-content: center;
            padding: 16px 0;
        }
        .saas-sidebar.collapsed .collapse-btn i {
            transform: rotate(180deg);
        }

        .logo-area {
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            border-bottom: 1px solid rgba(129, 140, 248, 0.25);
            transition: padding 0.3s;
        }
        .logo-area .material-symbols-outlined {
            font-size: 26px;
            color: #818cf8;
        }

        .nav-menu {
            flex: 1;
            padding: 20px 0;
            overflow-y: auto;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: rgba(255, 255, 255, 0.65);
            border-left: 3px solid transparent;
        }
        .nav-item:hover {
            background: rgba(129, 140, 248, 0.15);
            color: #ffffff;
            border-left-color: #818cf8;
        }
        .nav-item.active {
            background: linear-gradient(90deg, rgba(129, 140, 248, 0.2), transparent);
            color: #ffffff;
            border-left-color: #818cf8;
            font-weight: 600;
        }
        .nav-item .material-symbols-outlined {
            font-size: 22px;
            flex-shrink: 0;
        }
        .nav-item span:last-child {
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        .saas-sidebar.collapsed .nav-item span:last-child {
            opacity: 0;
            width: 0;
            overflow: hidden;
        }

        .main-content-area {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            background: transparent;
        }
        .app-layout {
            display: flex;
            gap: 20px;
            width: 100%;
            margin: 0;
            padding: 0;
            height: 100%;
        }
        .tree-panel {
            flex: 0 0 350px;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            border: 1px solid rgba(129, 140, 248, 0.2);
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            height: calc(100vh - 32px);
            display: flex;
            flex-direction: column;
            margin: 16px 0 16px 16px;
        }
        .right-panel {
            flex: 1;
            min-width: 560px;
            margin: 16px 16px 16px 0;
            display: flex;
            flex-direction: column;
        }
        .card {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            border: 1px solid rgba(129, 140, 248, 0.2);
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .card-body {
            padding: 28px 32px;
            overflow-y: auto;
            flex: 1;
        }
        .tree-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid rgba(129, 140, 248, 0.2);
            background: rgba(0, 0, 0, 0.3);
        }
        .tree-header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .tree-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: #f1f5f9;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .tree-title i {
            color: #818cf8;
        }
        .add-root-btn {
            background: rgba(129, 140, 248, 0.2);
            border: 1px solid rgba(129, 140, 248, 0.5);
            color: #cbd5ff;
            padding: 6px 14px;
            border-radius: 32px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .add-root-btn:hover {
            background: rgba(129, 140, 248, 0.4);
            border-color: #a5b4fc;
            color: white;
        }
        .search-box {
            position: relative;
            width: 100%;
        }
        .search-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 0.9rem;
        }
        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 40px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #334155;
            border-radius: 40px;
            color: #f1f5f9;
            font-size: 0.85rem;
            transition: 0.2s;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }
        .search-box input:focus {
            border-color: #818cf8;
            outline: none;
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.2);
        }
        .search-loading {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #818cf8;
            font-size: 0.8rem;
            pointer-events: none;
        }
        .error-banner {
            background: rgba(220, 38, 38, 0.8);
            backdrop-filter: blur(8px);
            margin: 12px 16px;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffcdd2;
            border: 1px solid #ef4444;
        }
        .error-banner button {
            background: #7f1d1d;
            border: none;
            padding: 4px 12px;
            border-radius: 30px;
            color: white;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .tree-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 12px 12px 20px 16px;
        }
        .tree-node,
        .tree-node ul,
        .node-item {
            list-style: none !important;
            margin: 0;
            padding-left: 0;
        }
        .tree-node ul {
            padding-left: 28px;
        }
        .node-item {
            margin: 2px 0;
        }
        .node-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.9rem;
            color: #cbd5e1;
        }
        .node-content:hover {
            background: rgba(129, 140, 248, 0.12);
            color: #f1f5f9;
        }
        .active-cat {
            background: linear-gradient(135deg, #1e1b4b, #2e1065);
            color: #e0e7ff !important;
            border-left: 3px solid #818cf8;
            font-weight: 500;
        }
        .node-content.search-match-node {
            background: transparent !important;
            border-left: none !important;
            box-shadow: none !important;
            backdrop-filter: none !important;
        }
        .node-content.search-match-node .node-name span {
            color: #fbbf24 !important;
            font-weight: 700 !important;
            text-shadow: 0 0 4px rgba(251, 191, 36, 0.6);
            transition: all 0.15s ease;
        }
        .node-content.search-match-node .node-icon-img {
            box-shadow: 0 0 10px #fbbf24, 0 0 4px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            transform: scale(1.1);
            transition: all 0.15s ease;
        }
        .node-content.search-match-node:hover .node-name span {
            color: #fcd34d !important;
            text-shadow: 0 0 8px rgba(251, 191, 36, 0.8);
        }
        .node-content.search-match-node:hover .node-icon-img {
            box-shadow: 0 0 14px #fbbf24;
            transform: scale(1.12);
        }
        .node-name {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }
        .toggle-box {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 22px;
            height: 22px;
            border: 1px solid #475569;
            border-radius: 6px;
            background: #1e293b;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            color: #94a3b8;
            transition: 0.1s;
            user-select: none;
            flex-shrink: 0;
            box-shadow: 0 1px 1px rgba(0, 0, 0, 0.2);
        }
        .toggle-box:hover {
            background: #334155;
            border-color: #818cf8;
            color: #818cf8;
        }
        .node-icon-img {
            width: 20px;
            height: 20px;
            border-radius: 6px;
            object-fit: cover;
            background: #1e293b;
            flex-shrink: 0;
            transition: all 0.15s ease;
        }
        .node-actions {
            display: none;
            gap: 6px;
            margin-left: 8px;
        }
        .node-content:hover .node-actions {
            display: flex;
        }
        .node-actions i {
            font-size: 0.7rem;
            padding: 5px;
            border-radius: 8px;
            background: #0f172a;
            color: #94a3b8;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }
        .node-actions i:hover {
            background: #1e293b;
            color: #818cf8;
        }
        .card-header {
            padding: 20px 28px;
            border-bottom: 1px solid rgba(129, 140, 248, 0.2);
            background: rgba(0, 0, 0, 0.25);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .card-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #f1f5f9;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px 32px;
        }
        .full-width {
            grid-column: 1 / -1;
        }
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .field-group label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #a5b4fc;
            letter-spacing: 0.3px;
        }
        .required-star {
            color: #f87171;
            margin-left: 4px;
            font-size: 0.8rem;
        }
        input,
        select,
        textarea {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 11px 16px;
            font-size: 0.9rem;
            transition: 0.2s;
            color: #f1f5f9;
            font-family: 'Inter', monospace;
        }
        input:focus,
        select:focus,
        textarea:focus {
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.15);
            outline: none;
        }
        .field-group select {
            width: 100%;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 24px;
            justify-content: flex-end;
        }
        button {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #cbd5e1;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }
        button.primary {
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            border: none;
            color: white;
            box-shadow: 0 4px 8px rgba(79, 70, 229, 0.3);
        }
        button.primary:hover {
            background: linear-gradient(135deg, #4338ca, #4f46e5);
            transform: translateY(-1px);
        }
        button.danger {
            background: #7f1d1d;
            border-color: #b91c1c;
            color: #fecaca;
        }
        button.danger:hover {
            background: #991b1b;
        }
        button.warning {
            background: #b45309;
            border-color: #d97706;
            color: #fffbeb;
        }
        button.warning:hover {
            background: #92400e;
        }
        button.info {
            background: #065666;
            border-color: #0891b2;
            color: #cffafe;
        }
        button.info:hover {
            background: #0e7490;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        hr {
            margin: 28px 0 20px;
            border: none;
            border-top: 1px solid rgba(129, 140, 248, 0.2);
        }
        .extended-section {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 24px;
            padding: 16px 0 8px;
            margin-top: 12px;
        }
        .section-mini-title {
            font-weight: 600;
            margin: 12px 0 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            border-left: 3px solid #818cf8;
            padding-left: 16px;
            color: #e2e8f0;
        }
        .attr-selector {
            background: rgba(30, 41, 59, 0.6);
            border-radius: 20px;
            padding: 12px 18px;
            margin-bottom: 24px;
            border: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 14px;
        }
        .attr-selector-left {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .badge-count {
            background: #1e293b;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #a5b4fc;
            font-weight: 500;
        }
        .attr-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .icon-url-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .icon-url-wrapper input {
            flex: 1;
            min-width: 200px;
        }
        .icon-actions button {
            padding: 8px 16px;
            background: #1e293b;
            border: 1px solid #334155;
            font-size: 0.75rem;
        }
        .modal-mask {
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .modal-container {
            background: #1e293b;
            border-radius: 32px;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            width: auto;
            max-width: 80vw;
            border: 1px solid #334155;
        }
        .modal-header {
            padding: 16px 24px;
            background: #0f172a;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 {
            color: #f1f5f9;
            font-size: 1rem;
            font-weight: 600;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: #94a3b8;
            line-height: 1;
        }
        .modal-close:hover {
            color: #f87171;
        }
        .modal-body {
            padding: 24px;
            text-align: center;
            min-width: 300px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .modal-body img {
            max-width: 100%;
            max-height: 60vh;
            border-radius: 20px;
            display: block;
        }
        .preview-error {
            color: #f87171;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .preview-error i {
            font-size: 3rem;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
        @media (max-width: 1000px) {
            .tree-panel {
                flex: 0 0 350px;
            }
        }
        .loading-placeholder {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
        .empty-placeholder {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        .add-mode-badge {
            background: rgba(56, 189, 248, 0.2);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.75rem;
            color: #7dd3fc;
            margin-left: 12px;
        }
        /* 新节点高亮闪烁动画 */
        @keyframes highlight-flash {
            0% {
                background: rgba(251, 191, 36, 0.5);
                border-left-color: #fbbf24;
                box-shadow: 0 0 20px rgba(251, 191, 36, 0.3);
            }
            70% {
                background: rgba(251, 191, 36, 0.15);
                border-left-color: #fbbf24;
                box-shadow: 0 0 8px rgba(251, 191, 36, 0.1);
            }
            100% {
                background: transparent;
                border-left-color: transparent;
                box-shadow: none;
            }
        }
        .node-content.highlight-new {
            animation: highlight-flash 1.8s ease-out forwards;
            border-left: 3px solid #fbbf24 !important;
        }
    </style>
</head>
<body>
<div id="vueApp" v-cloak>
    <div class="global-layout">
        <!-- ========== 侧边栏（可折叠） ========== -->
        <aside class="saas-sidebar" :class="{ collapsed: isCollapsed }">
            <div class="logo-area">
                <span class="material-symbols-outlined">storefront</span>
                <span v-show="!isCollapsed">SaaS 零售</span>
            </div>
            <div class="nav-menu">
                <div class="nav-item active">
                    <span class="material-symbols-outlined">category</span>
                    <span v-show="!isCollapsed">分类管理</span>
                </div>
                <div class="nav-item">
                    <span class="material-symbols-outlined">inventory_2</span>
                    <span v-show="!isCollapsed">商品档案</span>
                </div>
                <div class="nav-item">
                    <span class="material-symbols-outlined">shopping_cart</span>
                    <span v-show="!isCollapsed">销售管理</span>
                </div>
                <div class="nav-item">
                    <span class="material-symbols-outlined">people</span>
                    <span v-show="!isCollapsed">会员管理</span>
                </div>
                <div class="nav-item">
                    <span class="material-symbols-outlined">local_shipping</span>
                    <span v-show="!isCollapsed">采购管理</span>
                </div>
                <div class="nav-item">
                    <span class="material-symbols-outlined">warehouse</span>
                    <span v-show="!isCollapsed">库存管理</span>
                </div>
            </div>
            <!-- 折叠按钮 -->
            <div class="collapse-btn" @click="toggleSidebar">
                <i class="fas fa-chevron-left"></i>
                <span v-show="!isCollapsed">折叠菜单</span>
            </div>
        </aside>

        <!-- ========== 主内容区 ========== -->
        <div class="main-content-area">
            <div class="app-layout">
                <!-- 左侧树形面板 -->
                <div class="tree-panel">
                    <div class="tree-header">
                        <div class="tree-header-top">
                            <div class="tree-title"><i class="fas fa-folder-tree"></i> 类别</div>
                            <button class="add-root-btn" @click="addChild(null)"><i class="fas fa-plus"></i> 根类</button>
                        </div>
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" v-model="searchKeyword" placeholder="搜索分类..." @input="onSearchInput" @keydown.enter="onSearchEnter">
                            <i v-if="searchLoading" class="fas fa-spinner fa-pulse search-loading"></i>
                        </div>
                    </div>
                    <div v-if="errorMsg" class="error-banner">
                        <span><i class="fas fa-exclamation-triangle"></i> {{ errorMsg }}</span>
                        <button @click="loadCategories"><i class="fas fa-sync-alt"></i> 重试</button>
                    </div>
                    <div class="tree-scroll">
                        <div v-if="loading" class="loading-placeholder"><i class="fas fa-spinner fa-pulse"></i> 加载分类中...</div>
                        <ul class="tree-node" v-else-if="!loading && categoryTree.length > 0">
                            <tree-item
                                    v-for="node in categoryTree"
                                    :key="node.id"
                                    :node="node"
                                    :active-id="activeCategory.id"
                                    :expanded-set="expandedSet"
                                    :search-match-set="searchMatchSet"
                                    :highlight-id="highlightNodeId"
                                    @toggle="toggleExpand"
                                    @select="selectCategory"
                                    @add-child="addChild"
                                    @delete-cat="deleteCategoryNode"
                                    @node-updated="onNodeUpdated"
                            ></tree-item>
                        </ul>
                        <div v-else-if="!loading && categoryTree.length === 0" class="empty-placeholder"><i class="fas fa-folder-open"></i> 暂无分类数据</div>
                    </div>
                </div>

                <!-- 右侧属性区域 -->
                <div class="right-panel">
                    <div class="card">
                        <div class="card-header">
                            <h2><i class="fas fa-info-circle"></i> 基本属性<span v-if="isAddMode" class="add-mode-badge"><i class="fas fa-plus-circle"></i> 添加子分类模式</span></h2>
                        </div>
                        <div class="card-body">
                            <div class="form-grid">
                                <div class="field-group">
                                    <label><i class="fas fa-level-up-alt"></i> 上级分类 <span class="required-star">*</span></label>
                                    <div v-if="isAddMode && parentForAdd">
                                        <select :disabled="true" class="disabled-select">
                                            <option :value="parentForAdd.id">{{ parentForAdd.name }}</option>
                                        </select>
                                    </div>
                                    <div v-else-if="activeCategory.id && !isAddMode">
                                        <select v-if="isRootCategory" :disabled="true">
                                            <option :value="activeCategory.id">{{ activeCategory.name.name }}（顶级分类）</option>
                                        </select>
                                        <select v-else v-model="editableCategory.parent_id" :disabled="isSpecialUncategorized">
                                            <option value="-1">无（顶级分类）</option>
                                            <option v-for="cat in flatCategoryList" :value="cat.id" :disabled="cat.id === editableCategory.id">{{ cat.name.name }}</option>
                                        </select>
                                    </div>
                                    <select v-else :disabled="true"><option value="">请先选择一个分类</option></select>
                                </div>
                                <div class="field-group">
                                    <label>分类名称 <span class="required-star">*</span></label>
                                    <input ref="categoryNameInput" v-model="editableCategory.name.name" placeholder="例：品质男鞋" :disabled="(!isValidCategory && !isAddMode) || isSpecialUncategorized">
                                </div>
                                <div class="field-group">
                                    <label>简称</label>
                                    <input v-model="editableCategory.name.shortName" placeholder="简称" :disabled="(!isValidCategory && !isAddMode) || isSpecialUncategorized">
                                </div>
                                <div class="field-group full-width">
                                    <label>图标URL</label>
                                    <div class="icon-url-wrapper">
                                        <input v-model="editableCategory.icon_url" placeholder="https://... 或上传图片" :disabled="(!isValidCategory && !isAddMode) || isSpecialUncategorized">
                                        <div class="icon-actions">
                                            <button type="button" @click="triggerFileUpload" :disabled="(!isValidCategory && !isAddMode) || isSpecialUncategorized"><i class="fas fa-cloud-upload-alt"></i> 上传</button>
                                            <button type="button" @click="openModalPreview" :disabled="!editableCategory.icon_url || ((!isValidCategory && !isAddMode) || isSpecialUncategorized)"><i class="fas fa-eye"></i> 预览</button>
                                        </div>
                                    </div>
                                    <input type="file" ref="fileInput" style="display:none" accept="image/*" @change="handleFileUpload">
                                </div>
                                <div class="field-group full-width">
                                    <label>描述</label>
                                    <textarea rows="2" v-model="editableCategory.description" :disabled="(!isValidCategory && !isAddMode) || isSpecialUncategorized"></textarea>
                                </div>
                            </div>
                            <div class="btn-group" v-if="!isAddMode">
                                <button @click="restoreOriginal" :disabled="!isModified || !isValidCategory || isSpecialUncategorized" class="info"><i class="fas fa-undo-alt"></i> 恢复</button>
                                <button @click="updateCurrentCategory" :disabled="!isModified || !isValidCategory || isSpecialUncategorized" class="warning"><i class="fas fa-save"></i> 修改</button>
                                <button @click="deleteCurrentCategory" :disabled="!isValidCategory || isSpecialUncategorized" class="danger"><i class="fas fa-trash"></i> 删除</button>
                            </div>
                            <div class="btn-group" v-else>
                                <button @click="cancelAddMode" class="info"><i class="fas fa-times"></i> 取消</button>
                                <button @click="saveNewCategory" class="primary"><i class="fas fa-save"></i> 保存</button>
                            </div>
                            <hr />
                            <div class="extended-section">
                                <div class="section-mini-title"><i class="fas fa-cog"></i> 扩展属性</div>
                                <div class="attr-selector">
                                    <div class="attr-selector-left">
                                        <label>属性名：</label>
                                        <select v-model="selectedExtIdForSelect" @change="onSelectExtFromDropdown" :disabled="(!isValidCategory && !isAddMode) || isSpecialUncategorized">
                                            <option value="">-- 选择属性 --</option>
                                            <option v-for="attr in activeExtList" :value="attr.recordId">{{ attr.displayName }} ({{ attr.fieldName }})</option>
                                        </select>
                                        <span class="badge-count" v-if="activeExtList.length">共 {{ activeExtList.length }} 个字段</span>
                                        <span v-else class="badge-count">暂无扩展属性</span>
                                    </div>
                                    <div class="attr-actions">
                                        <button @click="saveExtAttribute" :disabled="!isSaveEnabled || (!isValidCategory && !isAddMode) || isSpecialUncategorized" class="warning"><i class="fas fa-save"></i> 保存</button>
                                        <button @click="deleteExtAttribute" :disabled="!selectedExtId || (!isValidCategory && !isAddMode) || isSpecialUncategorized" class="danger"><i class="fas fa-trash"></i> 删除</button>
                                        <button @click="clearExtForm" class="info"><i class="fas fa-eraser"></i> 清空</button>
                                    </div>
                                </div>
                                <div class="form-grid">
                                    <div class="field-group"><label>显示名称 <span class="required-star">*</span></label><input v-model="extForm.displayName" placeholder="例：颜色" :disabled="(!isValidCategory && !isAddMode) || isSpecialUncategorized"></div>
                                    <div class="field-group"><label>别名 <span class="required-star">*</span></label><input v-model="extForm.fieldName" placeholder="例：YanSe" :disabled="(!isValidCategory && !isAddMode) || isSpecialUncategorized"></div>
                                    <div class="field-group"><label>默认值</label><input v-model="extForm.defaultValue" placeholder="红色、橙色、绿色" :disabled="(!isValidCategory && !isAddMode) || isSpecialUncategorized"></div>
                                    <div class="field-group"><label>是否必填</label><select v-model="extForm.isRequired" :disabled="(!isValidCategory && !isAddMode) || isSpecialUncategorized"><option>必填</option><option>可选</option></select></div>
                                    <div class="field-group"><label>排序号</label><input type="number" v-model="extForm.sortOrder" :disabled="(!isValidCategory && !isAddMode) || isSpecialUncategorized"></div>
                                </div>
                                <div class="btn-group" style="justify-content: flex-start; margin-top: 16px;">
                                    <button @click="syncToSubClass" :disabled="!hasSubCategories || (!isValidCategory && !isAddMode) || isSpecialUncategorized" class="warning"><i class="fas fa-share-alt"></i> 同步应用到子类</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 预览模态框 -->
    <div v-if="modalVisible" class="modal-mask" @click.self="modalVisible = false">
        <div class="modal-container">
            <div class="modal-header"><h3><i class="fas fa-image"></i> 图标预览</h3><button class="modal-close" @click="modalVisible = false">&times;</button></div>
            <div class="modal-body">
                <img v-if="!previewError" :src="modalImageUrl" @error="onModalImageError" style="max-width:100%; max-height:60vh; border-radius:20px;">
                <div v-else class="preview-error"><i class="fas fa-exclamation-triangle"></i><span>图片加载失败，请检查URL地址是否有效</span><span style="font-size:0.7rem; color:#94a3b8;">{{ modalImageUrl }}</span></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js">
</script>
<script>
    const { createApp, ref, computed, onMounted, watch, nextTick } = Vue;

    // ---------- 工具函数 ----------
    function safeParseBigIntJson(jsonStr) {
        const safeStr = jsonStr.replace(/:\s*(-?\d{16,})(?=\s*[,\]}])/g, ':"$1"');
        return JSON.parse(safeStr);
    }
    const API_BASE = 'https://slave.tooo.top/catalog/v1/categories';
    async function apiFetch(url, options = {}) {
        const response = await fetch(url, options);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const text = await response.text();
        return safeParseBigIntJson(text);
    }
    async function fetchChildren(id) { const data = await apiFetch(`${API_BASE}/${id}/children`); return data.categories || []; }
    async function fetchRoots() { const data = await apiFetch(`${API_BASE}/root`); return data.categories || []; }
    async function searchRemote(keyword) { const encoded = encodeURIComponent(keyword); const url = `${API_BASE}?s=${encoded}&offset=0&limit=64`; const data = await apiFetch(url); return data.categories || []; }
    async function createCategory(payload) {
        const response = await fetch(API_BASE, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        if (!response.ok) throw new Error('创建失败');
        const text = await response.text();
        return safeParseBigIntJson(text);
    }
    async function updateCategory(id, payload) {
        const response = await fetch(`${API_BASE}/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        if (!response.ok) throw new Error('更新失败');
        const text = await response.text();
        return safeParseBigIntJson(text);
    }
    async function deleteCategory(id) {
        const response = await fetch(`${API_BASE}/${id}`, { method: 'DELETE' });
        if (!response.ok) throw new Error('删除失败');
        const text = await response.text();
        return text ? safeParseBigIntJson(text) : {};
    }

    // ---------- TreeNode 类 ----------
    class TreeNode {
        constructor(apiNode) {
            if (!apiNode || apiNode.id === undefined || apiNode.id === null) {
                console.error('无效的节点数据:', apiNode);
                throw new Error('节点缺少 id 字段');
            }
            this.id = apiNode.id;
            this.name = apiNode.name || { name: '', shortName: '' };
            this.icon_url = apiNode.icon_url || null;
            // 兼容 parentId 字段
            let parentId = apiNode.parent_id;
            if (apiNode.parentId !== undefined && parentId === undefined) {
                parentId = apiNode.parentId;
            }
            this.parent_id = (parentId === -1) ? this.id : (parentId || -1);
            this.description = apiNode.description || '';
            this.left = apiNode.left || 0;
            this.right = apiNode.right || 0;
            this.hasChildren = (this.right - this.left) > 1;
            this.children = [];
            this.loaded = false;
            this.depth = 0;
        }
    }

    // ---------- TreeItem 组件 ----------
    const TreeItem = {
        name: 'TreeItem',
        props: ['node', 'activeId', 'expandedSet', 'searchMatchSet', 'highlightId'],
        emits: ['toggle', 'select', 'add-child', 'delete-cat', 'node-updated'],
        data() { return { loadingChildren: false }; },
        template: `
          <li class="node-item">
            <div class="node-content"
                 :data-id="node.id"
                 :class="{
                   'active-cat': node.id === activeId,
                   'search-match-node': isSearchMatch,
                   'highlight-new': node.id === highlightId
                 }"
                 @click="$emit('select', node.id)">
              <div class="node-name">
                <span v-if="node.hasChildren" class="toggle-box" @click.stop="handleToggle">{{ isExpanded ? '−' : '+' }}</span>
                <span v-else class="toggle-box" style="visibility: hidden;"></span>
                <img v-if="node.icon_url" :src="node.icon_url" class="node-icon-img" @error="e => e.target.style.display='none'">
                <span>{{ node.name.name }}</span>
              </div>
              <div class="node-actions" v-if="!isSpecialNode">
                <i class="fas fa-plus-circle" title="添加子分类" @click.stop="$emit('add-child', node)"></i>
                <i class="fas fa-trash" title="删除分类" @click.stop="$emit('delete-cat', node)"></i>
              </div>
            </div>
            <ul class="children" v-if="node.hasChildren && isExpanded">
              <div v-if="loadingChildren" class="loading-placeholder">加载中...</div>
              <template v-else>
                <tree-item v-for="child in node.children"
                           :key="child.id"
                           :node="child"
                           :active-id="activeId"
                           :expanded-set="expandedSet"
                           :search-match-set="searchMatchSet"
                           :highlight-id="highlightId"
                           @toggle="$emit('toggle', $event)"
                           @select="$emit('select', $event)"
                           @add-child="$emit('add-child', $event)"
                           @delete-cat="$emit('delete-cat', $event)"
                           @node-updated="$emit('node-updated', $event)"></tree-item>
              </template>
            </ul>
          </li>
        `,
        computed: {
            isExpanded() { return this.expandedSet.has(this.node.id); },
            isSearchMatch() { return this.searchMatchSet && this.searchMatchSet.has(this.node.id); },
            isSpecialNode() { return this.node.id === -1 && this.node.name && this.node.name.name === '未分类'; }
        },
        methods: {
            async handleToggle() {
                if (this.isExpanded) { this.$emit('toggle', this.node.id); return; }
                if (this.node.hasChildren && !this.node.loaded) {
                    this.loadingChildren = true;
                    try {
                        const apiChildren = await fetchChildren(this.node.id);
                        const newChildren = apiChildren.map(apiChild => new TreeNode(apiChild));
                        this.node.children = newChildren;
                        this.node.loaded = true;
                        this.$emit('node-updated', this.node.id);
                    } catch (err) { console.error(err);
                        alert(`加载子分类失败: ${err.message}`); } finally { this.loadingChildren = false; }
                }
                this.$emit('toggle', this.node.id);
            }
        }
    };

    // ---------- Vue 应用 ----------
    createApp({
        components: { TreeItem },
        setup() {
            const categoryTree = ref([]);
            const loading = ref(true);
            const errorMsg = ref('');
            const emptyCategory = { id: null, name: { name: '', shortName: '' }, icon_url: null, parent_id: -1,
                description: '' };
            const activeCategory = ref({ ...emptyCategory });
            const originalCategoryBackup = ref({ ...emptyCategory });
            const editableCategory = ref({ ...emptyCategory });
            const allExtAttrs = ref([]);
            const searchKeyword = ref('');
            const expandedSet = ref(new Set());
            const searchLoading = ref(false);
            const isAddMode = ref(false);
            const parentForAdd = ref(null);
            const highlightNodeId = ref(null);

            // 侧边栏折叠
            const isCollapsed = ref(false);
            const toggleSidebar = () => { isCollapsed.value = !isCollapsed.value; };

            // 搜索相关
            const lastSearchKeyword = ref('');
            const lastSearchResults = ref([]);
            const searchMatchSet = computed(() => new Set(lastSearchResults.value.map(r => r.id)));
            const isRootCategory = computed(() => activeCategory.value.id && activeCategory.value.parent_id === activeCategory.value.id);
            const isValidCategory = computed(() => activeCategory.value.id && activeCategory.value.name && activeCategory.value.name.name && activeCategory.value.name.name !== 'undefined');
            const isSpecialUncategorized = computed(() => activeCategory.value.id == -1 && activeCategory.value.name && activeCategory.value.name.name === '未分类');
            const flatCategoryList = computed(() => {
                const all = [];
                const collect = (nodes) => { for (const node of nodes) { all.push(node); if (node.children) collect(node.children); } };
                collect(categoryTree.value);
                return all.filter(c => c.id !== editableCategory.value.id);
            });
            const activeExtList = computed(() => allExtAttrs.value.filter(a => a.classId === activeCategory.value.id));
            const isModified = computed(() => {
                if (!isValidCategory.value) return false;
                const c = editableCategory.value,
                    o = originalCategoryBackup.value;
                return c.name?.name !== o.name?.name || c.name?.shortName !== o.name?.shortName || c.icon_url !== o.icon_url || c.description !== o.description || c.parent_id !== o.parent_id;
            });
            const hasSubCategories = computed(() => flatCategoryList.value.some(c => c.parent_id === activeCategory.value.id));

            // 树操作辅助
            function findNodeInTree(nodes, id) {
                for (const node of nodes) {
                    if (node.id === id) return node;
                    if (node.children && node.children.length) {
                        const found = findNodeInTree(node.children, id);
                        if (found) return found;
                    }
                }
                return null;
            }

            function collectAllDescendantIds(node, ids = new Set()) {
                ids.add(node.id);
                if (node.children) {
                    for (const child of node.children) {
                        collectAllDescendantIds(child, ids);
                    }
                }
                return ids;
            }

            function findNodePath(nodeList, targetId, currentPath = []) {
                for (const node of nodeList) {
                    const newPath = [...currentPath, node.id];
                    if (node.id === targetId) return newPath;
                    if (node.children && node.children.length) {
                        const childResult = findNodePath(node.children, targetId, newPath);
                        if (childResult) return childResult;
                    }
                }
                return null;
            }

            function applyExpansionFromResults(results) {
                if (!results || results.length === 0) return;
                const toExpandSet = new Set();
                for (const result of results) {
                    const path = findNodePath(categoryTree.value, result.id);
                    if (path && path.length > 1) {
                        for (let i = 0; i < path.length - 1; i++) toExpandSet.add(path[i]);
                    }
                }
                if (toExpandSet.size) {
                    const newExpanded = new Set(expandedSet.value);
                    toExpandSet.forEach(id => newExpanded.add(id));
                    expandedSet.value = newExpanded;
                }
            }

            async function performRemoteSearch(keyword, forceRequest = false) {
                if (!keyword || keyword.trim() === '') { lastSearchResults.value = []; return; }
                if (keyword === lastSearchKeyword.value && !forceRequest) {
                    if (lastSearchResults.value.length) applyExpansionFromResults(lastSearchResults.value);
                    return;
                }
                searchLoading.value = true;
                try {
                    const results = await searchRemote(keyword);
                    lastSearchKeyword.value = keyword;
                    lastSearchResults.value = results;
                    applyExpansionFromResults(results);
                } catch (err) { console.error(err);
                    alert('搜索失败: ' + err.message); } finally { searchLoading.value = false; }
            }
            let debounceTimer = null;

            function onSearchInput() {
                if (debounceTimer) clearTimeout(debounceTimer);
                const keyword = searchKeyword.value;
                debounceTimer = setTimeout(() => performRemoteSearch(keyword, false), 500);
            }

            function onSearchEnter() {
                const keyword = searchKeyword.value;
                if (keyword && keyword.trim()) {
                    if (debounceTimer) clearTimeout(debounceTimer);
                    performRemoteSearch(keyword, true);
                }
            }

            async function loadCategories() {
                loading.value = true;
                errorMsg.value = '';
                try {
                    const roots = await fetchRoots();
                    categoryTree.value = roots.map(root => new TreeNode(root));
                    activeCategory.value = { ...emptyCategory };
                    refreshEditable();
                    lastSearchResults.value = [];
                    expandedSet.value.clear();
                    if (isAddMode.value) exitAddMode();
                } catch (err) { console.error(err);
                    errorMsg.value = '获取分类数据失败：' + err.message;
                    categoryTree.value = [];
                    activeCategory.value = { ...emptyCategory };
                    refreshEditable(); } finally { loading.value = false; }
            }

            // 添加模式
            function addChild(parentNode) {
                if (isAddMode.value) exitAddMode();
                isAddMode.value = true;
                highlightNodeId.value = null;
                if (!parentNode) {
                    parentForAdd.value = { id: -1, name: "无（顶级分类）" };
                    editableCategory.value = { id: null, name: { name: '', shortName: '' }, icon_url: null, parent_id: -1,
                        description: '' };
                } else {
                    const parentId = parentNode.id;
                    const parentName = parentNode.name.name;
                    if (parentId === -1 && parentName === '未分类') {
                        alert("系统保留分类不可添加子分类");
                        exitAddMode();
                        return;
                    }
                    if (parentId === -1) {
                        parentForAdd.value = { id: -1, name: "无（顶级分类）" };
                        editableCategory.value = { id: null, name: { name: '', shortName: '' }, icon_url: null, parent_id: -1,
                            description: '' };
                    } else {
                        parentForAdd.value = { id: parentId, name: parentName };
                        editableCategory.value = { id: null, name: { name: '', shortName: '' }, icon_url: null,
                            parent_id: parentId, description: '' };
                    }
                }
                activeCategory.value = { ...emptyCategory };
                nextTick(() => {
                    const input = document.querySelector('.field-group input[placeholder="例：品质男鞋"]');
                    if (input) input.focus();
                });
            }

            function exitAddMode() {
                isAddMode.value = false;
                parentForAdd.value = null;
                refreshEditable();
            }

            function cancelAddMode() { exitAddMode(); }

            // ============================================================
            // ★★★ 核心：保存新分类（适配服务端返回格式） ★★★
            // ============================================================
            async function saveNewCategory() {
                if (!isAddMode.value || !parentForAdd.value) return;
                const newName = editableCategory.value.name.name.trim();
                if (!newName) {
                    alert("分类名称不能为空");
                    nextTick(() => { const inp = document.querySelector('.field-group input[placeholder="例：品质男鞋"]'); if (inp) inp.focus(); });
                    return;
                }
                const payload = {
                    name: { name: newName, shortName: editableCategory.value.name.shortName || newName.slice(0, 2) },
                    icon_url: editableCategory.value.icon_url,
                    parent_id: parentForAdd.value.id,
                    description: editableCategory.value.description
                };
                try {
                    const result = await createCategory(payload);
                    // 提取分类数据（兼容多种返回结构）
                    let rawCategory = result.category || result.data || result;
                    // 如果 rawCategory 没有 id，但 result 有 id（可能是直接返回分类对象），则使用 result
                    if (!rawCategory.id && result.id) {
                        rawCategory = result;
                    }
                    // 映射字段：parentId -> parent_id, icon -> icon_url
                    const mapped = { ...rawCategory };
                    if (mapped.parentId !== undefined && mapped.parent_id === undefined) {
                        mapped.parent_id = mapped.parentId;
                        delete mapped.parentId; // 可选，避免冲突
                    }
                    if (mapped.icon !== undefined && mapped.icon_url === undefined) {
                        mapped.icon_url = mapped.icon;
                        delete mapped.icon;
                    }
                    // 确保 name 字段存在
                    if (!mapped.name) {
                        mapped.name = { name: newName, shortName: '' };
                    }
                    if (!mapped.name.name) mapped.name.name = newName;
                    if (!mapped.name.shortName) mapped.name.shortName = newName.slice(0, 2);

                    // 检查 id
                    if (!mapped.id) {
                        console.error('API 返回的分类数据缺少 id:', result);
                        alert('创建成功但返回数据异常，请刷新页面');
                        await loadCategories();
                        exitAddMode();
                        return;
                    }

                    const newNode = new TreeNode(mapped);
                    const parentId = parentForAdd.value.id;

                    // 顶级分类
                    if (parentId === -1) {
                        categoryTree.value.push(newNode);
                        await selectAndHighlightNode(newNode.id);
                        exitAddMode();
                        alert("添加成功");
                        return;
                    }

                    // 查找父节点
                    const parentNode = findNodeInTree(categoryTree.value, parentId);
                    if (!parentNode) {
                        // 父节点丢失，作为顶级分类处理
                        categoryTree.value.push(newNode);
                        await selectAndHighlightNode(newNode.id);
                        exitAddMode();
                        alert("添加成功（父节点未找到，已作为顶级分类）");
                        return;
                    }

                    // 判断父节点是否已展开
                    const isExpanded = expandedSet.value.has(parentId);

                    if (isExpanded) {
                        // 已展开：直接添加
                        if (!parentNode.children) parentNode.children = [];
                        parentNode.children.push(newNode);
                        parentNode.hasChildren = true;
                        parentNode.loaded = true;
                    } else {
                        // 未展开：拉取完整子列表，然后展开
                        try {
                            const apiChildren = await fetchChildren(parentId);
                            parentNode.children = apiChildren.map(apiChild => new TreeNode(apiChild));
                            parentNode.loaded = true;
                            parentNode.hasChildren = parentNode.children.length > 0;
                            // 如果后端尚未包含新节点（可能异步），手动补上
                            const exists = parentNode.children.some(c => c.id === newNode.id);
                            if (!exists) {
                                parentNode.children.push(newNode);
                                parentNode.hasChildren = true;
                            }
                            expandedSet.value.add(parentId);
                        } catch (err) {
                            console.error('加载子分类失败，使用本地添加', err);
                            if (!parentNode.children) parentNode.children = [];
                            parentNode.children.push(newNode);
                            parentNode.hasChildren = true;
                            parentNode.loaded = true;
                            expandedSet.value.add(parentId);
                        }
                    }

                    await selectAndHighlightNode(newNode.id);
                    exitAddMode();
                    alert("添加成功");

                } catch (err) {
                    console.error(err);
                    alert(`添加失败: ${err.message}`);
                }
            }

            // 选中 & 高亮
            async function selectAndHighlightNode(nodeId) {
                selectCategory(nodeId);
                highlightNodeId.value = nodeId;
                await nextTick();
                try {
                    const el = document.querySelector(`.node-content[data-id="${nodeId}"]`);
                    if (el) {
                        el.scrollIntoView({ block: 'center', behavior: 'smooth' });
                        setTimeout(() => { highlightNodeId.value = null; }, 2000);
                    } else {
                        setTimeout(() => {
                            const el2 = document.querySelector(`.node-content[data-id="${nodeId}"]`);
                            if (el2) {
                                el2.scrollIntoView({ block: 'center', behavior: 'smooth' });
                                setTimeout(() => { highlightNodeId.value = null; }, 2000);
                            } else {
                                highlightNodeId.value = null;
                            }
                        }, 300);
                    }
                } catch (e) { highlightNodeId.value = null; }
            }

            // 选择分类
            function selectCategory(id) {
                if (isAddMode.value) exitAddMode();
                const allNodes = [];
                const collect = (nodes) => { for (const node of nodes) { allNodes.push(node); if (node.children) collect(node.children); } };
                collect(categoryTree.value);
                const found = allNodes.find(n => n.id === id);
                if (found && found.name && found.name.name && found.name.name !== 'undefined') {
                    activeCategory.value = JSON.parse(JSON.stringify(found));
                    refreshEditable();
                    clearExtForm();
                } else {
                    activeCategory.value = { ...emptyCategory };
                    refreshEditable();
                }
            }

            function refreshEditable() {
                if (isAddMode.value) return;
                if (!isValidCategory.value || isSpecialUncategorized.value) {
                    editableCategory.value = { ...emptyCategory };
                    originalCategoryBackup.value = { ...emptyCategory };
                } else {
                    editableCategory.value = JSON.parse(JSON.stringify(activeCategory.value));
                    originalCategoryBackup.value = JSON.parse(JSON.stringify(activeCategory.value));
                }
            }

            function restoreOriginal() { if (isModified.value && isValidCategory.value && !isSpecialUncategorized.value && !isAddMode.value) editableCategory.value = JSON.parse(JSON.stringify(originalCategoryBackup.value)); }

            // 更新分类
            async function updateCurrentCategory() {
                if (isAddMode.value) return;
                if (!isValidCategory.value || isSpecialUncategorized.value) {
                    alert("无法修改系统保留分类");
                    return;
                }
                if (!editableCategory.value.name?.name || !editableCategory.value.name.name.trim()) {
                    alert("分类名称不能为空");
                    return;
                }
                if (!isModified.value) {
                    alert("无修改");
                    return;
                }
                const payload = { id: activeCategory.value.id };
                const orig = originalCategoryBackup.value;
                const curr = editableCategory.value;
                let nameChanged = false;
                let nameObj = {};
                if (curr.name.name !== orig.name.name) { nameObj.name = curr.name.name;
                    nameChanged = true; }
                if (curr.name.shortName !== orig.name.shortName) { nameObj.shortName = curr.name.shortName;
                    nameChanged = true; }
                if (nameChanged) { payload.name = nameObj; }
                if (curr.icon_url !== orig.icon_url) { payload.icon_url = curr.icon_url; }
                if (curr.description !== orig.description) { payload.description = curr.description; }
                let newParentId = curr.parent_id;
                if (isRootCategory.value) { newParentId = activeCategory.value.id; }
                if (newParentId !== orig.parent_id) { payload.parent_id = newParentId; }
                try {
                    await updateCategory(activeCategory.value.id, payload);
                    const allNodes = [];
                    const collect = (nodes) => { for (const node of nodes) { allNodes.push(node); if (node.children) collect(node.children); } };
                    collect(categoryTree.value);
                    const target = allNodes.find(n => n.id == activeCategory.value.id);
                    if (target) {
                        if (payload.name) {
                            if (payload.name.name !== undefined) target.name.name = payload.name.name;
                            if (payload.name.shortName !== undefined) target.name.shortName = payload.name.shortName;
                        }
                        if (payload.icon_url !== undefined) target.icon_url = payload.icon_url;
                        if (payload.description !== undefined) target.description = payload.description;
                        if (payload.parent_id !== undefined) target.parent_id = payload.parent_id;
                    }
                    selectCategory(activeCategory.value.id);
                    alert("更新成功");
                } catch (err) { console.error(err);
                    alert(`更新失败: ${err.message}`); }
            }

            // 删除分类
            function removeNodeFromTree(nodes, targetId) {
                for (let i = 0; i < nodes.length; i++) {
                    const node = nodes[i];
                    if (node.id === targetId) { nodes.splice(i, 1); return true; }
                    if (node.children && node.children.length) {
                        if (removeNodeFromTree(node.children, targetId)) {
                            node.hasChildren = node.children.length > 0;
                            return true;
                        }
                    }
                }
                return false;
            }

            async function deleteCategoryNode(node) {
                if (!node) return;
                const id = node.id;
                if (isAddMode.value) exitAddMode();
                if (id === -1) { alert("系统保留分类不可删除"); return; }
                const rootCount = categoryTree.value.filter(n => n.parent_id === n.id).length;
                if (node.parent_id === id && rootCount <= 1) { alert("至少保留一个顶级分类"); return; }
                if (!confirm(`永久删除分类“${node.name.name}”及其所有子类？`)) return;
                try {
                    await deleteCategory(id);
                    let toDeleteIds = new Set();
                    const findNodeAndCollect = (nodes) => {
                        for (const n of nodes) {
                            if (n.id === id) { collectAllDescendantIds(n, toDeleteIds); return true; }
                            if (n.children && findNodeAndCollect(n.children)) return true;
                        }
                        return false;
                    };
                    findNodeAndCollect(categoryTree.value);
                    if (toDeleteIds.size) {
                        const newExpanded = new Set(expandedSet.value);
                        toDeleteIds.forEach(delId => newExpanded.delete(delId));
                        expandedSet.value = newExpanded;
                    }
                    const success = removeNodeFromTree(categoryTree.value, id);
                    if (!success) { console.warn('本地删除失败，节点不存在'); return; }
                    if (activeCategory.value.id === id) {
                        activeCategory.value = { ...emptyCategory };
                        refreshEditable();
                    }
                } catch (err) { console.error(err);
                    alert(`删除失败: ${err.message}`); }
            }

            function deleteCurrentCategory() {
                if (isValidCategory.value && !isSpecialUncategorized.value && !isAddMode.value) {
                    deleteCategoryNode(activeCategory.value);
                }
            }

            // 图标上传预览
            const fileInput = ref(null);

            function triggerFileUpload() { if ((isValidCategory.value || isAddMode.value) && !isSpecialUncategorized.value) fileInput.value.click();
            else alert("无法修改系统保留分类"); }

            // 替换原有的 handleFileUpload 函数
            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (!file.type.startsWith('image/')) {
                    alert("请选择图片文件");
                    e.target.value = '';
                    return;
                }

                // 构建 FormData
                const formData = new FormData();
                formData.append('file', file);
                // 默认参数：重命名、按日期分目录
                formData.append('rename', 'true');
                formData.append('separateByDate', 'true');

                try {
                    const response = await fetch('https://slave.tooo.top/catalog/v1/upload', {
                        method: 'POST',
                        body: formData,
                        // 不手动设置 Content-Type，浏览器自动生成 multipart/form-data 边界
                    });

                    if (!response.ok) {
                        const text = await response.text();
                        throw new Error(`上传失败（${response.status}）：${text}`);
                    }

                    const result = await response.json();
                    if (result.code === 200 && result.url) {
                        // 将返回的 URL 赋值给当前编辑的分类图标
                        editableCategory.value.icon_url = result.url;
                        alert('上传成功');
                    } else {
                        throw new Error(result.message || '上传失败，服务器返回异常');
                    }
                } catch (err) {
                    console.error('上传错误:', err);
                    alert(`上传失败: ${err.message}`);
                } finally {
                    // 清空 input，允许重复选择同一文件
                    e.target.value = '';
                }
            };
            const modalVisible = ref(false);
            const modalImageUrl = ref('');
            const previewError = ref(false);

            function openModalPreview() { const url = editableCategory.value.icon_url; if (url && url.trim()) { modalImageUrl.value = url;
                previewError.value = false;
                modalVisible.value = true; } else alert("无图标URL或URL为空"); }

            function onModalImageError() { previewError.value = true; }

            // 扩展属性
            const extForm = ref({ displayName: '', fieldName: '', defaultValue: '', isRequired: '可选', sortOrder: 0 });
            const extBackup = ref({ displayName: '', fieldName: '', defaultValue: '', isRequired: '可选', sortOrder: 0 });
            const selectedExtId = ref(null);
            const selectedExtIdForSelect = ref('');
            const isSaveEnabled = computed(() => {
                if ((!isValidCategory.value && !isAddMode.value) || isSpecialUncategorized.value) return false;
                const hasContent = extForm.value.displayName || extForm.value.fieldName;
                if (!hasContent) return false;
                if (selectedExtId.value) {
                    return extForm.value.displayName !== extBackup.value.displayName || extForm.value.fieldName !== extBackup.value.fieldName || extForm.value.defaultValue !== extBackup.value.defaultValue || extForm.value.isRequired !== extBackup.value.isRequired || extForm.value.sortOrder !== extBackup.value.sortOrder;
                } else return true;
            });

            function clearExtForm() { extForm.value = { displayName: '', fieldName: '', defaultValue: '', isRequired: '可选',
                sortOrder: 0 };
                extBackup.value = { ...extForm.value };
                selectedExtId.value = null;
                selectedExtIdForSelect.value = ''; }

            function onSelectExtFromDropdown() {
                if ((!isValidCategory.value && !isAddMode.value) || isSpecialUncategorized.value) return;
                const rid = selectedExtIdForSelect.value;
                if (rid) {
                    const attr = allExtAttrs.value.find(a => a.recordId === rid);
                    if (attr && attr.classId === activeCategory.value.id) {
                        const newForm = { displayName: attr.displayName, fieldName: attr.fieldName, defaultValue: attr.defaultValue || '',
                            isRequired: attr.isRequired, sortOrder: attr.sortOrder };
                        extForm.value = { ...newForm };
                        extBackup.value = { ...newForm };
                        selectedExtId.value = attr.recordId;
                    } else selectedExtIdForSelect.value = '';
                } else clearExtForm();
            }

            function saveExtAttribute() {
                if ((!isValidCategory.value && !isAddMode.value) || isSpecialUncategorized.value) { alert("无法修改系统保留分类的扩展属性"); return; }
                if (!extForm.value.displayName || !extForm.value.displayName.trim()) { alert("显示名称不能为空"); return; }
                if (!extForm.value.fieldName || !extForm.value.fieldName.trim()) { alert("别名不能为空"); return; }
                const currentAlias = extForm.value.fieldName.trim();
                let duplicate = false;
                if (selectedExtId.value) duplicate = activeExtList.value.some(a => a.fieldName === currentAlias && a.recordId !== selectedExtId.value);
                else duplicate = activeExtList.value.some(a => a.fieldName === currentAlias);
                if (duplicate) { alert("别名已存在，请使用其他别名"); return; }
                if (selectedExtId.value) {
                    const idx = allExtAttrs.value.findIndex(a => a.recordId === selectedExtId.value);
                    if (idx !== -1) {
                        allExtAttrs.value[idx] = { ...allExtAttrs.value[idx], displayName: extForm.value.displayName,
                            fieldName: extForm.value.fieldName, defaultValue: extForm.value.defaultValue,
                            isRequired: extForm.value.isRequired, sortOrder: extForm.value.sortOrder };
                        extBackup.value = { ...extForm.value };
                        alert("属性更新成功");
                    }
                } else {
                    const newAttr = { recordId: `${Date.now()}-${Math.random().toString(36).substr(2, 8)}`, classId: activeCategory.value.id,
                        displayName: extForm.value.displayName, fieldName: extForm.value.fieldName,
                        defaultValue: extForm.value.defaultValue, isRequired: extForm.value.isRequired,
                        sortOrder: extForm.value.sortOrder || (activeExtList.value.length + 1), autoId: ++lastAutoId };
                    allExtAttrs.value.push(newAttr);
                    clearExtForm();
                    alert(`属性 "${newAttr.displayName}" 添加成功`);
                }
            }

            function deleteExtAttribute() { if (!selectedExtId.value) { alert("请选择要删除的属性"); return; } if (confirm("永久删除此扩展属性？")) { allExtAttrs.value = allExtAttrs.value.filter(a => a.recordId !== selectedExtId.value);
                clearExtForm(); } }

            function syncToSubClass() { alert("演示: 扩展属性同步子类完成"); }
            let lastAutoId = 500;

            function toggleExpand(id) { const set = new Set(expandedSet.value); if (set.has(id)) set.delete(id);
            else set.add(id);
                expandedSet.value = set; }

            function onNodeUpdated() {}

            watch(activeCategory, () => { if (!isAddMode.value) { clearExtForm();
                refreshEditable(); } });
            onMounted(() => { loadCategories();
                modalVisible.value = false;
                previewError.value = false; });

            return {
                loading,
                errorMsg,
                categoryTree,
                expandedSet,
                toggleExpand,
                searchKeyword,
                onSearchInput,
                onSearchEnter,
                searchLoading,
                selectCategory,
                loadCategories,
                addChild,
                deleteCategoryNode,
                deleteCurrentCategory,
                onNodeUpdated,
                flatCategoryList,
                activeCategory,
                editableCategory,
                isModified,
                restoreOriginal,
                updateCurrentCategory,
                hasSubCategories,
                isValidCategory,
                isSpecialUncategorized,
                isRootCategory,
                activeExtList,
                extForm,
                selectedExtId,
                selectedExtIdForSelect,
                isSaveEnabled,
                clearExtForm,
                onSelectExtFromDropdown,
                saveExtAttribute,
                deleteExtAttribute,
                syncToSubClass,
                fileInput,
                triggerFileUpload,
                handleFileUpload,
                modalVisible,
                modalImageUrl,
                previewError,
                openModalPreview,
                onModalImageError,
                searchMatchSet,
                isAddMode,
                parentForAdd,
                cancelAddMode,
                saveNewCategory,
                isCollapsed,
                toggleSidebar,
                highlightNodeId
            };
        }
    }).mount('#vueApp');
</script>
</body>
</html>
