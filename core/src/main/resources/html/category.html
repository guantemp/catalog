<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0, user-scalable=no" name="viewport">
    <title>分类管理 · 内嵌版</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap"
          rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1"
          rel="stylesheet">
    <style>
        /* ===== 保留全部原有样式，仅调整配色 ===== */
        [v-cloak] {
            display: none !important;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1e2a36;
            font-family: 'Inter', system-ui, sans-serif;
            color: #e8edf4;
            overflow: hidden;
            height: 100vh;
        }

        .app-layout {
            display: flex;
            gap: 20px;
            width: 100%;
            height: 100vh;
            padding: 10px;
            min-height: 0;
            background: transparent;
        }

        /* ----- 以下样式仅调整颜色值，结构与类名未变 ----- */
        .tree-panel {
            flex: 0 0 350px;
            background: #2a3a48;
            border-radius: 28px;
            border: 1px solid #3e5566;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .right-panel {
            flex: 1;
            min-width: 560px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .card {
            background: #2a3a48;
            border-radius: 28px;
            border: 1px solid #3e5566;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .card-body {
            padding: 28px 32px;
            overflow-y: auto;
            flex: 1;
            background: #1e2a36;
        }

        .tree-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid #3e5566;
            background: #2a3a48;
            flex-shrink: 0;
        }

        .tree-header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .tree-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: #e8edf4;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tree-title i {
            color: #2D9CDB;
        }

        .add-root-btn {
            background: rgba(45, 156, 219, 0.2);
            border: 1px solid #2D9CDB;
            color: #b8d8f0;
            padding: 6px 14px;
            border-radius: 32px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .add-root-btn:hover {
            background: rgba(45, 156, 219, 0.35);
            border-color: #4DB8F0;
            color: white;
        }

        .search-box {
            position: relative;
            width: 100%;
        }

        .search-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #8fa8b8;
            font-size: 0.9rem;
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 40px;
            background: #15222e;
            border: 1px solid #3e5566;
            border-radius: 40px;
            color: #e8edf4;
            font-size: 0.85rem;
            transition: 0.2s;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .search-box input:focus {
            border-color: #2D9CDB;
            outline: none;
            box-shadow: 0 0 0 3px rgba(45, 156, 219, 0.25);
        }

        .search-loading {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #2D9CDB;
            font-size: 0.8rem;
            pointer-events: none;
        }

        .tree-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 12px 12px 20px 16px;
            background: #1e2a36;
            display: flex;
            flex-direction: column;
        }

        .tree-node, .tree-node ul, .node-item {
            list-style: none !important;
            margin: 0;
            padding-left: 0;
        }

        .tree-node ul {
            padding-left: 28px;
        }

        .node-item {
            margin: 2px 0;
        }

        .node-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.9rem;
            color: #c8d8e8;
        }

        .node-content:hover {
            background: rgba(45, 156, 219, 0.12);
            color: #e8edf4;
        }

        .active-cat {
            background: linear-gradient(135deg, #1a2a3a, #233544);
            color: #e0ecf5 !important;
            border-left: 3px solid #2D9CDB;
            font-weight: 500;
        }

        .node-content.search-match-node {
            background: transparent !important;
            border-left: none !important;
            box-shadow: none !important;
        }

        .node-content.search-match-node .node-name span {
            color: #fbbf24 !important;
            font-weight: 700 !important;
            text-shadow: 0 0 4px rgba(251, 191, 36, 0.6);
        }

        .node-content.search-match-node .node-icon-img {
            box-shadow: 0 0 10px #fbbf24, 0 0 4px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            transform: scale(1.1);
        }

        .node-content.search-match-node:hover .node-name span {
            color: #fcd34d !important;
        }

        .node-name {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        .toggle-box {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 22px;
            height: 22px;
            border: 1px solid #3e5566;
            border-radius: 6px;
            background: #15222e;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            color: #8fa8b8;
            transition: 0.1s;
            user-select: none;
            flex-shrink: 0;
            box-shadow: 0 1px 1px rgba(0, 0, 0, 0.2);
        }

        .toggle-box:hover {
            background: #2a3a48;
            border-color: #2D9CDB;
            color: #2D9CDB;
        }

        .node-icon-img {
            width: 20px;
            height: 20px;
            border-radius: 6px;
            object-fit: cover;
            background: #15222e;
            flex-shrink: 0;
            transition: all 0.15s ease;
        }

        .node-actions {
            display: none;
            gap: 6px;
            margin-left: 8px;
        }

        .node-content:hover .node-actions {
            display: flex;
        }

        .node-actions i {
            font-size: 0.7rem;
            padding: 5px;
            border-radius: 8px;
            background: #15222e;
            color: #8fa8b8;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .node-actions i:hover {
            background: #2a3a48;
            color: #2D9CDB;
        }

        .card-header {
            padding: 20px 28px;
            border-bottom: 1px solid #3e5566;
            background: #2a3a48;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .card-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #e8edf4;
        }

        .add-mode-badge {
            background: rgba(45, 156, 219, 0.2);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.75rem;
            color: #7AC9FF;
            margin-left: 12px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px 32px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field-group label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #7AC9FF;
            letter-spacing: 0.3px;
        }

        .required-star {
            color: #f87171;
            margin-left: 4px;
            font-size: 0.8rem;
        }

        input, select, textarea {
            background: #15222e;
            border: 1px solid #3e5566;
            border-radius: 16px;
            padding: 11px 16px;
            font-size: 0.9rem;
            transition: 0.2s;
            color: #e8edf4;
            font-family: 'Inter', monospace;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #2D9CDB;
            box-shadow: 0 0 0 3px rgba(45, 156, 219, 0.2);
            outline: none;
        }

        .field-group select {
            width: 100%;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 24px;
            justify-content: flex-end;
        }

        button {
            background: #2a3a48;
            border: 1px solid #3e5566;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #c8d8e8;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        button.primary {
            background: linear-gradient(135deg, #2D9CDB, #4DB8F0);
            border: none;
            color: white;
            box-shadow: 0 4px 8px rgba(45, 156, 219, 0.3);
        }

        button.primary:hover {
            background: linear-gradient(135deg, #1a8bc8, #3EACEB);
            transform: translateY(-1px);
        }

        button.danger {
            background: #4d2e2e;
            border-color: #6a4242;
            color: #f5c8b8;
        }

        button.danger:hover {
            background: #6a3a3a;
        }

        button.warning {
            background: #8a4a1a;
            border-color: #b86a2a;
            color: #fffbeb;
        }

        button.warning:hover {
            background: #7a3a10;
        }

        button.info {
            background: #1a4a5a;
            border-color: #2a6a7a;
            color: #cffafe;
        }

        button.info:hover {
            background: #1a5a6a;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        hr {
            margin: 28px 0 20px;
            border: none;
            border-top: 1px solid #3e5566;
        }

        .extended-section {
            background: #1e2a36;
            border-radius: 24px;
            padding: 16px 0 8px;
            margin-top: 12px;
        }

        .section-mini-title {
            font-weight: 600;
            margin: 12px 0 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            border-left: 3px solid #2D9CDB;
            padding-left: 16px;
            color: #e8edf4;
        }

        .attr-selector {
            background: #2a3a48;
            border-radius: 20px;
            padding: 12px 18px;
            margin-bottom: 24px;
            border: 1px solid #3e5566;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 14px;
        }

        .attr-selector-left {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .badge-count {
            background: #15222e;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #7AC9FF;
            font-weight: 500;
        }

        .attr-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .icon-url-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .icon-url-wrapper input {
            flex: 1;
            min-width: 200px;
        }

        .icon-actions button {
            padding: 8px 16px;
            background: #2a3a48;
            border: 1px solid #3e5566;
            font-size: 0.75rem;
        }

        .modal-mask {
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-container {
            background: #2a3a48;
            border-radius: 32px;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            width: auto;
            max-width: 80vw;
            border: 1px solid #3e5566;
        }

        .modal-header {
            padding: 16px 24px;
            background: #1e2a36;
            border-bottom: 1px solid #3e5566;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            color: #e8edf4;
            font-size: 1rem;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: #8fa8b8;
            line-height: 1;
        }

        .modal-close:hover {
            color: #f87171;
        }

        .modal-body {
            padding: 24px;
            text-align: center;
            min-width: 300px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1e2a36;
        }

        .modal-body img {
            max-width: 100%;
            max-height: 60vh;
            border-radius: 20px;
            display: block;
        }

        .preview-error {
            color: #f87171;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .preview-error i {
            font-size: 3rem;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #1e2a36;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #3e5566;
            border-radius: 10px;
        }

        .loading-placeholder {
            text-align: center;
            padding: 40px;
            color: #8fa8b8;
        }

        .empty-placeholder {
            text-align: center;
            padding: 40px;
            color: #8fa8b8;
        }

        .error-banner {
            background: #2a3a48;
            border: none;
            border-radius: 40px;
            padding: 6px 16px;
            margin: 8px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: nowrap;
            gap: 8px 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            color: #fca5a5;
            font-size: 0.7rem;
            width: 100%;
        }

        .error-banner .retry-btn {
            background: #dc2626;
            border: none;
            padding: 2px 14px;
            border-radius: 30px;
            color: white;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.15s;
            font-weight: 500;
            line-height: 1.8;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .error-banner .retry-btn:hover {
            background: #b91c1c;
        }

        .error-banner .retry-btn:active {
            transform: scale(0.96);
        }

        .error-banner i {
            margin-right: 4px;
        }

        @keyframes highlight-flash {
            0% {
                background: rgba(251, 191, 36, 0.5);
                border-left-color: #fbbf24;
                box-shadow: 0 0 20px rgba(251, 191, 36, 0.3);
            }
            70% {
                background: rgba(251, 191, 36, 0.15);
                border-left-color: #fbbf24;
                box-shadow: 0 0 8px rgba(251, 191, 36, 0.1);
            }
            100% {
                background: transparent;
                border-left-color: transparent;
                box-shadow: none;
            }
        }

        .node-content.highlight-new {
            animation: highlight-flash 1.8s ease-out forwards;
            border-left: 3px solid #fbbf24 !important;
        }

        .disabled-select {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* 响应式保留（原样） */
        @media (max-width: 1000px) {
            .tree-panel {
                flex: 0 0 300px;
            }

            .right-panel {
                min-width: 300px;
            }
        }

        @media (max-width: 760px) {
            .app-layout {
                flex-direction: column;
                padding: 12px;
                gap: 12px;
                height: auto;
                overflow-y: auto;
            }

            .tree-panel {
                flex: none;
                height: 50vh;
                min-height: 300px;
                width: 100%;
            }

            .right-panel {
                min-width: unset;
                height: 50vh;
                min-height: 300px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div id="vueApp" v-cloak>
    <div class="app-layout">
        <!-- 左侧树 -->
        <div class="tree-panel">
            <div class="tree-header">
                <div class="tree-header-top">
                    <div class="tree-title"><i class="fas fa-folder-tree"></i> 类别</div>
                    <button @click="addChild(null)" class="add-root-btn"><i class="fas fa-plus"></i> 根类</button>
                </div>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input @input="onSearchInput" @keydown.enter="onSearchEnter" placeholder="搜索分类..." type="text"
                           v-model="searchKeyword">
                    <i class="fas fa-spinner fa-pulse search-loading" v-if="searchLoading"></i>
                </div>
            </div>
            <div class="tree-scroll">
                <div class="loading-placeholder" v-if="loading"><i class="fas fa-spinner fa-pulse"></i> 加载分类中...
                </div>
                <div class="error-banner" v-else-if="errorMsg">
                    <span><i class="fas fa-exclamation-triangle"></i> {{ errorMsg }}</span>
                    <button @click="loadCategories" class="retry-btn"><i class="fas fa-sync-alt"></i> 重试</button>
                </div>
                <ul class="tree-node" v-else-if="!loading && categoryTree.length > 0">
                    <tree-item
                            :active-id="activeCategory.id"
                            :depth="1"
                            :expanded-set="expandedSet"
                            :highlight-id="highlightNodeId"
                            :key="node.id"
                            :node="node"
                            :search-match-set="searchMatchSet"
                            @add-child="addChild"
                            @delete-cat="deleteCategoryNode"
                            @node-updated="onNodeUpdated"
                            @select="selectCategory"
                            @toggle="toggleExpand"
                            v-for="node in categoryTree"
                    ></tree-item>
                </ul>
                <div class="empty-placeholder" v-else-if="!loading && categoryTree.length === 0">
                    <i class="fas fa-folder-open"></i> 暂无分类数据
                </div>
            </div>
        </div>

        <!-- 右侧属性 -->
        <div class="right-panel">
            <div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-info-circle"></i> 属性<span class="add-mode-badge" v-if="isAddMode"><i
                            class="fas fa-plus-circle"></i> 添加子分类模式</span></h2>
                </div>
                <div class="card-body">
                    <div class="form-grid">
                        <div class="field-group">
                            <label><i class="fas fa-level-up-alt"></i> 上级分类 <span
                                    class="required-star">*</span></label>
                            <div v-if="isAddMode && parentForAdd">
                                <select :disabled="true" class="disabled-select">
                                    <option :value="parentForAdd.id">{{ parentForAdd.name }}</option>
                                </select>
                            </div>
                            <div v-else-if="activeCategory.id && !isAddMode">
                                <select :disabled="true" v-if="isRootCategory">
                                    <option :value="activeCategory.id">{{ activeCategory.name.name }}（顶级分类）</option>
                                </select>
                                <select :disabled="isSpecialUncategorized" v-else v-model="editableCategory.parent_id">
                                    <option value="-1">无（顶级分类）</option>
                                    <option :disabled="cat.id === editableCategory.id" :value="cat.id"
                                            v-for="cat in flatCategoryList">{{ cat.name.name }}
                                    </option>
                                </select>
                            </div>
                            <select :disabled="true" v-else>
                                <option value="">请先选择一个分类</option>
                            </select>
                        </div>
                        <div class="field-group">
                            <label>分类名称 <span class="required-star">*</span></label>
                            <input :disabled="(!isValidCategory && !isAddMode) || isSpecialUncategorized" placeholder="例：品质男鞋"
                                   ref="categoryNameInput"
                                   v-model="editableCategory.name.name">
                        </div>
                        <div class="field-group">
                            <label>简称</label>
                            <input :disabled="(!isValidCategory && !isAddMode) || isSpecialUncategorized" placeholder="简称"
                                   v-model="editableCategory.name.shortName">
                        </div>
                        <div class="field-group full-width">
                            <label>图标URL</label>
                            <div class="icon-url-wrapper">
                                <input :disabled="(!isValidCategory && !isAddMode) || isSpecialUncategorized" placeholder="https://... 或上传图片"
                                       v-model="editableCategory.icon_url">
                                <div class="icon-actions">
                                    <button :disabled="(!isValidCategory && !isAddMode) || isSpecialUncategorized" @click="triggerFileUpload"
                                            type="button"><i
                                            class="fas fa-cloud-upload-alt"></i> 上传
                                    </button>
                                    <button :disabled="!editableCategory.icon_url || ((!isValidCategory && !isAddMode) || isSpecialUncategorized)" @click="openModalPreview"
                                            type="button">
                                        <i class="fas fa-eye"></i> 预览
                                    </button>
                                </div>
                            </div>
                            <input @change="handleFileUpload" accept="image/*" ref="fileInput" style="display:none"
                                   type="file">
                        </div>
                        <div class="field-group full-width">
                            <label>描述</label>
                            <textarea :disabled="(!isValidCategory && !isAddMode) || isSpecialUncategorized" rows="2"
                                      v-model="editableCategory.description"></textarea>
                        </div>
                    </div>
                    <div class="btn-group" v-if="!isAddMode">
                        <button :disabled="!isModified || !isValidCategory || isSpecialUncategorized"
                                @click="restoreOriginal" class="info"><i
                                class="fas fa-undo-alt"></i> 恢复
                        </button>
                        <button :disabled="!isModified || !isValidCategory || isSpecialUncategorized"
                                @click="updateCurrentCategory" class="warning"><i
                                class="fas fa-save"></i> 修改
                        </button>
                        <button :disabled="!isValidCategory || isSpecialUncategorized" @click="deleteCurrentCategory"
                                class="danger"><i class="fas fa-trash"></i> 删除
                        </button>
                    </div>
                    <div class="btn-group" v-else>
                        <button @click="cancelAddMode" class="info"><i class="fas fa-times"></i> 取消</button>
                        <button @click="saveNewCategory" class="primary"><i class="fas fa-save"></i> 保存</button>
                    </div>
                    <hr/>
                    <div class="extended-section">
                        <div class="section-mini-title"><i class="fas fa-cog"></i> 扩展属性</div>
                        <div class="attr-selector">
                            <div class="attr-selector-left">
                                <label>属性名：</label>
                                <select :disabled="(!isValidCategory && !isAddMode) || isSpecialUncategorized" @change="onSelectExtFromDropdown"
                                        v-model="selectedExtIdForSelect">
                                    <option value="">-- 选择属性 --</option>
                                    <option :value="attr.recordId" v-for="attr in activeExtList">{{ attr.displayName }}
                                        ({{ attr.fieldName }})
                                    </option>
                                </select>
                                <span class="badge-count" v-if="activeExtList.length">共 {{ activeExtList.length
                                    }} 个字段</span>
                                <span class="badge-count" v-else>暂无扩展属性</span>
                            </div>
                            <div class="attr-actions">
                                <button :disabled="!isSaveEnabled || (!isValidCategory && !isAddMode) || isSpecialUncategorized"
                                        @click="saveExtAttribute"
                                        class="warning"><i class="fas fa-save"></i> 保存
                                </button>
                                <button :disabled="!selectedExtId || (!isValidCategory && !isAddMode) || isSpecialUncategorized"
                                        @click="deleteExtAttribute"
                                        class="danger"><i class="fas fa-trash"></i> 删除
                                </button>
                                <button @click="clearExtForm" class="info"><i class="fas fa-eraser"></i> 清空</button>
                            </div>
                        </div>
                        <div class="form-grid">
                            <div class="field-group"><label>显示名称 <span class="required-star">*</span></label><input
                                    :disabled="(!isValidCategory && !isAddMode) || isSpecialUncategorized" placeholder="例：颜色"
                                    v-model="extForm.displayName"></div>
                            <div class="field-group"><label>别名 <span class="required-star">*</span></label><input
                                    :disabled="(!isValidCategory && !isAddMode) || isSpecialUncategorized" placeholder="例：YanSe"
                                    v-model="extForm.fieldName"></div>
                            <div class="field-group"><label>默认值</label><input :disabled="(!isValidCategory && !isAddMode) || isSpecialUncategorized"
                                                                                 placeholder="红色、橙色、绿色"
                                                                                 v-model="extForm.defaultValue">
                            </div>
                            <div class="field-group"><label>是否必填</label><select :disabled="(!isValidCategory && !isAddMode) || isSpecialUncategorized"
                                                                                    v-model="extForm.isRequired">
                                <option>必填</option>
                                <option>可选</option>
                            </select></div>
                            <div class="field-group"><label>排序号</label><input :disabled="(!isValidCategory && !isAddMode) || isSpecialUncategorized"
                                                                                 type="number"
                                                                                 v-model="extForm.sortOrder">
                            </div>
                        </div>
                        <div class="btn-group" style="justify-content: flex-start; margin-top: 16px;">
                            <button :disabled="!hasSubCategories || (!isValidCategory && !isAddMode) || isSpecialUncategorized"
                                    @click="syncToSubClass"
                                    class="warning"><i class="fas fa-share-alt"></i> 同步应用到子类
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 预览模态框 -->
    <div @click.self="modalVisible = false" class="modal-mask" v-if="modalVisible">
        <div class="modal-container">
            <div class="modal-header"><h3><i class="fas fa-image"></i> 图标预览</h3>
                <button @click="modalVisible = false" class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <img :src="modalImageUrl" @error="onModalImageError" style="max-width:100%; max-height:60vh; border-radius:20px;"
                     v-if="!previewError">
                <div class="preview-error" v-else><i
                        class="fas fa-exclamation-triangle"></i><span>图片加载失败，请检查URL地址是否有效</span><span
                        style="font-size:0.7rem; color:#8fa8b8;">{{ modalImageUrl }}</span></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
<script>
    const {createApp, ref, computed, onMounted, watch, nextTick} = Vue;

    // ---------- 工具函数 ----------
    function safeParseBigIntJson(jsonStr) {
        const safeStr = jsonStr.replace(/:\s*(-?\d{16,})(?=\s*[,\]}])/g, ':"$1"');
        return JSON.parse(safeStr);
    }

    const API_BASE = 'https://slave.tooo.top/catalog/v1/categories';

    async function apiFetch(url, options = {}) {
        const response = await fetch(url, options);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const text = await response.text();
        return safeParseBigIntJson(text);
    }

    async function fetchChildren(id) {
        const data = await apiFetch(`${API_BASE}/${id}/children`);
        return data.categories || [];
    }

    async function fetchRoots() {
        const data = await apiFetch(`${API_BASE}/root`);
        return data.categories || [];
    }

    async function fetchDescendants(id) {
        const data = await apiFetch(`${API_BASE}/${id}/desc.`);
        return data.category;
    }

    async function searchRemote(keyword) {
        const encoded = encodeURIComponent(keyword);
        const url = `${API_BASE}?s=${encoded}&offset=0&limit=64`;
        const data = await apiFetch(url);
        return data.categories || [];
    }

    async function createCategory(payload) {
        const response = await fetch(API_BASE, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        if (!response.ok) throw new Error('创建失败');
        const text = await response.text();
        return safeParseBigIntJson(text);
    }

    async function updateCategory(id, payload) {
        const response = await fetch(`${API_BASE}/${id}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        if (!response.ok) throw new Error('更新失败');
        const text = await response.text();
        return safeParseBigIntJson(text);
    }

    async function deleteCategory(id) {
        const response = await fetch(`${API_BASE}/${id}`, {method: 'DELETE'});
        if (!response.ok) throw new Error('删除失败');
        const text = await response.text();
        return text ? safeParseBigIntJson(text) : {};
    }

    // ---------- TreeNode 类 ----------
    class TreeNode {
        constructor(apiNode) {
            if (!apiNode || apiNode.id === undefined || apiNode.id === null) {
                console.error('无效的节点数据:', apiNode);
                throw new Error('节点缺少 id 字段');
            }
            this.id = apiNode.id;
            this.name = apiNode.name || {name: '', shortName: ''};
            this.icon_url = apiNode.icon_url || null;
            let parentId = apiNode.parent_id;
            if (apiNode.parentId !== undefined && parentId === undefined) {
                parentId = apiNode.parentId;
            }
            this.parent_id = (parentId === -1) ? this.id : (parentId || -1);
            this.description = apiNode.description || '';
            this.left = apiNode.left || 0;
            this.right = apiNode.right || 0;
            this.hasChildren = (this.right - this.left) > 1;
            this.children = [];
            this.loaded = false;
            this.depth = 0;
        }
    }

    // ---------- TreeItem 组件 ----------
    const TreeItem = {
        name: 'TreeItem',
        props: {
            node: Object,
            activeId: [Number, String],
            expandedSet: Set,
            searchMatchSet: Set,
            highlightId: [Number, String, null],
            depth: {type: Number, default: 1}
        },
        emits: ['toggle', 'select', 'add-child', 'delete-cat', 'node-updated'],
        data() {
            return {loadingChildren: false};
        },
        template: `
          <li class="node-item">
            <div class="node-content"
                 :data-id="node.id"
                 :class="{
                       'active-cat': node.id === activeId,
                       'search-match-node': isSearchMatch,
                       'highlight-new': node.id === highlightId
                     }"
                 @click="$emit('select', node.id)">
              <div class="node-name">
                <span v-if="node.hasChildren" class="toggle-box" @click.stop="handleToggle">{{ isExpanded ? '−' : '+' }}</span>
                <span v-else class="toggle-box" style="visibility: hidden;"></span>
                <img v-if="node.icon_url" :src="node.icon_url" class="node-icon-img" @error="e => e.target.style.display='none'">
                <span>{{ node.name.name }}</span>
              </div>
              <div class="node-actions" v-if="!isSpecialNode">
                <i v-if="depth < 4" class="fas fa-plus-circle" title="添加子分类" @click.stop="$emit('add-child', node)"></i>
                <i class="fas fa-trash" title="删除分类" @click.stop="$emit('delete-cat', node)"></i>
              </div>
            </div>
            <ul class="children" v-if="node.hasChildren && isExpanded">
              <div v-if="loadingChildren" class="loading-placeholder">加载中...</div>
              <template v-else>
                <tree-item v-for="child in node.children"
                           :key="child.id"
                           :node="child"
                           :active-id="activeId"
                           :expanded-set="expandedSet"
                           :search-match-set="searchMatchSet"
                           :highlight-id="highlightId"
                           :depth="depth + 1"
                           @toggle="$emit('toggle', $event)"
                           @select="$emit('select', $event)"
                           @add-child="$emit('add-child', $event)"
                           @delete-cat="$emit('delete-cat', $event)"
                           @node-updated="$emit('node-updated', $event)"></tree-item>
              </template>
            </ul>
          </li>
        `,
        computed: {
            isExpanded() {
                return this.expandedSet.has(this.node.id);
            },
            isSearchMatch() {
                return this.searchMatchSet && this.searchMatchSet.has(this.node.id);
            },
            isSpecialNode() {
                return this.node.id === -1 && this.node.name && this.node.name.name === '未分类';
            }
        },
        methods: {
            async handleToggle() {
                if (this.isExpanded) {
                    this.$emit('toggle', this.node.id);
                    return;
                }
                if (this.node.hasChildren && !this.node.loaded) {
                    this.loadingChildren = true;
                    try {
                        const apiChildren = await fetchChildren(this.node.id);
                        const newChildren = apiChildren.map(apiChild => new TreeNode(apiChild));
                        this.node.children = newChildren;
                        this.node.loaded = true;
                        this.$emit('node-updated', this.node.id);
                    } catch (err) {
                        console.error(err);
                        alert(`加载子分类失败: ${err.message}`);
                    } finally {
                        this.loadingChildren = false;
                    }
                }
                this.$emit('toggle', this.node.id);
            }
        }
    };

    // ---------- Vue 应用 ----------
    createApp({
        components: {TreeItem},
        setup() {
            // ===== 数据 =====
            const categoryTree = ref([]);
            const loading = ref(true);
            const errorMsg = ref('');
            const emptyCategory = {
                id: null, name: {name: '', shortName: ''}, icon_url: null, parent_id: -1,
                description: ''
            };
            const activeCategory = ref({...emptyCategory});
            const originalCategoryBackup = ref({...emptyCategory});
            const editableCategory = ref({...emptyCategory});
            const allExtAttrs = ref([]);
            const searchKeyword = ref('');
            const expandedSet = ref(new Set());
            const searchLoading = ref(false);
            const isAddMode = ref(false);
            const parentForAdd = ref(null);
            const highlightNodeId = ref(null);

            // ===== 侧边栏折叠（已移除，但保留变量以防意外） =====
            const isCollapsed = ref(false);

            // ===== 顶部导航（已移除，但保留变量以防意外） =====
            const topSearchKeyword = ref('');
            const topSearchFocused = ref(false);
            const topSearching = ref(false);
            const notificationCount = ref(3);
            const dropdownVisible = ref(false);
            const userDropdownRef = ref(null);

            // ===== 计算属性 =====
            const searchMatchSet = computed(() => new Set(lastSearchResults.value.map(r => r.id)));
            const isRootCategory = computed(() => activeCategory.value.id && activeCategory.value.parent_id === activeCategory.value.id);
            const isValidCategory = computed(() => activeCategory.value.id && activeCategory.value.name && activeCategory.value.name.name && activeCategory.value.name.name !== 'undefined');
            const isSpecialUncategorized = computed(() => activeCategory.value.id === -1 && activeCategory.value.name && activeCategory.value.name.name === '未分类');
            const flatCategoryList = computed(() => {
                const all = [];
                const collect = (nodes) => {
                    for (const node of nodes) {
                        all.push(node);
                        if (node.children) collect(node.children);
                    }
                };
                collect(categoryTree.value);
                return all.filter(c => c.id !== editableCategory.value.id);
            });
            const activeExtList = computed(() => allExtAttrs.value.filter(a => a.classId === activeCategory.value.id));
            const isModified = computed(() => {
                if (!isValidCategory.value) return false;
                const c = editableCategory.value,
                    o = originalCategoryBackup.value;
                return c.name?.name !== o.name?.name || c.name?.shortName !== o.name?.shortName || c.icon_url !== o.icon_url || c.description !== o.description || c.parent_id !== o.parent_id;
            });
            const hasSubCategories = computed(() => flatCategoryList.value.some(c => c.parent_id === activeCategory.value.id));

            // ===== 扩展属性表单 =====
            const extForm = ref({displayName: '', fieldName: '', defaultValue: '', isRequired: '可选', sortOrder: 0});
            const extBackup = ref({displayName: '', fieldName: '', defaultValue: '', isRequired: '可选', sortOrder: 0});
            const selectedExtId = ref(null);
            const selectedExtIdForSelect = ref('');
            const isSaveEnabled = computed(() => {
                if ((!isValidCategory.value && !isAddMode.value) || isSpecialUncategorized.value) return false;
                const hasContent = extForm.value.displayName || extForm.value.fieldName;
                if (!hasContent) return false;
                if (selectedExtId.value) {
                    return extForm.value.displayName !== extBackup.value.displayName || extForm.value.fieldName !== extBackup.value.fieldName || extForm.value.defaultValue !== extBackup.value.defaultValue || extForm.value.isRequired !== extBackup.value.isRequired || extForm.value.sortOrder !== extBackup.value.sortOrder;
                } else return true;
            });

            // ===== 搜索 =====
            const lastSearchKeyword = ref('');
            const lastSearchResults = ref([]);

            function findNodeInTree(nodes, id) {
                for (const node of nodes) {
                    if (node.id === id) return node;
                    if (node.children && node.children.length) {
                        const found = findNodeInTree(node.children, id);
                        if (found) return found;
                    }
                }
                return null;
            }

            function collectAllDescendantIds(node, ids = new Set()) {
                ids.add(node.id);
                if (node.children) {
                    for (const child of node.children) {
                        collectAllDescendantIds(child, ids);
                    }
                }
                return ids;
            }

            function findNodePath(nodeList, targetId, currentPath = []) {
                for (const node of nodeList) {
                    const newPath = [...currentPath, node.id];
                    if (node.id === targetId) return newPath;
                    if (node.children && node.children.length) {
                        const childResult = findNodePath(node.children, targetId, newPath);
                        if (childResult) return childResult;
                    }
                }
                return null;
            }

            function applyExpansionFromResults(results) {
                if (!results || results.length === 0) return;
                const toExpandSet = new Set();
                for (const result of results) {
                    const path = findNodePath(categoryTree.value, result.id);
                    if (path && path.length > 1) {
                        for (let i = 0; i < path.length - 1; i++) toExpandSet.add(path[i]);
                    }
                }
                if (toExpandSet.size) {
                    const newExpanded = new Set(expandedSet.value);
                    toExpandSet.forEach(id => newExpanded.add(id));
                    expandedSet.value = newExpanded;
                }
            }

            async function performRemoteSearch(keyword, forceRequest = false) {
                if (!keyword || keyword.trim() === '') {
                    lastSearchResults.value = [];
                    return;
                }
                if (keyword === lastSearchKeyword.value && !forceRequest) {
                    if (lastSearchResults.value.length) applyExpansionFromResults(lastSearchResults.value);
                    return;
                }
                searchLoading.value = true;
                topSearching.value = true;
                try {
                    const results = await searchRemote(keyword);
                    lastSearchKeyword.value = keyword;
                    lastSearchResults.value = results;
                    applyExpansionFromResults(results);
                } catch (err) {
                    console.error(err);
                    alert('搜索失败: ' + err.message);
                } finally {
                    searchLoading.value = false;
                    topSearching.value = false;
                }
            }

            let debounceTimer = null;

            function onSearchInput() {
                if (debounceTimer) clearTimeout(debounceTimer);
                const keyword = searchKeyword.value;
                debounceTimer = setTimeout(() => performRemoteSearch(keyword, false), 500);
            }

            function onSearchEnter() {
                const keyword = searchKeyword.value;
                if (keyword && keyword.trim()) {
                    if (debounceTimer) clearTimeout(debounceTimer);
                    performRemoteSearch(keyword, true);
                }
            }

            // ===== 顶部搜索联动（已移除，但保留函数以防调用） =====
            function topSearch() {
                const kw = topSearchKeyword.value.trim();
                if (kw) {
                    searchKeyword.value = kw;
                    performRemoteSearch(kw, true);
                }
            }

            // ===== 菜单点击（已移除，但保留函数） =====
            function handleMenuClick(name) {
                alert(`「${name}」功能开发中，当前为分类管理模块`);
            }

            // ===== 顶部导航交互（已移除，但保留函数） =====
            function handleNotification() {
                alert(`您有 ${notificationCount.value} 条通知`);
            }

            function handleHelp() {
                alert('📖 帮助中心\n如需帮助，请联系技术支持。');
            }

            function goToSettings() {
                alert('⚙️ 跳转到用户设置页面');
            }

            function handleLogout() {
                if (confirm('确认退出登录吗？')) {
                    alert('您已退出登录');
                }
            }

            // ===== 递归构建树（从desc返回的完整数据） =====
            function buildTree(apiNode) {
                const node = new TreeNode(apiNode);
                if (apiNode.children && apiNode.children.length) {
                    node.children = apiNode.children.map(child => buildTree(child));
                    node.hasChildren = true;
                    node.loaded = true;
                } else {
                    node.children = [];
                    node.hasChildren = false;
                    node.loaded = true;
                }
                return node;
            }

            // ===== 加载分类（对所有根执行判断） =====
            async function loadCategories() {
                loading.value = true;
                errorMsg.value = '';
                try {
                    const roots = await fetchRoots();
                    if (roots.length === 0) {
                        categoryTree.value = [];
                        activeCategory.value = {...emptyCategory};
                        refreshEditable();
                        loading.value = false;
                        return;
                    }
                    const treePromises = roots.map(async (root) => {
                        if (root.right / 2 < 500) {
                            try {
                                const fullCategory = await fetchDescendants(root.id);
                                return buildTree(fullCategory);
                            } catch (err) {
                                console.warn(`加载根 ${root.id} 的后代失败，使用根节点本身`, err);
                                return new TreeNode(root);
                            }
                        } else {
                            return new TreeNode(root);
                        }
                    });
                    const trees = await Promise.all(treePromises);
                    categoryTree.value = trees;
                    activeCategory.value = {...emptyCategory};
                    refreshEditable();
                    lastSearchResults.value = [];
                    expandedSet.value.clear();
                    if (isAddMode.value) exitAddMode();
                } catch (err) {
                    console.error(err);
                    errorMsg.value = '获取分类数据失败：' + err.message;
                    categoryTree.value = [];
                    activeCategory.value = {...emptyCategory};
                    refreshEditable();
                } finally {
                    loading.value = false;
                }
            }

            // ===== 添加模式 =====
            function addChild(parentNode) {
                if (isAddMode.value) exitAddMode();
                isAddMode.value = true;
                highlightNodeId.value = null;
                if (!parentNode) {
                    parentForAdd.value = {id: -1, name: "无（顶级分类）"};
                    editableCategory.value = {
                        id: null, name: {name: '', shortName: ''}, icon_url: null, parent_id: -1,
                        description: ''
                    };
                } else {
                    const parentId = parentNode.id;
                    const parentName = parentNode.name.name;
                    if (parentId === -1 && parentName === '未分类') {
                        alert("系统保留分类不可添加子分类");
                        exitAddMode();
                        return;
                    }
                    if (parentId === -1) {
                        parentForAdd.value = {id: -1, name: "无（顶级分类）"};
                        editableCategory.value = {
                            id: null, name: {name: '', shortName: ''}, icon_url: null, parent_id: -1,
                            description: ''
                        };
                    } else {
                        parentForAdd.value = {id: parentId, name: parentName};
                        editableCategory.value = {
                            id: null, name: {name: '', shortName: ''}, icon_url: null,
                            parent_id: parentId, description: ''
                        };
                    }
                }
                activeCategory.value = {...emptyCategory};
                nextTick(() => {
                    const input = document.querySelector('.field-group input[placeholder="例：品质男鞋"]');
                    if (input) input.focus();
                });
            }

            function exitAddMode() {
                isAddMode.value = false;
                parentForAdd.value = null;
                refreshEditable();
            }

            function cancelAddMode() {
                exitAddMode();
            }

            // ===== 保存新分类 =====
            async function saveNewCategory() {
                if (!isAddMode.value || !parentForAdd.value) return;
                const newName = editableCategory.value.name.name.trim();
                if (!newName) {
                    alert("分类名称不能为空");
                    nextTick(() => {
                        const inp = document.querySelector('.field-group input[placeholder="例：品质男鞋"]');
                        if (inp) inp.focus();
                    });
                    return;
                }
                const payload = {
                    name: {name: newName, shortName: editableCategory.value.name.shortName || newName.slice(0, 2)},
                    icon_url: editableCategory.value.icon_url,
                    parent_id: parentForAdd.value.id,
                    description: editableCategory.value.description
                };
                try {
                    const result = await createCategory(payload);
                    let rawCategory = result.category || result.data || result;
                    if (!rawCategory.id && result.id) {
                        rawCategory = result;
                    }
                    const mapped = {...rawCategory};
                    if (mapped.parentId !== undefined && mapped.parent_id === undefined) {
                        mapped.parent_id = mapped.parentId;
                        delete mapped.parentId;
                    }
                    if (mapped.icon !== undefined && mapped.icon_url === undefined) {
                        mapped.icon_url = mapped.icon;
                        delete mapped.icon;
                    }
                    if (!mapped.name) {
                        mapped.name = {name: newName, shortName: ''};
                    }
                    if (!mapped.name.name) mapped.name.name = newName;
                    if (!mapped.name.shortName) mapped.name.shortName = newName.slice(0, 2);

                    if (!mapped.id) {
                        console.error('API 返回的分类数据缺少 id:', result);
                        alert('创建成功但返回数据异常，请刷新页面');
                        await loadCategories();
                        exitAddMode();
                        return;
                    }

                    const newNode = new TreeNode(mapped);
                    const parentId = parentForAdd.value.id;

                    if (parentId === -1) {
                        categoryTree.value.push(newNode);
                        await selectAndHighlightNode(newNode.id);
                        exitAddMode();
                        alert("添加成功");
                        return;
                    }

                    const parentNode = findNodeInTree(categoryTree.value, parentId);
                    if (!parentNode) {
                        categoryTree.value.push(newNode);
                        await selectAndHighlightNode(newNode.id);
                        exitAddMode();
                        alert("添加成功（父节点未找到，已作为顶级分类）");
                        return;
                    }

                    const isExpanded = expandedSet.value.has(parentId);

                    if (isExpanded) {
                        if (!parentNode.children) parentNode.children = [];
                        parentNode.children.push(newNode);
                        parentNode.hasChildren = true;
                        parentNode.loaded = true;
                    } else {
                        try {
                            const apiChildren = await fetchChildren(parentId);
                            parentNode.children = apiChildren.map(apiChild => new TreeNode(apiChild));
                            parentNode.loaded = true;
                            parentNode.hasChildren = parentNode.children.length > 0;
                            const exists = parentNode.children.some(c => c.id === newNode.id);
                            if (!exists) {
                                parentNode.children.push(newNode);
                                parentNode.hasChildren = true;
                            }
                            expandedSet.value.add(parentId);
                        } catch (err) {
                            console.error('加载子分类失败，使用本地添加', err);
                            if (!parentNode.children) parentNode.children = [];
                            parentNode.children.push(newNode);
                            parentNode.hasChildren = true;
                            parentNode.loaded = true;
                            expandedSet.value.add(parentId);
                        }
                    }

                    await selectAndHighlightNode(newNode.id);
                    exitAddMode();
                    alert("添加成功");

                } catch (err) {
                    console.error(err);
                    alert(`添加失败: ${err.message}`);
                }
            }

            // ===== 选中 & 高亮 =====
            async function selectAndHighlightNode(nodeId) {
                selectCategory(nodeId);
                highlightNodeId.value = nodeId;
                await nextTick();
                try {
                    const el = document.querySelector(`.node-content[data-id="${nodeId}"]`);
                    if (el) {
                        el.scrollIntoView({block: 'center', behavior: 'smooth'});
                        setTimeout(() => {
                            highlightNodeId.value = null;
                        }, 2000);
                    } else {
                        setTimeout(() => {
                            const el2 = document.querySelector(`.node-content[data-id="${nodeId}"]`);
                            if (el2) {
                                el2.scrollIntoView({block: 'center', behavior: 'smooth'});
                                setTimeout(() => {
                                    highlightNodeId.value = null;
                                }, 2000);
                            } else {
                                highlightNodeId.value = null;
                            }
                        }, 300);
                    }
                } catch (e) {
                    highlightNodeId.value = null;
                }
            }

            // ===== 选择分类 =====
            function selectCategory(id) {
                if (isAddMode.value) exitAddMode();
                const allNodes = [];
                const collect = (nodes) => {
                    for (const node of nodes) {
                        allNodes.push(node);
                        if (node.children) collect(node.children);
                    }
                };
                collect(categoryTree.value);
                const found = allNodes.find(n => n.id === id);
                if (found && found.name && found.name.name && found.name.name !== 'undefined') {
                    activeCategory.value = JSON.parse(JSON.stringify(found));
                    refreshEditable();
                    clearExtForm();
                } else {
                    activeCategory.value = {...emptyCategory};
                    refreshEditable();
                }
            }

            function refreshEditable() {
                if (isAddMode.value) return;
                if (!isValidCategory.value || isSpecialUncategorized.value) {
                    editableCategory.value = {...emptyCategory};
                    originalCategoryBackup.value = {...emptyCategory};
                } else {
                    editableCategory.value = JSON.parse(JSON.stringify(activeCategory.value));
                    originalCategoryBackup.value = JSON.parse(JSON.stringify(activeCategory.value));
                }
            }

            function restoreOriginal() {
                if (isModified.value && isValidCategory.value && !isSpecialUncategorized.value && !isAddMode.value) editableCategory.value = JSON.parse(JSON.stringify(originalCategoryBackup.value));
            }

            // ===== 更新分类 =====
            async function updateCurrentCategory() {
                if (isAddMode.value) return;
                if (!isValidCategory.value || isSpecialUncategorized.value) {
                    alert("无法修改系统保留分类");
                    return;
                }
                if (!editableCategory.value.name?.name || !editableCategory.value.name.name.trim()) {
                    alert("分类名称不能为空");
                    return;
                }
                if (!isModified.value) {
                    alert("无修改");
                    return;
                }
                const payload = {id: activeCategory.value.id};
                const orig = originalCategoryBackup.value;
                const curr = editableCategory.value;
                let nameChanged = false;
                let nameObj = {};
                if (curr.name.name !== orig.name.name) {
                    nameObj.name = curr.name.name;
                    nameChanged = true;
                }
                if (curr.name.shortName !== orig.name.shortName) {
                    nameObj.shortName = curr.name.shortName;
                    nameChanged = true;
                }
                if (nameChanged) {
                    payload.name = nameObj;
                }
                if (curr.icon_url !== orig.icon_url) {
                    payload.icon_url = curr.icon_url;
                }
                if (curr.description !== orig.description) {
                    payload.description = curr.description;
                }
                let newParentId = curr.parent_id;
                if (isRootCategory.value) {
                    newParentId = activeCategory.value.id;
                }
                if (newParentId !== orig.parent_id) {
                    payload.parent_id = newParentId;
                }
                try {
                    await updateCategory(activeCategory.value.id, payload);
                    const allNodes = [];
                    const collect = (nodes) => {
                        for (const node of nodes) {
                            allNodes.push(node);
                            if (node.children) collect(node.children);
                        }
                    };
                    collect(categoryTree.value);
                    const target = allNodes.find(n => n.id === activeCategory.value.id);
                    if (target) {
                        if (payload.name) {
                            if (payload.name.name !== undefined) target.name.name = payload.name.name;
                            if (payload.name.shortName !== undefined) target.name.shortName = payload.name.shortName;
                        }
                        if (payload.icon_url !== undefined) target.icon_url = payload.icon_url;
                        if (payload.description !== undefined) target.description = payload.description;
                        if (payload.parent_id !== undefined) target.parent_id = payload.parent_id;
                    }
                    selectCategory(activeCategory.value.id);
                    alert("更新成功");
                } catch (err) {
                    console.error(err);
                    alert(`更新失败: ${err.message}`);
                }
            }

            // ===== 删除分类 =====
            function removeNodeFromTree(nodes, targetId) {
                for (let i = 0; i < nodes.length; i++) {
                    const node = nodes[i];
                    if (node.id === targetId) {
                        nodes.splice(i, 1);
                        return true;
                    }
                    if (node.children && node.children.length) {
                        if (removeNodeFromTree(node.children, targetId)) {
                            node.hasChildren = node.children.length > 0;
                            return true;
                        }
                    }
                }
                return false;
            }

            async function deleteCategoryNode(node) {
                if (!node) return;
                const id = node.id;
                if (isAddMode.value) exitAddMode();
                if (id === -1) {
                    alert("系统保留分类不可删除");
                    return;
                }
                const rootCount = categoryTree.value.filter(n => n.parent_id === n.id).length;
                if (node.parent_id === id && rootCount <= 1) {
                    alert("至少保留一个顶级分类");
                    return;
                }
                if (!confirm(`永久删除分类“${node.name.name}”及其所有子类？`)) return;
                try {
                    await deleteCategory(id);
                    let toDeleteIds = new Set();
                    const findNodeAndCollect = (nodes) => {
                        for (const n of nodes) {
                            if (n.id === id) {
                                collectAllDescendantIds(n, toDeleteIds);
                                return true;
                            }
                            if (n.children && findNodeAndCollect(n.children)) return true;
                        }
                        return false;
                    };
                    findNodeAndCollect(categoryTree.value);
                    if (toDeleteIds.size) {
                        const newExpanded = new Set(expandedSet.value);
                        toDeleteIds.forEach(delId => newExpanded.delete(delId));
                        expandedSet.value = newExpanded;
                    }
                    const success = removeNodeFromTree(categoryTree.value, id);
                    if (!success) {
                        console.warn('本地删除失败，节点不存在');
                        return;
                    }
                    if (activeCategory.value.id === id) {
                        activeCategory.value = {...emptyCategory};
                        refreshEditable();
                    }
                } catch (err) {
                    console.error(err);
                    alert(`删除失败: ${err.message}`);
                }
            }

            function deleteCurrentCategory() {
                if (isValidCategory.value && !isSpecialUncategorized.value && !isAddMode.value) {
                    deleteCategoryNode(activeCategory.value);
                }
            }

            // ===== 图标上传预览 =====
            const fileInput = ref(null);

            function triggerFileUpload() {
                if ((isValidCategory.value || isAddMode.value) && !isSpecialUncategorized.value) fileInput.value.click();
                else alert("无法修改系统保留分类");
            }

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (!file.type.startsWith('image/')) {
                    alert("请选择图片文件");
                    e.target.value = '';
                    return;
                }
                const formData = new FormData();
                formData.append('file', file);
                formData.append('rename', 'true');
                formData.append('separateByDate', 'true');

                try {
                    const response = await fetch('https://slave.tooo.top/catalog/v1/upload', {
                        method: 'POST',
                        body: formData,
                    });
                    if (!response.ok) {
                        const text = await response.text();
                        throw new Error(`上传失败（${response.status}）：${text}`);
                    }
                    const result = await response.json();
                    if (result.code === 200 && result.url) {
                        editableCategory.value.icon_url = result.url;
                        alert('上传成功');
                    } else {
                        throw new Error(result.message || '上传失败，服务器返回异常');
                    }
                } catch (err) {
                    console.error('上传错误:', err);
                    alert(`上传失败: ${err.message}`);
                } finally {
                    e.target.value = '';
                }
            };

            const modalVisible = ref(false);
            const modalImageUrl = ref('');
            const previewError = ref(false);

            function openModalPreview() {
                const url = editableCategory.value.icon_url;
                if (url && url.trim()) {
                    modalImageUrl.value = url;
                    previewError.value = false;
                    modalVisible.value = true;
                } else alert("无图标URL或URL为空");
            }

            function onModalImageError() {
                previewError.value = true;
            }

            // ===== 扩展属性 =====
            function clearExtForm() {
                extForm.value = {
                    displayName: '', fieldName: '', defaultValue: '', isRequired: '可选',
                    sortOrder: 0
                };
                extBackup.value = {...extForm.value};
                selectedExtId.value = null;
                selectedExtIdForSelect.value = '';
            }

            function onSelectExtFromDropdown() {
                if ((!isValidCategory.value && !isAddMode.value) || isSpecialUncategorized.value) return;
                const rid = selectedExtIdForSelect.value;
                if (rid) {
                    const attr = allExtAttrs.value.find(a => a.recordId === rid);
                    if (attr && attr.classId === activeCategory.value.id) {
                        const newForm = {
                            displayName: attr.displayName,
                            fieldName: attr.fieldName,
                            defaultValue: attr.defaultValue || '',
                            isRequired: attr.isRequired,
                            sortOrder: attr.sortOrder
                        };
                        extForm.value = {...newForm};
                        extBackup.value = {...newForm};
                        selectedExtId.value = attr.recordId;
                    } else selectedExtIdForSelect.value = '';
                } else clearExtForm();
            }

            let lastAutoId = 500;

            function saveExtAttribute() {
                if ((!isValidCategory.value && !isAddMode.value) || isSpecialUncategorized.value) {
                    alert("无法修改系统保留分类的扩展属性");
                    return;
                }
                if (!extForm.value.displayName || !extForm.value.displayName.trim()) {
                    alert("显示名称不能为空");
                    return;
                }
                if (!extForm.value.fieldName || !extForm.value.fieldName.trim()) {
                    alert("别名不能为空");
                    return;
                }
                const currentAlias = extForm.value.fieldName.trim();
                let duplicate = false;
                if (selectedExtId.value) duplicate = activeExtList.value.some(a => a.fieldName === currentAlias && a.recordId !== selectedExtId.value);
                else duplicate = activeExtList.value.some(a => a.fieldName === currentAlias);
                if (duplicate) {
                    alert("别名已存在，请使用其他别名");
                    return;
                }
                if (selectedExtId.value) {
                    const idx = allExtAttrs.value.findIndex(a => a.recordId === selectedExtId.value);
                    if (idx !== -1) {
                        allExtAttrs.value[idx] = {
                            ...allExtAttrs.value[idx], displayName: extForm.value.displayName,
                            fieldName: extForm.value.fieldName, defaultValue: extForm.value.defaultValue,
                            isRequired: extForm.value.isRequired, sortOrder: extForm.value.sortOrder
                        };
                        extBackup.value = {...extForm.value};
                        alert("属性更新成功");
                    }
                } else {
                    const newAttr = {
                        recordId: `${Date.now()}-${Math.random().toString(36).substr(2, 8)}`,
                        classId: activeCategory.value.id,
                        displayName: extForm.value.displayName,
                        fieldName: extForm.value.fieldName,
                        defaultValue: extForm.value.defaultValue,
                        isRequired: extForm.value.isRequired,
                        sortOrder: extForm.value.sortOrder || (activeExtList.value.length + 1),
                        autoId: ++lastAutoId
                    };
                    allExtAttrs.value.push(newAttr);
                    clearExtForm();
                    alert(`属性 "${newAttr.displayName}" 添加成功`);
                }
            }

            function deleteExtAttribute() {
                if (!selectedExtId.value) {
                    alert("请选择要删除的属性");
                    return;
                }
                if (confirm("永久删除此扩展属性？")) {
                    allExtAttrs.value = allExtAttrs.value.filter(a => a.recordId !== selectedExtId.value);
                    clearExtForm();
                }
            }

            function syncToSubClass() {
                alert("演示: 扩展属性同步子类完成");
            }

            // ===== 切换展开 =====
            function toggleExpand(id) {
                const set = new Set(expandedSet.value);
                if (set.has(id)) set.delete(id);
                else set.add(id);
                expandedSet.value = set;
            }

            function onNodeUpdated() {
            }

            // ===== 侧边栏折叠切换（已移除，但保留函数） =====
            function toggleSidebar() {
                // 无侧边栏，此函数保留但无效果
            }

            // 下拉菜单相关（已移除，但保留函数）
            let closeTimer = null;
            const closeDelay = 200;
            const openDropdown = () => {
            };
            const scheduleClose = () => {
            };
            const cancelClose = () => {
            };

            watch(activeCategory, () => {
                if (!isAddMode.value) {
                    clearExtForm();
                    refreshEditable();
                }
            });

            onMounted(() => {
                loadCategories();
                modalVisible.value = false;
                previewError.value = false;
            });

            return {
                loading,
                errorMsg,
                categoryTree,
                expandedSet,
                toggleExpand,
                searchKeyword,
                onSearchInput,
                onSearchEnter,
                searchLoading,
                selectCategory,
                loadCategories,
                addChild,
                deleteCategoryNode,
                deleteCurrentCategory,
                onNodeUpdated,
                flatCategoryList,
                activeCategory,
                editableCategory,
                isModified,
                restoreOriginal,
                updateCurrentCategory,
                hasSubCategories,
                isValidCategory,
                isSpecialUncategorized,
                isRootCategory,
                activeExtList,
                extForm,
                selectedExtId,
                selectedExtIdForSelect,
                isSaveEnabled,
                clearExtForm,
                onSelectExtFromDropdown,
                saveExtAttribute,
                deleteExtAttribute,
                syncToSubClass,
                fileInput,
                triggerFileUpload,
                handleFileUpload,
                modalVisible,
                modalImageUrl,
                previewError,
                openModalPreview,
                onModalImageError,
                searchMatchSet,
                isAddMode,
                parentForAdd,
                cancelAddMode,
                saveNewCategory,
                highlightNodeId,
                isCollapsed,
                toggleSidebar,
                topSearchKeyword,
                topSearchFocused,
                topSearching,
                notificationCount,
                dropdownVisible,
                userDropdownRef,
                topSearch,
                handleMenuClick,
                handleNotification,
                handleHelp,
                goToSettings,
                handleLogout,
                openDropdown,
                scheduleClose,
                cancelClose,
            };
        }
    }).mount('#vueApp');
</script>
</body>
</html>
