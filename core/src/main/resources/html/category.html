<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SaaS零售 · 分类管理器 | 全屏深色协调版</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1" rel="stylesheet">
    <style>
        [v-cloak] { display: none !important; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* 全局深色背景，无留白 */
        body {
            background: radial-gradient(ellipse at 20% 30%, #0f172a, #070b14);
            font-family: 'Inter', system-ui, sans-serif;
            color: #e2e8f0;
            overflow: hidden;
            height: 100vh;
        }

        /* 双栏全局布局：不留任何边距 */
        .global-layout {
            display: flex;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        /* ========= 左侧 SaaS 零售侧边栏 - 协调深色磨砂 ========= */
        .saas-sidebar {
            width: 260px;
            background: rgba(8, 12, 24, 0.92);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(129, 140, 248, 0.2);
            color: rgba(255, 255, 255, 0.75);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: all 0.2s;
            z-index: 10;
            box-shadow: 2px 0 20px rgba(0, 0, 0, 0.4);
        }

        .logo-area {
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(129, 140, 248, 0.25);
        }
        .logo-area .material-symbols-outlined {
            font-size: 26px;
            color: #818cf8;
        }

        .nav-menu {
            flex: 1;
            padding: 20px 0;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: rgba(255, 255, 255, 0.65);
            border-left: 3px solid transparent;
        }
        .nav-item:hover {
            background: rgba(129, 140, 248, 0.15);
            color: #ffffff;
            border-left-color: #818cf8;
        }
        .nav-item.active {
            background: linear-gradient(90deg, rgba(129, 140, 248, 0.2), transparent);
            color: #ffffff;
            border-left-color: #818cf8;
            font-weight: 600;
        }
        .nav-item .material-symbols-outlined {
            font-size: 22px;
        }

        /* ========= 右侧主内容区域 - 完全填满不留白 ========= */
        .main-content-area {
            flex: 1;
            overflow-y: auto;
            padding: 0;          /* 关键：无任何内边距，左右不留空 */
            background: transparent;
        }

        /* 原有分类管理器的布局容器 - 铺满且无外边距 */
        .app-layout {
            display: flex;
            gap: 20px;
            width: 100%;
            margin: 0;
            padding: 20px 24px 24px 20px;  /* 适当内边距保证内容不贴边但属于卡片内部呼吸感，但外部无白边；用户要求“2边不留空”指浏览器窗口边缘无空白，这里窗口边缘就是最外侧，侧边栏和右侧内容已经无外部空白，卡片与窗口边缘之间有20px留白？为了满足严格不留白，但视觉上过于拥挤，用户主要要求填满，且左右不留空白区域（即没有多余边距导致右侧出现空白背景）。这里给右侧内容区域添加少许内边距是为了卡片不贴滚动条，但窗口右边缘仍然有背景色，不是空白区域。但根据用户描述“右边要扩展填满填充，2边不留空”，可解释为右侧内容区域占满剩余宽度且左右两侧没有任何多余外边距或空白背景。目前设置padding:20px可保证卡片不会完全紧贴滚动条，但是背景是深色全局统一，不算留白。不过为了严格符合，可设置padding:0，但卡片会紧贴边缘，可能会影响操作。权衡后，使用极小的内边距保持视觉舒适，且不产生“空白区域”。因为背景统一为深色，没有白色空隙。若用户坚持完全贴边，可以改为0。这里采用0以保证指令严格。但为了更好的体验，我会在卡片内部留有内边距，但窗口边缘到卡片之间没有白色缝隙。所以现在设置padding:0，然后在.app-layout上设置padding: 0 20px 0 20px？会产生左右空白，不要。所以直接让.app-layout内部元素自然有gap，树面板和右侧面板距离边缘0，但是内容会紧贴滚动条，可通过内部容器的border-radius和内边距来调节。用户满意为准。最终选择：右侧无padding，但给.app-layout设置padding:0；但是为了不过于拥挤，给tree-panel和right-panel本身增加外边距？不要。直接在树面板和右侧面板上设置自身边距，保证内容可读。我们可在.tree-panel上设置margin-left:0，.right-panel上设置margin-right:0，且.app-layout无padding，这样左右边缘完全无空白。为确保视觉舒适，我们在滚动区域内侧添加一些内边距。*/
            padding: 0;
        }

        /* 为了视觉美观，树形面板和右侧卡片自身带一点点边距，但不会产生外部空白背景区 */
        .tree-panel {
            flex: 0 0 460px;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            border: 1px solid rgba(129, 140, 248, 0.2);
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.5);
            overflow: hidden;
            height: calc(100vh - 32px);
            display: flex;
            flex-direction: column;
            margin: 16px 0 16px 16px;   /* 左边距16px，右边由gap控制，不产生外部白色背景 */
        }

        .right-panel {
            flex: 1;
            min-width: 560px;
            margin: 16px 16px 16px 0;
            display: flex;
            flex-direction: column;
        }

        .card {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            border: 1px solid rgba(129, 140, 248, 0.2);
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.4);
            overflow: hidden;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* 确保卡片内容区域可滚动，不溢出 */
        .card-body {
            padding: 28px 32px;
            overflow-y: auto;
            flex: 1;
        }

        /* 其他样式保持原有美观，微调滚动条和颜色 */
        .tree-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid rgba(129, 140, 248, 0.2);
            background: rgba(0, 0, 0, 0.3);
        }
        .tree-header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .tree-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: #f1f5f9;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .tree-title i { color: #818cf8; }
        .add-root-btn {
            background: rgba(129, 140, 248, 0.2);
            border: 1px solid rgba(129, 140, 248, 0.5);
            color: #cbd5ff;
            padding: 6px 14px;
            border-radius: 32px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .add-root-btn:hover {
            background: rgba(129, 140, 248, 0.4);
            border-color: #a5b4fc;
            color: white;
        }
        .search-box {
            position: relative;
            width: 100%;
        }
        .search-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 0.9rem;
        }
        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 40px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #334155;
            border-radius: 40px;
            color: #f1f5f9;
            font-size: 0.85rem;
            transition: 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .search-box input:focus {
            border-color: #818cf8;
            outline: none;
            box-shadow: 0 0 0 3px rgba(129,140,248,0.2);
        }
        .tree-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 12px 12px 20px 16px;
        }
        .tree-node, .tree-node ul, .node-item {
            list-style: none !important;
            margin: 0;
            padding-left: 0;
        }
        .tree-node ul { padding-left: 28px; }
        .node-item { margin: 2px 0; }
        .node-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.9rem;
            color: #cbd5e1;
        }
        .node-content:hover { background: rgba(129,140,248,0.12); color: #f1f5f9; }
        .active-cat {
            background: linear-gradient(135deg, #1e1b4b, #2e1065);
            color: #e0e7ff !important;
            border-left: 3px solid #818cf8;
            font-weight: 500;
        }
        .node-name {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }
        .toggle-box {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 22px;
            height: 22px;
            border: 1px solid #475569;
            border-radius: 6px;
            background: #1e293b;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            color: #94a3b8;
            transition: 0.1s;
            user-select: none;
            flex-shrink: 0;
            box-shadow: 0 1px 1px rgba(0,0,0,0.2);
        }
        .toggle-box:hover {
            background: #334155;
            border-color: #818cf8;
            color: #818cf8;
        }
        .node-icon-img {
            width: 20px;
            height: 20px;
            border-radius: 6px;
            object-fit: cover;
            background: #1e293b;
            flex-shrink: 0;
        }
        .node-actions { display: none; gap: 6px; margin-left: 8px; }
        .node-content:hover .node-actions { display: flex; }
        .node-actions i {
            font-size: 0.7rem;
            padding: 5px;
            border-radius: 8px;
            background: #0f172a;
            color: #94a3b8;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .node-actions i:hover { background: #1e293b; color: #818cf8; }
        .search-highlight {
            background-color: #fef9c3;
            color: #0f172a;
            border-radius: 4px;
            padding: 0 2px;
            font-weight: 600;
        }

        /* 右侧表单样式微调 */
        .card-header {
            padding: 20px 28px;
            border-bottom: 1px solid rgba(129, 140, 248, 0.2);
            background: rgba(0, 0, 0, 0.25);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .card-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #f1f5f9;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px 32px;
        }
        .full-width { grid-column: 1 / -1; }
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .field-group label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #a5b4fc;
            letter-spacing: 0.3px;
        }
        .required-star {
            color: #f87171;
            margin-left: 4px;
            font-size: 0.8rem;
        }
        input, select, textarea {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 11px 16px;
            font-size: 0.9rem;
            transition: 0.2s;
            color: #f1f5f9;
            font-family: 'Inter', monospace;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(129,140,248,0.15);
            outline: none;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 24px;
            justify-content: flex-end;
        }
        button {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #cbd5e1;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        button.primary {
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            border: none;
            color: white;
            box-shadow: 0 4px 8px rgba(79,70,229,0.3);
        }
        button.primary:hover {
            background: linear-gradient(135deg, #4338ca, #4f46e5);
            transform: translateY(-1px);
        }
        button.danger { background: #7f1d1d; border-color: #b91c1c; color: #fecaca; }
        button.danger:hover { background: #991b1b; }
        button.warning { background: #b45309; border-color: #d97706; color: #fffbeb; }
        button.warning:hover { background: #92400e; }
        button.info { background: #065666; border-color: #0891b2; color: #cffafe; }
        button.info:hover { background: #0e7490; }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        hr { margin: 28px 0 20px; border: none; border-top: 1px solid rgba(129, 140, 248, 0.2); }
        .extended-section { background: rgba(0, 0, 0, 0.25); border-radius: 24px; padding: 16px 0 8px; margin-top: 12px; }
        .section-mini-title {
            font-weight: 600;
            margin: 12px 0 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            border-left: 3px solid #818cf8;
            padding-left: 16px;
            color: #e2e8f0;
        }
        .attr-selector {
            background: rgba(30, 41, 59, 0.6);
            border-radius: 20px;
            padding: 12px 18px;
            margin-bottom: 24px;
            border: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 14px;
        }
        .attr-selector-left {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .badge-count {
            background: #1e293b;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #a5b4fc;
            font-weight: 500;
        }
        .attr-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .icon-url-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .icon-url-wrapper input { flex: 1; min-width: 200px; }
        .icon-actions button {
            padding: 8px 16px;
            background: #1e293b;
            border: 1px solid #334155;
            font-size: 0.75rem;
        }
        .modal-mask {
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .modal-container {
            background: #1e293b;
            border-radius: 32px;
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.5);
            overflow: hidden;
            width: auto;
            max-width: 80vw;
            border: 1px solid #334155;
        }
        .modal-header {
            padding: 16px 24px;
            background: #0f172a;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 { color: #f1f5f9; font-size: 1rem; font-weight: 600; }
        .modal-close {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: #94a3b8;
            line-height: 1;
        }
        .modal-close:hover { color: #f87171; }
        .modal-body {
            padding: 24px;
            text-align: center;
            min-width: 300px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .modal-body img {
            max-width: 100%;
            max-height: 60vh;
            border-radius: 20px;
            display: block;
        }
        .preview-error {
            color: #f87171;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .preview-error i { font-size: 3rem; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        /* 响应式微调 */
        @media (max-width: 1000px) {
            .tree-panel { flex: 0 0 360px; }
        }
    </style>
</head>
<body>
<div id="vueApp" v-cloak>
    <div class="global-layout">
        <!-- 左侧 SaaS零售侧边栏 (优化配色) -->
        <aside class="saas-sidebar">
            <div class="logo-area">
                <span class="material-symbols-outlined">storefront</span>
                <span>SaaS 零售</span>
            </div>
            <div class="nav-menu">
                <div class="nav-item active">
                    <span class="material-symbols-outlined">category</span>
                    分类管理
                </div>
                <div class="nav-item">
                    <span class="material-symbols-outlined">inventory_2</span>
                    商品档案
                </div>
                <div class="nav-item">
                    <span class="material-symbols-outlined">shopping_cart</span>
                    销售管理
                </div>
                <div class="nav-item">
                    <span class="material-symbols-outlined">people</span>
                    会员管理
                </div>
                <div class="nav-item">
                    <span class="material-symbols-outlined">local_shipping</span>
                    采购管理
                </div>
                <div class="nav-item">
                    <span class="material-symbols-outlined">warehouse</span>
                    库存管理
                </div>
            </div>
        </aside>

        <!-- 右侧主内容区域：完全填满不留白 -->
        <div class="main-content-area">
            <div class="app-layout">
                <!-- 左侧树形面板 -->
                <div class="tree-panel">
                    <div class="tree-header">
                        <div class="tree-header-top">
                            <div class="tree-title"><i class="fas fa-folder-tree"></i> 类别</div>
                            <button class="add-root-btn" @click="addRootCategoryPrompt"><i class="fas fa-plus"></i> 根类</button>
                        </div>
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" v-model="searchKeyword" placeholder="搜索分类..." @input="onSearchInput">
                        </div>
                    </div>
                    <div class="tree-scroll">
                        <ul class="tree-node">
                            <tree-item
                                    v-for="node in filteredCategoryTree"
                                    :key="node.id"
                                    :node="node"
                                    :active-id="activeCategory.id"
                                    :expanded-set="expandedSet"
                                    :search-keyword="searchKeyword"
                                    @toggle="toggleExpand"
                                    @select="selectCategory"
                                    @add-child="showAddChildPrompt"
                                    @delete-cat="deleteCategoryNode"
                            ></tree-item>
                        </ul>
                        <div v-if="filteredCategoryTree.length === 0" style="text-align:center; margin-top:20px; color:#64748b;">未找到或暂无分类</div>
                    </div>
                </div>

                <!-- 右侧属性区域 -->
                <div class="right-panel">
                    <div class="card">
                        <div class="card-header"><h2><i class="fas fa-info-circle"></i> 基本属性</h2></div>
                        <div class="card-body">
                            <div class="form-grid">
                                <div class="field-group">
                                    <label><i class="fas fa-level-up-alt"></i> 上级分类 <span class="required-star">*</span></label>
                                    <select v-model="editableCategory.parent_id">
                                        <option value="-1">无（顶级分类）</option>
                                        <option v-for="cat in flatCategoryList" :value="cat.id" :disabled="cat.id === editableCategory.id">{{ cat.name.name }}</option>
                                    </select>
                                </div>
                                <div class="field-group">
                                    <label>分类名称 <span class="required-star">*</span></label>
                                    <input v-model="editableCategory.name.name" placeholder="例：品质男鞋">
                                </div>
                                <div class="field-group">
                                    <label>简称</label>
                                    <input v-model="editableCategory.name.shortName" placeholder="简称">
                                </div>
                                <div class="field-group full-width">
                                    <label>图标URL</label>
                                    <div class="icon-url-wrapper">
                                        <input v-model="editableCategory.icon_url" placeholder="https://... 或上传图片">
                                        <div class="icon-actions">
                                            <button type="button" @click="triggerFileUpload"><i class="fas fa-cloud-upload-alt"></i> 上传</button>
                                            <button type="button" @click="openModalPreview" :disabled="!editableCategory.icon_url"><i class="fas fa-eye"></i> 预览</button>
                                        </div>
                                    </div>
                                    <input type="file" ref="fileInput" style="display:none" accept="image/*" @change="handleFileUpload">
                                </div>
                                <div class="field-group full-width">
                                    <label>描述</label>
                                    <textarea rows="2" v-model="editableCategory.description"></textarea>
                                </div>
                            </div>
                            <div class="btn-group">
                                <button @click="restoreOriginal" :disabled="!isModified" class="info"><i class="fas fa-undo-alt"></i> 恢复</button>
                                <button @click="updateCurrentCategory" :disabled="!isModified" class="warning"><i class="fas fa-save"></i> 修改</button>
                                <button @click="deleteCurrentCategory" class="danger"><i class="fas fa-trash"></i> 删除</button>
                            </div>
                            <hr />
                            <div class="extended-section">
                                <div class="section-mini-title"><i class="fas fa-cog"></i> 扩展属性</div>
                                <div class="attr-selector">
                                    <div class="attr-selector-left">
                                        <label>属性名：</label>
                                        <select v-model="selectedExtIdForSelect" @change="onSelectExtFromDropdown">
                                            <option value="">-- 选择属性 --</option>
                                            <option v-for="attr in activeExtList" :value="attr.recordId">{{ attr.displayName }} ({{ attr.fieldName }})</option>
                                        </select>
                                        <span class="badge-count" v-if="activeExtList.length">共 {{ activeExtList.length }} 个字段</span>
                                    </div>
                                    <div class="attr-actions">
                                        <button @click="saveExtAttribute" :disabled="!isSaveEnabled" class="warning"><i class="fas fa-save"></i> 保存</button>
                                        <button @click="deleteExtAttribute" :disabled="!selectedExtId" class="danger"><i class="fas fa-trash"></i> 删除</button>
                                        <button @click="clearExtForm" class="info"><i class="fas fa-eraser"></i> 清空</button>
                                    </div>
                                </div>
                                <div class="form-grid">
                                    <div class="field-group">
                                        <label>显示名称 <span class="required-star">*</span></label>
                                        <input v-model="extForm.displayName" placeholder="例：颜色">
                                    </div>
                                    <div class="field-group">
                                        <label>别名 <span class="required-star">*</span></label>
                                        <input v-model="extForm.fieldName" placeholder="例：YanSe">
                                    </div>
                                    <div class="field-group">
                                        <label>默认值</label>
                                        <input v-model="extForm.defaultValue" placeholder="红色、橙色、绿色">
                                    </div>
                                    <div class="field-group">
                                        <label>是否必填</label>
                                        <select v-model="extForm.isRequired">
                                            <option>必填</option>
                                            <option>可选</option>
                                        </select>
                                    </div>
                                    <div class="field-group">
                                        <label>排序号</label>
                                        <input type="number" v-model="extForm.sortOrder">
                                    </div>
                                </div>
                                <div class="btn-group" style="justify-content: flex-start; margin-top: 16px;">
                                    <button @click="syncToSubClass" :disabled="!hasSubCategories" class="warning"><i class="fas fa-share-alt"></i> 同步应用到子类</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 预览模态框 -->
    <div v-if="modalVisible" class="modal-mask" @click.self="modalVisible = false">
        <div class="modal-container">
            <div class="modal-header">
                <h3><i class="fas fa-image"></i> 图标预览</h3>
                <button class="modal-close" @click="modalVisible = false">&times;</button>
            </div>
            <div class="modal-body">
                <img v-if="!previewError" :src="modalImageUrl" @error="onModalImageError" style="max-width:100%; max-height:60vh; border-radius:20px;">
                <div v-else class="preview-error">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>图片加载失败，请检查URL地址是否有效</span>
                    <span style="font-size:0.7rem; color:#94a3b8;">{{ modalImageUrl }}</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
<script>
    const { createApp, ref, computed, onMounted, watch } = Vue;

    let nextId = 1000;
    function genId() { return `cat_${Date.now()}_${nextId++}`; }
    const buildInitialCategories = () => {
        const list = [];
        const roots = ["电视热销","潮人服饰","精品鞋包","潮流箱包","美容护肤","居家生活","家用电器","食品保健"];
        const rootMap = {};
        roots.forEach(name => {
            const id = genId();
            rootMap[name] = id;
            list.push({ id, name: { name, shortName: name.slice(0,2) }, icon_url: null, parent_id: -1, description: `${name} 分类` });
        });
        const jingpinId = rootMap["精品鞋包"];
        const nvxieId = genId();
        const pinzhinanxieId = genId();
        list.push({ id: nvxieId, name: { name: "潮流女鞋", shortName: "女鞋" }, icon_url: null, parent_id: jingpinId, description: "时尚女鞋" });
        list.push({ id: pinzhinanxieId, name: { name: "品质男鞋", shortName: "男鞋" }, icon_url: null, parent_id: jingpinId, description: "高端男鞋" });
        const shoesChildren = ["板鞋","休闲鞋","商务皮鞋","户外运动鞋","帆布鞋","篮球鞋","凉鞋/凉拖","跑步鞋","网球鞋","足球鞋","羽毛球鞋"];
        shoesChildren.forEach(name => {
            list.push({ id: genId(), name: { name, shortName: name.slice(0,2) }, icon_url: null, parent_id: pinzhinanxieId, description: `${name} 鞋类` });
        });
        return list;
    };
    let initialCategories = buildInitialCategories();
    const qualityShoeId = initialCategories.find(c => c.name.name === "品质男鞋")?.id || null;

    let globalExtAttributes = [
        { recordId: '1735cd95-5bcd-402e-81b5-9d9200ade675', classId: qualityShoeId, displayName: '颜色', fieldName: 'YanSe', defaultValue: '红色,橙色,黄色', isRequired: '必填', sortOrder: 2, autoId: 172 },
        { recordId: 'dd09b32b-c14e-4d2c-97a4-9d7601a2b3c4', classId: qualityShoeId, displayName: '尺码', fieldName: 'ChiMa', defaultValue: 'S,M,L,XL', isRequired: '必填', sortOrder: 3, autoId: 173 }
    ];

    function buildTree(cats, parentId = -1) {
        return cats.filter(c => c.parent_id === parentId).map(c => ({ ...c, children: buildTree(cats, c.id) }));
    }
    function deleteCategoryAndChildren(cats, targetId) {
        const toDelete = new Set();
        const collect = (id) => { toDelete.add(id); cats.filter(c => c.parent_id === id).forEach(child => collect(child.id)); };
        collect(targetId);
        return cats.filter(c => !toDelete.has(c.id));
    }
    function generateUUID() { return `${Date.now()}-${Math.random().toString(36).substr(2, 8)}`; }
    let lastAutoId = 500;
    function newAutoId() { return ++lastAutoId; }

    function computeDepth(cats, parentId = -1, depth = 0) {
        for (let cat of cats) {
            if (cat.parent_id === parentId) {
                cat.depth = depth;
                computeDepth(cats, cat.id, depth + 1);
            }
        }
    }
    computeDepth(initialCategories);

    function filterTreeByKeyword(tree, keyword) {
        if (!keyword.trim()) return tree;
        const lower = keyword.toLowerCase();
        const filter = (node) => {
            const match = node.name.name.toLowerCase().includes(lower);
            const children = node.children ? node.children.filter(child => filter(child)).map(child => filter(child)) : [];
            if (match || children.length) return { ...node, children };
            return null;
        };
        return tree.map(node => filter(node)).filter(v => v);
    }
    function getExpandedIdsFromFilteredTree(tree, keyword) {
        if (!keyword.trim()) return new Set();
        const lower = keyword.toLowerCase();
        const expanded = new Set();
        const traverse = (nodes, ancestors) => {
            for (const node of nodes) {
                const cur = [...ancestors, node.id];
                if (node.name.name.toLowerCase().includes(lower)) cur.forEach(id => expanded.add(id));
                if (node.children) traverse(node.children, cur);
            }
        };
        traverse(tree, []);
        return expanded;
    }

    const TreeItem = {
        name: 'TreeItem',
        props: ['node', 'activeId', 'expandedSet', 'searchKeyword'],
        emits: ['toggle', 'select', 'add-child', 'delete-cat'],
        template: `
          <li class="node-item">
            <div class="node-content" :class="{ 'active-cat': node.id === activeId }" @click="$emit('select', node.id)">
              <div class="node-name">
                        <span v-if="hasChildren" class="toggle-box" @click.stop="$emit('toggle', node.id)">
                            {{ isExpanded ? '−' : '+' }}
                        </span>
                <img v-if="node.icon_url" :src="node.icon_url" class="node-icon-img" @error="e => e.target.style.display='none'">
                <span v-html="highlightName"></span>
              </div>
              <div class="node-actions">
                <i class="fas fa-plus-circle" title="添加子分类" @click.stop="$emit('add-child', node.id, node.name.name)"></i>
                <i class="fas fa-trash" title="删除分类" @click.stop="$emit('delete-cat', node.id)"></i>
              </div>
            </div>
            <ul class="children" v-if="hasChildren && isExpanded">
              <tree-item v-for="child in node.children" :key="child.id" :node="child" :active-id="activeId"
                         :expanded-set="expandedSet" :search-keyword="searchKeyword"
                         @toggle="$emit('toggle', $event)" @select="$emit('select', $event)"
                         @add-child="$emit('add-child', $event[0], $event[1])"
                         @delete-cat="$emit('delete-cat', $event)"></tree-item>
            </ul>
          </li>
        `,
        computed: {
            hasChildren() { return this.node.children?.length > 0; },
            isExpanded() { return this.expandedSet.has(this.node.id); },
            highlightName() {
                const name = this.node.name.name;
                const kw = this.searchKeyword;
                if (!kw) return name;
                const idx = name.toLowerCase().indexOf(kw.toLowerCase());
                if (idx === -1) return name;
                return name.slice(0, idx) + '<span class="search-highlight">' + name.slice(idx, idx+kw.length) + '</span>' + name.slice(idx+kw.length);
            }
        }
    };

    createApp({
        components: { TreeItem },
        setup() {
            const categories = ref([...initialCategories]);
            const defaultActive = categories.value.find(c => c.name.name === "品质男鞋") || categories.value[0];
            const activeCategory = ref(JSON.parse(JSON.stringify(defaultActive)));
            const originalCategoryBackup = ref(JSON.parse(JSON.stringify(defaultActive)));
            const editableCategory = ref(JSON.parse(JSON.stringify(defaultActive)));
            const allExtAttrs = ref([...globalExtAttributes]);

            const searchKeyword = ref('');
            const rawTree = computed(() => buildTree(categories.value, -1));
            const filteredCategoryTree = computed(() => filterTreeByKeyword(rawTree.value, searchKeyword.value));
            const activeExtList = computed(() => allExtAttrs.value.filter(a => a.classId === activeCategory.value.id));
            const flatCategoryList = computed(() => categories.value.filter(c => c.id !== editableCategory.value.id));
            const isModified = computed(() => {
                const c = editableCategory.value, o = originalCategoryBackup.value;
                return c.name.name !== o.name.name || c.name.shortName !== o.name.shortName || c.icon_url !== o.icon_url || c.description !== o.description || c.parent_id !== o.parent_id;
            });
            const hasSubCategories = computed(() => categories.value.some(c => c.parent_id === activeCategory.value.id));

            const expandedSet = ref(new Set());
            const initExpanded = () => {
                const set = new Set();
                rawTree.value.forEach(r => set.add(r.id));
                const jingpin = categories.value.find(c => c.name.name === "精品鞋包");
                const quality = categories.value.find(c => c.name.name === "品质男鞋");
                if (jingpin) set.add(jingpin.id);
                if (quality) set.add(quality.id);
                expandedSet.value = set;
            };
            const toggleExpand = (id) => {
                const set = new Set(expandedSet.value);
                if (set.has(id)) set.delete(id); else set.add(id);
                expandedSet.value = set;
            };
            const onSearchInput = () => {
                const tree = filteredCategoryTree.value;
                const ids = getExpandedIdsFromFilteredTree(tree, searchKeyword.value);
                if (ids.size) {
                    const newSet = new Set(expandedSet.value);
                    ids.forEach(id => newSet.add(id));
                    expandedSet.value = newSet;
                } else if (!searchKeyword.value) initExpanded();
            };

            function recalcAllDepths() { computeDepth(categories.value); }
            function refreshEditable() {
                editableCategory.value = JSON.parse(JSON.stringify(activeCategory.value));
                originalCategoryBackup.value = JSON.parse(JSON.stringify(activeCategory.value));
            }
            function selectCategory(id) {
                const found = categories.value.find(c => c.id === id);
                if (found) { activeCategory.value = JSON.parse(JSON.stringify(found)); refreshEditable(); clearExtForm(); }
            }
            function restoreOriginal() { if (isModified.value) editableCategory.value = JSON.parse(JSON.stringify(originalCategoryBackup.value)); }
            function updateCurrentCategory() {
                if (!editableCategory.value.name.name || !editableCategory.value.name.name.trim()) {
                    alert("分类名称不能为空");
                    return;
                }
                if (!isModified.value) { alert("无修改"); return; }
                const idx = categories.value.findIndex(c => c.id === activeCategory.value.id);
                if (idx !== -1) {
                    const updated = { ...categories.value[idx], ...editableCategory.value, name: { ...editableCategory.value.name } };
                    categories.value[idx] = updated;
                    recalcAllDepths();
                    activeCategory.value = JSON.parse(JSON.stringify(updated));
                    refreshEditable();
                    alert("更新成功");
                }
            }
            function deleteCategoryNode(id) {
                const cat = categories.value.find(c => c.id === id);
                if (!cat) return;
                if (cat.parent_id === -1 && categories.value.filter(c => c.parent_id === -1).length <= 1) { alert("至少保留一个顶级分类"); return; }
                if (confirm(`删除分类“${cat.name.name}”及其所有子类？`)) {
                    const allIds = [];
                    const gather = (pid) => { allIds.push(pid); categories.value.filter(c => c.parent_id === pid).forEach(ch => gather(ch.id)); };
                    gather(id);
                    allExtAttrs.value = allExtAttrs.value.filter(a => !allIds.includes(a.classId));
                    categories.value = deleteCategoryAndChildren(categories.value, id);
                    recalcAllDepths();
                    initExpanded();
                    if (allIds.includes(activeCategory.value.id)) {
                        const newActive = categories.value[0];
                        if (newActive) { activeCategory.value = JSON.parse(JSON.stringify(newActive)); refreshEditable(); }
                    }
                }
            }
            function deleteCurrentCategory() { if (activeCategory.value.id) deleteCategoryNode(activeCategory.value.id); }
            function showAddChildPrompt(parentId, parentName) {
                const newName = prompt(`在“${parentName}”下新增子分类`, "新分类");
                if (!newName) return;
                const newId = genId();
                const newCat = { id: newId, name: { name: newName, shortName: newName.slice(0,2) }, icon_url: null, parent_id: parentId, description: `新建分类` };
                categories.value.push(newCat);
                recalcAllDepths();
                initExpanded();
                selectCategory(newId);
            }
            function addRootCategoryPrompt() {
                const name = prompt("新建根分类");
                if (name) {
                    const newRoot = { id: genId(), name: { name, shortName: name.slice(0,2) }, icon_url: null, parent_id: -1, description: `顶级分类` };
                    categories.value.push(newRoot);
                    recalcAllDepths();
                    initExpanded();
                    selectCategory(newRoot.id);
                }
            }

            const fileInput = ref(null);
            const triggerFileUpload = () => fileInput.value.click();
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (file && file.type.startsWith('image/')) {
                    editableCategory.value.icon_url = URL.createObjectURL(file);
                    e.target.value = '';
                } else alert("请选择图片");
            };
            const modalVisible = ref(false);
            const modalImageUrl = ref('');
            const previewError = ref(false);
            const openModalPreview = () => {
                const url = editableCategory.value.icon_url;
                if (url && url.trim() !== '') {
                    modalImageUrl.value = url;
                    previewError.value = false;
                    modalVisible.value = true;
                } else {
                    alert("无图标URL或URL为空");
                }
            };
            const onModalImageError = () => { previewError.value = true; };

            const extForm = ref({ displayName: '', fieldName: '', defaultValue: '', isRequired: '可选', sortOrder: 0 });
            const extBackup = ref({ displayName: '', fieldName: '', defaultValue: '', isRequired: '可选', sortOrder: 0 });
            const selectedExtId = ref(null);
            const selectedExtIdForSelect = ref('');
            const isSaveEnabled = computed(() => {
                const hasContent = extForm.value.displayName || extForm.value.fieldName;
                if (!hasContent) return false;
                if (selectedExtId.value) {
                    return extForm.value.displayName !== extBackup.value.displayName ||
                        extForm.value.fieldName !== extBackup.value.fieldName ||
                        extForm.value.defaultValue !== extBackup.value.defaultValue ||
                        extForm.value.isRequired !== extBackup.value.isRequired ||
                        extForm.value.sortOrder !== extBackup.value.sortOrder;
                } else {
                    return true;
                }
            });
            function clearExtForm() {
                extForm.value = { displayName: '', fieldName: '', defaultValue: '', isRequired: '可选', sortOrder: 0 };
                extBackup.value = { displayName: '', fieldName: '', defaultValue: '', isRequired: '可选', sortOrder: 0 };
                selectedExtId.value = null;
                selectedExtIdForSelect.value = '';
            }
            function onSelectExtFromDropdown() {
                const rid = selectedExtIdForSelect.value;
                if (rid) {
                    const attr = allExtAttrs.value.find(a => a.recordId === rid);
                    if (attr && attr.classId === activeCategory.value.id) {
                        const newForm = {
                            displayName: attr.displayName,
                            fieldName: attr.fieldName,
                            defaultValue: attr.defaultValue || '',
                            isRequired: attr.isRequired,
                            sortOrder: attr.sortOrder
                        };
                        extForm.value = { ...newForm };
                        extBackup.value = { ...newForm };
                        selectedExtId.value = attr.recordId;
                    } else {
                        selectedExtIdForSelect.value = '';
                    }
                } else {
                    clearExtForm();
                }
            }
            function saveExtAttribute() {
                if (!extForm.value.displayName || !extForm.value.displayName.trim()) { alert("显示名称不能为空"); return; }
                if (!extForm.value.fieldName || !extForm.value.fieldName.trim()) { alert("别名不能为空"); return; }
                const currentAlias = extForm.value.fieldName.trim();
                let duplicate = false;
                if (selectedExtId.value) {
                    duplicate = activeExtList.value.some(a => a.fieldName === currentAlias && a.recordId !== selectedExtId.value);
                } else {
                    duplicate = activeExtList.value.some(a => a.fieldName === currentAlias);
                }
                if (duplicate) { alert("别名已存在，请使用其他别名"); return; }
                if (selectedExtId.value) {
                    const idx = allExtAttrs.value.findIndex(a => a.recordId === selectedExtId.value);
                    if (idx !== -1) {
                        allExtAttrs.value[idx] = {
                            ...allExtAttrs.value[idx],
                            displayName: extForm.value.displayName,
                            fieldName: extForm.value.fieldName,
                            defaultValue: extForm.value.defaultValue,
                            isRequired: extForm.value.isRequired,
                            sortOrder: extForm.value.sortOrder
                        };
                        extBackup.value = { ...extForm.value };
                        alert("属性更新成功");
                    }
                } else {
                    const newAttr = {
                        recordId: generateUUID(),
                        classId: activeCategory.value.id,
                        displayName: extForm.value.displayName,
                        fieldName: extForm.value.fieldName,
                        defaultValue: extForm.value.defaultValue,
                        isRequired: extForm.value.isRequired,
                        sortOrder: extForm.value.sortOrder || (activeExtList.value.length + 1),
                        autoId: newAutoId()
                    };
                    allExtAttrs.value.push(newAttr);
                    clearExtForm();
                    alert(`属性 "${newAttr.displayName}" 添加成功`);
                }
            }
            function deleteExtAttribute() {
                if (!selectedExtId.value) { alert("请选择要删除的属性"); return; }
                if (confirm("永久删除此扩展属性？")) {
                    allExtAttrs.value = allExtAttrs.value.filter(a => a.recordId !== selectedExtId.value);
                    clearExtForm();
                }
            }
            function syncToSubClass() { alert("演示: 扩展属性同步子类完成"); }

            watch(activeCategory, () => { clearExtForm(); refreshEditable(); });
            onMounted(() => {
                initExpanded();
                refreshEditable();
                recalcAllDepths();
                modalVisible.value = false;
                previewError.value = false;
            });

            return {
                categories, filteredCategoryTree, flatCategoryList, activeCategory, editableCategory, activeExtList,
                extForm, selectedExtId, selectedExtIdForSelect, expandedSet, toggleExpand, isModified,
                searchKeyword, onSearchInput, selectCategory, restoreOriginal, updateCurrentCategory,
                deleteCurrentCategory, showAddChildPrompt, addRootCategoryPrompt, deleteCategoryNode,
                clearExtForm, onSelectExtFromDropdown, saveExtAttribute, deleteExtAttribute,
                syncToSubClass, isSaveEnabled, hasSubCategories,
                fileInput, triggerFileUpload, handleFileUpload,
                modalVisible, modalImageUrl, previewError, openModalPreview, onModalImageError
            };
        }
    }).mount('#vueApp');
</script>
</body>
</html>
